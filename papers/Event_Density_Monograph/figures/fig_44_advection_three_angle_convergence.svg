<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 8.3 — Three-angle convergence: advection (v · ∇)v is non-ED</text>

  <!-- Three independent argument boxes pointing to a common conclusion -->

  <!-- Angle 1 -->
  <rect x="40" y="80" width="280" height="130" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="180" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Angle 1: Frame-kinematic</text>
  <line x1="55" y1="115" x2="305" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="180" y="140" text-anchor="middle" font-size="11" fill="#444">advection arises from</text>
  <text x="180" y="158" text-anchor="middle" font-size="11" fill="#444">Eulerian-frame transport</text>
  <text x="180" y="184" text-anchor="middle" font-size="11" fill="#444">(material vs Eulerian derivative</text>
  <text x="180" y="200" text-anchor="middle" font-size="11" fill="#444">distinction is kinematic)</text>

  <!-- Angle 2 -->
  <rect x="340" y="80" width="280" height="130" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="480" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Angle 2: DCGT route</text>
  <line x1="355" y1="115" x2="605" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="480" y="140" text-anchor="middle" font-size="11" fill="#444">DCGT does not produce</text>
  <text x="480" y="158" text-anchor="middle" font-size="11" fill="#444">(v · ∇)v from substrate</text>
  <text x="480" y="184" text-anchor="middle" font-size="11" fill="#444">multi-scale expansion</text>
  <text x="480" y="200" text-anchor="middle" font-size="11" fill="#444">at any order in ε</text>

  <!-- Angle 3 -->
  <rect x="640" y="80" width="220" height="130" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="750" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Angle 3: ED-I-06 ontology</text>
  <line x1="655" y1="115" x2="845" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="750" y="140" text-anchor="middle" font-size="11" fill="#444">advection has no</text>
  <text x="750" y="158" text-anchor="middle" font-size="11" fill="#444">substrate field/force</text>
  <text x="750" y="184" text-anchor="middle" font-size="11" fill="#444">classification under</text>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#444">ED-I-06 taxonomy</text>

  <!-- Convergence arrows down to single conclusion -->
  <g stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="180" y1="210" x2="370" y2="290"/>
    <line x1="480" y1="210" x2="450" y2="290"/>
    <line x1="750" y1="210" x2="530" y2="290"/>
  </g>

  <!-- Conclusion box -->
  <rect x="180" y="305" width="540" height="120" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="332" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">Conclusion: (v · ∇)v is non-ED</text>
  <line x1="200" y1="342" x2="700" y2="342" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="367" text-anchor="middle" fill="#fff" font-size="12">advection term is a transport-kinematic frame artifact,</text>
  <text x="450" y="387" text-anchor="middle" fill="#fff" font-size="12">not a substrate-fundamental dynamical content</text>
  <text x="450" y="412" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">three independent routes converge — robust under removal of any one</text>

  <!-- Footer -->
  <rect x="40" y="450" width="820" height="130" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="475" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Why "three-angle" matters</text>
  <text x="60" y="498" font-size="11" fill="#444">Each angle alone would suffice. Three independent arguments converge on the same classification, making the result over-determined.</text>
  <text x="60" y="516" font-size="11" fill="#444">This robustness is structurally important: the Intermediate Path C closure depends on advection being non-ED;</text>
  <text x="60" y="534" font-size="11" fill="#444">a single-route argument would be fragile under substrate-level revision.</text>
  <text x="60" y="558" font-size="11" fill="#444" font-style="italic">Same pattern as Theorem 18 over-determined kernel-arrow forcing (Figure 4.4).</text>
  <text x="60" y="576" font-size="11" fill="#444" font-style="italic">Together with the induction equation similarly classified non-ED in MHD (Ch. 9), advection forms the kinematic-coupling pattern.</text>
</svg>
