  <text x="452" y="370" text-anchor="middle" font-size="11" fill="#444">on decoupling surface Σ_H</text>

  <text x="452" y="402" text-anchor="middle" font-size="10" fill="#666" font-style="italic">substrate motif count base</text>

  <rect x="600" y="140" width="265" height="280" fill="#fff4e0" stroke="#a05a00" stroke-width="2" rx="6"/>
  <text x="732" y="168" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">E4</text>
  <text x="732" y="188" text-anchor="middle" font-size="12" fill="#444">κ / |N̂'| ED-SC anchor</text>
