  <text x="172" y="402" text-anchor="middle" font-size="10" fill="#666" font-style="italic">cross-platform identity (Fig. 14.2)</text>

  <rect x="320" y="140" width="265" height="280" fill="#fff4e0" stroke="#a05a00" stroke-width="2" rx="6"/>
