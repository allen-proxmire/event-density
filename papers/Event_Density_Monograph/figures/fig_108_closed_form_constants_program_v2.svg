  <text x="732" y="402" text-anchor="middle" font-size="10" fill="#666" font-style="italic">flagged for completeness</text>

  <!-- Cross-domain consistency arrows -->
  <g stroke="#1a4f8b" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <line x1="305" y1="280" x2="320" y2="280"/>
    <line x1="585" y1="280" x2="600" y2="280"/>
