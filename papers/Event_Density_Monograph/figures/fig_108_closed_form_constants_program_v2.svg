  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#1a4f8b" font-weight="bold">cross-domain consistency requirement</text>
  <text x="450" y="528" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">closed-form derivation in any one constrains the other two</text>

  <!-- Footer -->
