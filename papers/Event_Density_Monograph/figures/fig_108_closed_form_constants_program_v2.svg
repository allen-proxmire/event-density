  <line x1="335" y1="200" x2="570" y2="200" stroke="#a05a00" stroke-width="0.8"/>
  <text x="452" y="225" text-anchor="middle" font-size="11" fill="#444">BH sector (Ch. 13)</text>

  <text x="452" y="260" text-anchor="middle" font-weight="bold" font-size="11" fill="#a05a00">Empirical anchor</text>
