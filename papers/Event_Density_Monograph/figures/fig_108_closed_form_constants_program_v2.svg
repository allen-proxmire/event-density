  <text x="452" y="298" text-anchor="middle" font-size="11" fill="#444">→ g ≈ 1.28 (non-integer)</text>

  <text x="452" y="332" text-anchor="middle" font-weight="bold" font-size="11" fill="#a05a00">Cross-platform</text>
