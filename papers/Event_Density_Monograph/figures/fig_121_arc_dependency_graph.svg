<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Figure C.1 — Arc dependency graph</text>
  <text x="450" y="40" text-anchor="middle" font-size="10" fill="#666" font-style="italic">closed arcs feeding publication-grade papers</text>

  <!-- LEFT column: arcs -->
  <text x="160" y="68" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="12">Closed arcs</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="50" y="80" width="220" height="40" rx="4"/>
    <rect x="50" y="130" width="220" height="40" rx="4"/>
    <rect x="50" y="180" width="220" height="40" rx="4"/>
    <rect x="50" y="230" width="220" height="40" rx="4"/>
    <rect x="50" y="280" width="220" height="40" rx="4"/>
    <rect x="50" y="330" width="220" height="40" rx="4"/>
    <rect x="50" y="380" width="220" height="40" rx="4"/>
    <rect x="50" y="430" width="220" height="40" rx="4"/>
    <rect x="50" y="480" width="220" height="40" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="11" font-weight="bold">
    <text x="160" y="105" text-anchor="middle">Arc B  (Kernel-Arrow)</text>
    <text x="160" y="155" text-anchor="middle">Arc D  (DCGT)</text>
    <text x="160" y="205" text-anchor="middle">Arc Q  (Gauge-as-Rule)</text>
    <text x="160" y="255" text-anchor="middle">Arc R  (UV finiteness)</text>
    <text x="160" y="305" text-anchor="middle">Arc Q-COMPUTE</text>
    <text x="160" y="355" text-anchor="middle">Arc NS  (Navier–Stokes)</text>
    <text x="160" y="405" text-anchor="middle">Arc YM  (Yang–Mills)</text>
    <text x="160" y="455" text-anchor="middle">Arc SG + Arc ED-10</text>
    <text x="160" y="505" text-anchor="middle">Arc BH  (BH-1..BH-7)</text>
  </g>

  <!-- RIGHT column: publication-grade papers -->
  <text x="690" y="68" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Publication-grade papers</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="540" y="80" width="320" height="40" rx="4"/>
    <rect x="540" y="130" width="320" height="40" rx="4"/>
    <rect x="540" y="180" width="320" height="40" rx="4"/>
    <rect x="540" y="230" width="320" height="40" rx="4"/>
    <rect x="540" y="280" width="320" height="40" rx="4"/>
    <rect x="540" y="330" width="320" height="40" rx="4"/>
    <rect x="540" y="380" width="320" height="40" rx="4"/>
    <rect x="540" y="430" width="320" height="40" rx="4"/>
    <rect x="540" y="480" width="320" height="40" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="11">
    <text x="700" y="105" text-anchor="middle">papers/Time_Arrow_Theorem_18/  +  N1 paper</text>
    <text x="700" y="155" text-anchor="middle">NS Synthesis App. D  (DCGT)</text>
    <text x="700" y="205" text-anchor="middle">papers/Gauge_Fields_Theorem_17/</text>
    <text x="700" y="255" text-anchor="middle">papers/Arc_R/  (UV-finiteness)</text>
    <text x="700" y="305" text-anchor="middle">papers/Quantum_Computing_Foundations/</text>
    <text x="700" y="355" text-anchor="middle">papers/Navier Stokes_Synthesis_Paper/  (main)</text>
    <text x="700" y="405" text-anchor="middle">NS Synthesis App. E  (YM)</text>
    <text x="700" y="455" text-anchor="middle">papers/Substrate_Gravity_Foundations/</text>
    <text x="700" y="505" text-anchor="middle">papers/Black_Hole_Foundations/</text>
  </g>

  <!-- Connecting arrows (arc → paper) -->
  <g stroke="#666" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <line x1="270" y1="100" x2="540" y2="100"/>
    <line x1="270" y1="150" x2="540" y2="150"/>
    <line x1="270" y1="200" x2="540" y2="200"/>
    <line x1="270" y1="250" x2="540" y2="250"/>
    <line x1="270" y1="300" x2="540" y2="300"/>
    <line x1="270" y1="350" x2="540" y2="350"/>
    <line x1="270" y1="400" x2="540" y2="400"/>
    <line x1="270" y1="450" x2="540" y2="450"/>
    <line x1="270" y1="500" x2="540" y2="500"/>
  </g>

  <!-- Footer -->
  <rect x="40" y="540" width="820" height="50" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="560" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Each arc closure produces a publication-grade paper assigned to a specific chapter (Table C.1).</text>
  <text x="450" y="578" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Arc memos live in theory/ and arcs/ subtrees; publication-grade synthesis lives in papers/.</text>
</svg>
