  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Table D.3 — Constants × sectors incidence</text>
  <text x="450" y="40" text-anchor="middle" font-size="10" fill="#666" font-style="italic">filled cells indicate "load-bearing usage of constant in sector"</text>

