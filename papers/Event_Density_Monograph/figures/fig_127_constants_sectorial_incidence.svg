  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="10" fill="#666" font-style="italic">ℓ_P is the most cross-sector substrate input (load-bearing in 7+ sectors)</text>
  <text x="450" y="558" text-anchor="middle" font-size="10" fill="#666" font-style="italic">G and a₀ are confined to the gravity sector cluster</text>
  <text x="450" y="576" text-anchor="middle" font-size="10" fill="#666" font-style="italic">𝓜_crit, log g, β are sector-specific (matching the closed-form-substrate-constants targets)</text>
