  <!-- Filled cells (load-bearing) -->
  <g fill="#1a4f8b">
    <!-- ℏ in QM, QFT, SG -->
    <rect x="190" y="85" width="60" height="35"/>
    <rect x="250" y="85" width="60" height="35"/>
    <rect x="550" y="85" width="60" height="35"/>
    <!-- c in NS, YM, SG, curv, BH -->
    <rect x="370" y="120" width="60" height="35"/>
    <rect x="430" y="120" width="60" height="35"/>
    <rect x="550" y="120" width="60" height="35"/>
    <rect x="610" y="120" width="60" height="35"/>
    <rect x="670" y="120" width="60" height="35"/>
    <!-- H₀ in SG, curv -->
    <rect x="550" y="155" width="60" height="35"/>
    <rect x="610" y="155" width="60" height="35"/>
    <!-- ℓ_P in NS, YM, soft-m, SG, curv, BH, QC -->
    <rect x="310" y="190" width="60" height="35"/>
    <rect x="370" y="190" width="60" height="35"/>
    <rect x="430" y="190" width="60" height="35"/>
    <rect x="490" y="190" width="60" height="35"/>
    <rect x="550" y="190" width="60" height="35"/>
    <rect x="610" y="190" width="60" height="35"/>
    <rect x="670" y="190" width="60" height="35"/>
    <!-- G in SG, curv, BH -->
    <rect x="550" y="225" width="60" height="35"/>
    <rect x="610" y="225" width="60" height="35"/>
    <rect x="670" y="225" width="60" height="35"/>
    <!-- a₀ in SG, curv -->
    <rect x="550" y="260" width="60" height="35"/>
    <rect x="610" y="260" width="60" height="35"/>
    <!-- α (DCGT) in NS, YM, soft-m, SG, curv, BH (DCGT-derived) -->
    <rect x="370" y="295" width="60" height="35"/>
    <rect x="430" y="295" width="60" height="35"/>
    <rect x="490" y="295" width="60" height="35"/>
    <rect x="670" y="295" width="60" height="35"/>
    <!-- β (UDM) in soft-m -->
    <rect x="490" y="330" width="60" height="35"/>
    <!-- 𝓜_crit in QC -->
    <rect x="310" y="365" width="60" height="35"/>
    <!-- log g in BH -->
    <rect x="670" y="400" width="60" height="35"/>
    <!-- Γ_min in QC, BH -->
    <rect x="310" y="435" width="60" height="35"/>
    <rect x="670" y="435" width="60" height="35"/>
    <!-- Λ_V1 in QC -->
    <rect x="310" y="470" width="60" height="35"/>
