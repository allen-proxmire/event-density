  <!-- Row labels -->
  <g text-anchor="end" font-weight="bold" fill="#1a4f8b" font-size="12">
    <text x="180" y="107">ℏ</text>
    <text x="180" y="142">c</text>
    <text x="180" y="177">H₀</text>
    <text x="180" y="212">ℓ_P</text>
    <text x="180" y="247">G</text>
    <text x="180" y="282">a₀</text>
    <text x="180" y="317">α (DCGT)</text>
    <text x="180" y="352">β (UDM)</text>
    <text x="180" y="387">𝓜_crit</text>
    <text x="180" y="422">log g</text>
    <text x="180" y="457">Γ_min</text>
