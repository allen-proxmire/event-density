<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Figure D.2 — Substrate inputs to derived quantities (dependency tree)</text>

  <!-- Top: substrate inputs (4 root nodes) -->
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">Substrate inputs (root)</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="60" y="70" width="160" height="50" rx="6"/>
    <rect x="270" y="70" width="160" height="50" rx="6"/>
    <rect x="480" y="70" width="160" height="50" rx="6"/>
    <rect x="690" y="70" width="160" height="50" rx="6"/>
  </g>
  <g text-anchor="middle" fill="#a05a00" font-weight="bold" font-size="14">
    <text x="140" y="100">ℏ</text>
    <text x="350" y="100">c</text>
    <text x="560" y="100">H₀</text>
    <text x="770" y="100">ℓ_P</text>
  </g>

  <!-- First-level derived (G, a₀) -->
  <text x="450" y="175" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">via T19, T20</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="200" y="190" width="180" height="55" rx="6"/>
    <rect x="520" y="190" width="180" height="55" rx="6"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-weight="bold">
    <text x="290" y="215" font-size="14">G</text>
    <text x="290" y="235" font-size="11" font-weight="normal" fill="#444">= c³ ℓ_P² / ℏ  (T19)</text>
    <text x="610" y="215" font-size="14">a₀</text>
    <text x="610" y="235" font-size="11" font-weight="normal" fill="#444">= c H₀ / (2π)  (T20)</text>
  </g>

  <!-- First-level edges from inputs to G and a₀ -->
  <g stroke="#1a4f8b" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <line x1="140" y1="120" x2="270" y2="190"/>
    <line x1="350" y1="120" x2="290" y2="190"/>
    <line x1="770" y1="120" x2="350" y2="190"/>
    <line x1="350" y1="120" x2="600" y2="190"/>
    <line x1="560" y1="120" x2="610" y2="190"/>
  </g>

  <!-- Second-level derived nodes -->
  <text x="450" y="290" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">downstream consequences (second-level)</text>

  <g fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5">
    <rect x="40" y="310" width="180" height="65" rx="6"/>
    <rect x="240" y="310" width="180" height="65" rx="6"/>
    <rect x="440" y="310" width="180" height="65" rx="6"/>
    <rect x="640" y="310" width="220" height="65" rx="6"/>
  </g>
  <g text-anchor="middle" fill="#5a2090" font-size="12">
    <text x="130" y="334" font-weight="bold">BTFR slope-4</text>
    <text x="130" y="350" font-size="11" fill="#444">v⁴ = G M_b a₀</text>
    <text x="130" y="367" font-size="10" fill="#666">(Ch. 11 — T21)</text>

    <text x="330" y="334" font-weight="bold">BH area law</text>
    <text x="330" y="350" font-size="11" fill="#444">S = (A/ℓ_P²) · log g</text>
    <text x="330" y="367" font-size="10" fill="#666">(Ch. 13)</text>

    <text x="530" y="334" font-weight="bold">Heisenberg ½</text>
    <text x="530" y="350" font-size="11" fill="#444">Δx Δp ≥ ℏ/2</text>
    <text x="530" y="367" font-size="10" fill="#666">(Ch. 5 — T1–T16)</text>

    <text x="750" y="334" font-weight="bold">R1 hyperviscous</text>
    <text x="750" y="350" font-size="11" fill="#444">−κ μ_V1 ℓ_P² ∇⁴v</text>
    <text x="750" y="367" font-size="10" fill="#666">(Ch. 8 — DCGT subleading)</text>
  </g>

  <!-- Edges from first-level to second-level -->
  <g stroke="#1a4f8b" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <!-- G → BTFR, BH area, R1 -->
    <line x1="290" y1="245" x2="130" y2="310"/>
    <line x1="290" y1="245" x2="330" y2="310"/>
    <!-- a₀ → BTFR -->
    <line x1="610" y1="245" x2="160" y2="310"/>
    <!-- ℏ → Heisenberg -->
    <line x1="140" y1="120" x2="530" y2="310"/>
    <!-- ℓ_P → BH area, R1 -->
    <line x1="770" y1="120" x2="380" y2="310"/>
    <line x1="770" y1="120" x2="750" y2="310"/>
  </g>

  <!-- Footer -->
  <rect x="40" y="430" width="820" height="160" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="455" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the dependency tree</text>
  <line x1="60" y1="465" x2="840" y2="465" stroke="#bbb" stroke-width="0.5"/>
  <g fill="#444" font-size="11">
    <text x="60" y="487">• Top row: four substrate inputs ℏ, c, H₀, ℓ_P (taken as given).</text>
    <text x="60" y="505">• Mid row: G and a₀ derived via T19 and T20 from these inputs.</text>
    <text x="60" y="523">• Bottom row: second-level consequences combining substrate inputs and first-level derived constants.</text>
    <text x="60" y="541">• BTFR (T21) inherits both G and a₀; BH area law inherits ℓ_P and INHERITED log g; Heisenberg ½ inherits ℏ;</text>
    <text x="60" y="559">  R1 hyperviscous inherits ℓ_P and INHERITED μ_V1, κ.</text>
    <text x="60" y="578" font-style="italic">  every empirical-prediction in the substrate-gravity sector traces back to four named inputs.</text>
  </g>
</svg>
