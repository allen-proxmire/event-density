<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 7.7 — Form-FORCED vs Value-INHERITED at quantum computation</text>

  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural results from UR-1 + DCGT</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="55" rx="4"/>
    <rect x="60" y="200" width="340" height="55" rx="4"/>
    <rect x="60" y="265" width="340" height="55" rx="4"/>
    <rect x="60" y="330" width="340" height="55" rx="4"/>
    <rect x="60" y="395" width="340" height="55" rx="4"/>
    <rect x="60" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="158" font-weight="bold">UR-1 three-condition exhaustiveness</text>
    <text x="80" y="178" font-size="11">𝓤 = μ · κ · exp(−∫Λ ds)</text>
    <text x="80" y="223" font-weight="bold">Three-class taxonomy A / B / C</text>
    <text x="80" y="243" font-size="11">no fourth class admissible</text>
    <text x="80" y="288" font-weight="bold">Multiplicity-cap function M(𝓢, K, 𝓔, 𝓞)</text>
    <text x="80" y="308" font-size="11">one substrate object, three projections</text>
    <text x="80" y="353" font-weight="bold">τ_QC = min(τ_(i), τ_(ii), τ_(iii))</text>
    <text x="80" y="373" font-size="11">operating-window structure</text>
    <text x="80" y="418" font-weight="bold">Meta-overlays as compositions only</text>
    <text x="80" y="438" font-size="11">EC, dynamical decoupling, reservoir eng.</text>
    <text x="80" y="483" font-weight="bold">Cross-platform identity via 𝓜_crit</text>
    <text x="80" y="503" font-size="11">matter-wave ↔ qubit boundary</text>
  </g>

  <!-- RIGHT: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">specific values calibrated empirically</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="55" rx="4"/>
    <rect x="500" y="200" width="340" height="55" rx="4"/>
    <rect x="500" y="265" width="340" height="55" rx="4"/>
    <rect x="500" y="330" width="340" height="55" rx="4"/>
    <rect x="500" y="395" width="340" height="55" rx="4"/>
    <rect x="500" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="158" font-weight="bold">𝓜_crit critical multiplicity</text>
    <text x="520" y="178" font-size="11">empirical anchor 140–250 kDa (O-QC-1)</text>
    <text x="520" y="223" font-weight="bold">Specific shapes of μ(x), κ(x)</text>
    <text x="520" y="243" font-size="11">monotone with limits FORCED; shape INHERITED</text>
    <text x="520" y="288" font-weight="bold">f_int, f_xy, f_sys^(A), g(N), h(N), c(N)</text>
    <text x="520" y="308" font-size="11">architecture-specific scaling functions (O-QC-2)</text>
    <text x="520" y="353" font-weight="bold">Λ_V1 isolation ceiling</text>
    <text x="520" y="373" font-size="11">vacuum residual injection rate</text>
    <text x="520" y="418" font-weight="bold">Δ_top, τ_gap-stab(𝓣)</text>
    <text x="520" y="438" font-size="11">topology-specific gap structure (O-QC-4)</text>
    <text x="520" y="483" font-weight="bold">N_corr correlation budget</text>
    <text x="520" y="503" font-size="11">platform-specific saturation scale</text>
  </g>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">Architectural structure FORCED; numerical thresholds and scaling functions INHERITED.</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">Closed-form-substrate-constants program (O-QC-1, O-QC-2, O-QC-4) targets the INHERITED layer.</text>
</svg>
