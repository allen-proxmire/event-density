  <!-- Tag colors -->
  <g font-size="11">
    <text x="120" y="103" text-anchor="middle" font-weight="bold" fill="#1a4f8b">ℏ</text>
    <text x="210" y="103" fill="#444">Planck's constant</text>
    <rect x="525" y="86" width="110" height="24" fill="#fff4e0" stroke="#a05a00"/>
    <text x="580" y="103" text-anchor="middle" font-weight="bold" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="650" y="103" fill="#666" font-style="italic">— (taken as given)</text>

    <text x="120" y="135" text-anchor="middle" font-weight="bold" fill="#1a4f8b">c</text>
    <text x="210" y="135" fill="#444">speed of light</text>
    <rect x="525" y="118" width="110" height="24" fill="#fff4e0" stroke="#a05a00"/>
    <text x="580" y="135" text-anchor="middle" font-weight="bold" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="650" y="135" fill="#666" font-style="italic">— (taken as given)</text>

    <text x="120" y="167" text-anchor="middle" font-weight="bold" fill="#1a4f8b">H₀</text>
    <text x="210" y="167" fill="#444">Hubble rate</text>
    <rect x="525" y="150" width="110" height="24" fill="#fff4e0" stroke="#a05a00"/>
    <text x="580" y="167" text-anchor="middle" font-weight="bold" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="650" y="167" fill="#666" font-style="italic">— (taken as given)</text>

    <text x="120" y="199" text-anchor="middle" font-weight="bold" fill="#1a4f8b">ℓ_P</text>
    <text x="210" y="199" fill="#444">Planck / substrate length</text>
    <rect x="525" y="182" width="110" height="24" fill="#e8f0ff" stroke="#1a4f8b"/>
    <text x="580" y="199" text-anchor="middle" font-weight="bold" fill="#1a4f8b">DERIVED via T19</text>
    <text x="650" y="199" fill="#666" font-style="italic">Newton-recovery identification</text>

    <text x="120" y="231" text-anchor="middle" font-weight="bold" fill="#1a4f8b">G</text>
    <text x="210" y="231" fill="#444">Newton's constant</text>
    <rect x="525" y="214" width="110" height="24" fill="#e8f0ff" stroke="#1a4f8b"/>
    <text x="580" y="231" text-anchor="middle" font-weight="bold" fill="#1a4f8b">DERIVED</text>
    <text x="650" y="231" fill="#666" font-style="italic">G = c³ ℓ_P² / ℏ  (T19)</text>

    <text x="120" y="263" text-anchor="middle" font-weight="bold" fill="#1a4f8b">a₀</text>
    <text x="210" y="263" fill="#444">MOND acceleration</text>
    <rect x="525" y="246" width="110" height="24" fill="#e8f0ff" stroke="#1a4f8b"/>
    <text x="580" y="263" text-anchor="middle" font-weight="bold" fill="#1a4f8b">DERIVED</text>
    <text x="650" y="263" fill="#666" font-style="italic">a₀ = c H₀ / (2π)  (T20)</text>

    <text x="120" y="295" text-anchor="middle" font-weight="bold" fill="#1a4f8b">α</text>
    <text x="210" y="295" fill="#444">DCGT prefactor in Γ_cross</text>
    <rect x="525" y="278" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="295" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="295" fill="#666" font-style="italic">substrate-constants program</text>

    <text x="120" y="327" text-anchor="middle" font-weight="bold" fill="#1a4f8b">β  (UDM)</text>
    <text x="210" y="327" fill="#444">mobility-law exponent</text>
    <rect x="525" y="310" width="110" height="24" fill="#e8f0ff" stroke="#1a4f8b"/>
    <text x="580" y="327" text-anchor="middle" font-weight="bold" fill="#1a4f8b">FORCED = 2</text>
    <text x="650" y="327" fill="#666" font-style="italic">empirical 1.72 ± 0.37 (PASSED)</text>

    <text x="120" y="359" text-anchor="middle" font-weight="bold" fill="#1a4f8b">𝓜_crit</text>
    <text x="210" y="359" fill="#444">critical multiplicity threshold</text>
    <rect x="525" y="342" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="359" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="359" fill="#666" font-style="italic">O-QC-1 target (open)</text>

    <text x="120" y="391" text-anchor="middle" font-weight="bold" fill="#1a4f8b">log g</text>
    <text x="210" y="391" fill="#444">BH area-law coefficient</text>
    <rect x="525" y="374" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="391" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="391" fill="#666" font-style="italic">O2 (Arc BH) — open</text>

    <text x="120" y="423" text-anchor="middle" font-weight="bold" fill="#1a4f8b">Γ_min</text>
    <text x="210" y="423" fill="#444">minimum cross-bandwidth</text>
    <rect x="525" y="406" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="423" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="423" fill="#666" font-style="italic">V1-kernel + DCGT details</text>

    <text x="120" y="455" text-anchor="middle" font-weight="bold" fill="#1a4f8b">Λ_V1</text>
    <text x="210" y="455" fill="#444">V1 vacuum residual</text>
    <rect x="525" y="438" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="455" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="455" fill="#666" font-style="italic">Class A isolation ceiling</text>

    <text x="120" y="487" text-anchor="middle" font-weight="bold" fill="#1a4f8b">μ(x)</text>
    <text x="210" y="487" fill="#444">UR-1 multiplicity-headroom</text>
    <rect x="525" y="470" width="110" height="24" fill="#fff" stroke="#888"/>
    <text x="580" y="487" text-anchor="middle" font-weight="bold" fill="#444">FORCED-shape</text>
    <text x="650" y="487" fill="#666" font-style="italic">monotone limits; profile INHERITED</text>

    <text x="120" y="519" text-anchor="middle" font-weight="bold" fill="#1a4f8b">κ/|N̂'|</text>
    <text x="210" y="519" fill="#444">ED-SC cross-scale ratio</text>
    <rect x="525" y="502" width="110" height="24" fill="#f0e8ff" stroke="#5a2090"/>
    <text x="580" y="519" text-anchor="middle" font-weight="bold" fill="#5a2090">INHERITED</text>
    <text x="650" y="519" fill="#666" font-style="italic">E4 (ED-SC arc) — open</text>
  </g>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="10" fill="#666" font-style="italic">selected key symbols; full glossary entries in Appendix B body. Three INHERITED constants — 𝓜_crit, log g, κ/|N̂'| —</text>
  <text x="450" y="572" text-anchor="middle" font-size="10" fill="#666" font-style="italic">are mutually constraining via cross-domain consistency requirement (Figs. 14.7, D.1).</text>
