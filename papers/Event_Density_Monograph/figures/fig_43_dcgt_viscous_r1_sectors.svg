<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 8.2 — DCGT producing the viscous and R1 sectors of NS</text>

  <!-- DCGT central node -->
  <rect x="320" y="60" width="260" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">DCGT multi-scale expansion</text>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="11">substrate primitives + V1 finite-width</text>
  <text x="450" y="128" text-anchor="middle" fill="#fff" font-size="10" font-style="italic">ε = ℓ_P / R_cg</text>

  <!-- Two output sectors -->
  <!-- Viscous (leading order) -->
  <rect x="40" y="220" width="380" height="240" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="230" y="245" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">Viscous sector</text>
  <text x="230" y="263" text-anchor="middle" font-size="11" fill="#444" font-style="italic">leading order  (ε⁰)</text>
  <line x1="55" y1="273" x2="405" y2="273" stroke="#a05a00" stroke-width="0.8"/>

  <text x="230" y="305" text-anchor="middle" font-size="14" fill="#a05a00" font-weight="bold">ν ∇²v</text>
  <text x="230" y="328" text-anchor="middle" font-size="11" fill="#444">directional viscosity</text>
  <text x="230" y="346" text-anchor="middle" font-size="11" fill="#444">from chain-aligned momentum transport</text>

  <text x="230" y="380" text-anchor="middle" font-size="11" fill="#444">substrate origin: P02 chain-momentum</text>
  <text x="230" y="398" text-anchor="middle" font-size="11" fill="#444">+ DCGT directional-flux output</text>
  <text x="230" y="430" text-anchor="middle" font-size="11" fill="#666" font-style="italic">ν INHERITED; functional form FORCED</text>

  <!-- R1 (subleading) -->
  <rect x="480" y="220" width="380" height="240" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="670" y="245" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">R1 hyperviscous sector</text>
  <text x="670" y="263" text-anchor="middle" font-size="11" fill="#444" font-style="italic">first subleading order  (ε²)</text>
  <line x1="495" y1="273" x2="845" y2="273" stroke="#a05a00" stroke-width="0.8"/>

  <text x="670" y="305" text-anchor="middle" font-size="14" fill="#a05a00" font-weight="bold">−κ μ_V1 ℓ_P² ∇⁴v</text>
  <text x="670" y="328" text-anchor="middle" font-size="11" fill="#444">substrate-cutoff hyperviscous</text>
  <text x="670" y="346" text-anchor="middle" font-size="11" fill="#444">regularization</text>

  <text x="670" y="380" text-anchor="middle" font-size="11" fill="#444">substrate origin: V1 finite width</text>
  <text x="670" y="398" text-anchor="middle" font-size="11" fill="#444">propagated to continuum via DCGT</text>
  <text x="670" y="430" text-anchor="middle" font-size="11" fill="#666" font-style="italic">κ, μ_V1 INHERITED; ∇⁴ form FORCED</text>

  <!-- Connecting arrows from DCGT to each sector -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="400" y1="142" x2="270" y2="220"/>
    <line x1="500" y1="142" x2="630" y2="220"/>
  </g>
  <text x="290" y="190" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">leading</text>
  <text x="290" y="204" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">order</text>
  <text x="610" y="190" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">first</text>
  <text x="610" y="204" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">subleading</text>

  <!-- Footer -->
  <rect x="40" y="490" width="820" height="90" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="513" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Two sectors, one expansion</text>
  <text x="60" y="537" font-size="11" fill="#444">Both the viscous term and the R1 hyperviscous regularization come from a single DCGT multi-scale expansion.</text>
  <text x="60" y="555" font-size="11" fill="#444">The viscous term is at leading order; R1 is at first subleading order, suppressed by (ℓ_P/R_cg)² .</text>
  <text x="60" y="573" font-size="11" fill="#444" font-style="italic">R1 is the distinctive ED content beyond standard NS. It underwrites the Intermediate Path C closure (Figure 8.4).</text>
</svg>
