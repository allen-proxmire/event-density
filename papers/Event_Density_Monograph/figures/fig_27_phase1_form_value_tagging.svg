<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 5.6 — Form-FORCED vs Value-INHERITED at Phase-1 closure</text>

  <!-- Vertical divider -->
  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT column: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural results derived from substrate + math</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="50" rx="4"/>
    <rect x="60" y="200" width="340" height="50" rx="4"/>
    <rect x="60" y="265" width="340" height="50" rx="4"/>
    <rect x="60" y="330" width="340" height="50" rx="4"/>
    <rect x="60" y="395" width="340" height="50" rx="4"/>
    <rect x="60" y="460" width="340" height="50" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="156" font-weight="bold">Born rule squared form</text>
    <text x="80" y="175" font-size="11">P(outcome) = |⟨φ|ψ⟩|² (not p, not |·|⁴)</text>
    <text x="80" y="221" font-weight="bold">Schrödinger linearity, first-order in t</text>
    <text x="80" y="240" font-size="11">via Stone (1932) on closed systems</text>
    <text x="80" y="286" font-weight="bold">Heisenberg ½ in ΔA·ΔB ≥ ½|⟨[A,B]⟩|</text>
    <text x="80" y="305" font-size="11">factor of ½ structurally FORCED</text>
    <text x="80" y="351" font-weight="bold">Measurement asymmetry (one-directional)</text>
    <text x="80" y="370" font-size="11">P11 commitment-irreversibility</text>
    <text x="80" y="416" font-weight="bold">Hilbert-space inner-product structure</text>
    <text x="80" y="435" font-size="11">U1–U2 derived from substrate</text>
    <text x="80" y="481" font-weight="bold">Canonical commutator [x, p] = iℏ</text>
    <text x="80" y="500" font-size="11">U5 from substrate translation/momentum</text>
  </g>

  <!-- RIGHT column: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">specific numbers calibrated empirically</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="50" rx="4"/>
    <rect x="500" y="200" width="340" height="50" rx="4"/>
    <rect x="500" y="265" width="340" height="50" rx="4"/>
    <rect x="500" y="330" width="340" height="50" rx="4"/>
    <rect x="500" y="395" width="340" height="50" rx="4"/>
    <rect x="500" y="460" width="340" height="50" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="156" font-weight="bold">Absolute scale of ℏ</text>
    <text x="520" y="175" font-size="11">substrate input, not derived</text>
    <text x="520" y="221" font-weight="bold">Specific spectrum of any concrete H</text>
    <text x="520" y="240" font-size="11">depends on system Hamiltonian</text>
    <text x="520" y="286" font-weight="bold">Choice of representation</text>
    <text x="520" y="305" font-size="11">position / momentum / energy basis</text>
    <text x="520" y="351" font-weight="bold">Specific eigenvalues of any operator</text>
    <text x="520" y="370" font-size="11">numerical content depends on H, system</text>
    <text x="520" y="416" font-weight="bold">Interaction couplings</text>
    <text x="520" y="435" font-size="11">e.g. fine-structure α, EM strength</text>
    <text x="520" y="481" font-weight="bold">Decoherence rates of specific systems</text>
    <text x="520" y="500" font-size="11">platform-dependent, calibrated empirically</text>
  </g>

  <!-- Footer note -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">All structural results of T1–T16 are FORCED at the form level;</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">absolute scales and specific spectra inherit from substrate constants and concrete-system input.</text>
</svg>
