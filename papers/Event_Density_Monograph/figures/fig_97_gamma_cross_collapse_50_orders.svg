<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 14.3 — Γ_cross collapse: cross-scale identity over ~50 orders of magnitude</text>

  <!-- Log axis spanning ~50 orders -->
  <line x1="80" y1="320" x2="820" y2="320" stroke="#444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="830" y="324" font-size="12" fill="#444">log₁₀ (length)</text>

  <!-- Major tick marks every 5 orders -->
  <g stroke="#444" stroke-width="1">
    <line x1="80"  y1="316" x2="80"  y2="324"/>
    <line x1="155" y1="316" x2="155" y2="324"/>
    <line x1="230" y1="316" x2="230" y2="324"/>
    <line x1="305" y1="316" x2="305" y2="324"/>
    <line x1="380" y1="316" x2="380" y2="324"/>
    <line x1="455" y1="316" x2="455" y2="324"/>
    <line x1="530" y1="316" x2="530" y2="324"/>
    <line x1="605" y1="316" x2="605" y2="324"/>
    <line x1="680" y1="316" x2="680" y2="324"/>
    <line x1="755" y1="316" x2="755" y2="324"/>
  </g>
  <g text-anchor="middle" font-size="10" fill="#666">
    <text x="80"  y="340">−35</text>
    <text x="155" y="340">−30</text>
    <text x="230" y="340">−25</text>
    <text x="305" y="340">−20</text>
    <text x="380" y="340">−15</text>
    <text x="455" y="340">−10</text>
    <text x="530" y="340">−5</text>
    <text x="605" y="340">0</text>
    <text x="680" y="340">+5</text>
    <text x="755" y="340">+10</text>
  </g>
  <text x="80" y="358" text-anchor="middle" font-size="9" fill="#888">m</text>
  <text x="755" y="358" text-anchor="middle" font-size="9" fill="#888">m</text>

  <!-- Markers along the axis -->
  <!-- ℓ_P at far left -->
  <g fill="#1a4f8b">
    <circle cx="80" cy="320" r="6"/>
  </g>
  <text x="80" y="304" text-anchor="middle" font-size="10" fill="#1a4f8b" font-weight="bold">ℓ_P</text>

  <!-- BH-2 (near ℓ_P) -->
  <line x1="120" y1="120" x2="120" y2="316" stroke="#a05a00" stroke-width="1.2" stroke-dasharray="3,3"/>
  <circle cx="120" cy="320" r="6" fill="#a05a00"/>

  <!-- QC scale -->
  <line x1="690" y1="120" x2="690" y2="316" stroke="#5a2090" stroke-width="1.2" stroke-dasharray="3,3"/>
  <circle cx="690" cy="320" r="6" fill="#5a2090"/>

  <!-- TOP labels: BH-2 (left) -->
  <rect x="40" y="80" width="190" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="135" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">BH-2</text>
  <text x="135" y="125" text-anchor="middle" font-size="10" fill="#444">horizon formation</text>
  <text x="135" y="143" text-anchor="middle" font-size="10" fill="#444">Γ_cross  →  0  on Σ_H</text>
  <text x="135" y="163" text-anchor="middle" font-size="10" fill="#444" font-style="italic">scale ~ ℓ_P near horizon</text>

  <!-- TOP labels: QC condition (ii) (right) -->
  <rect x="600" y="80" width="190" height="100" fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5" rx="4"/>
  <text x="695" y="105" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="12">QC condition (ii)</text>
  <text x="695" y="125" text-anchor="middle" font-size="10" fill="#444">Class C plateau</text>
  <text x="695" y="143" text-anchor="middle" font-size="10" fill="#444">Γ_cross  →  Γ_min</text>
  <text x="695" y="163" text-anchor="middle" font-size="10" fill="#444" font-style="italic">scale ~ 10⁻⁹ to 10⁻³ m</text>

  <!-- Connecting bracket spanning ~50 orders -->
  <line x1="120" y1="225" x2="690" y2="225" stroke="#444" stroke-width="1.5"/>
  <line x1="120" y1="215" x2="120" y2="235" stroke="#444" stroke-width="1.5"/>
  <line x1="690" y1="215" x2="690" y2="235" stroke="#444" stroke-width="1.5"/>
  <text x="405" y="212" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">~ 50 orders of magnitude</text>

  <!-- Same substrate quantity panel -->
  <rect x="200" y="395" width="500" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="450" y="425" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Γ_cross  ~  exp [ −α ∫_path σ dℓ ]</text>
  <text x="450" y="447" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">substrate-locality cross-bandwidth from DCGT</text>
  <text x="450" y="465" text-anchor="middle" fill="#fff" font-size="11">collapses at any scale where σ accumulates;</text>
  <text x="450" y="481" text-anchor="middle" fill="#fff" font-size="11">no scale-specific mechanism is invoked</text>

  <!-- Footer -->
  <rect x="40" y="510" width="820" height="70" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="533" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Cross-scale identity</text>
  <text x="60" y="555" font-size="11" fill="#444">Two phenomena (BH horizon, QC plateau) at scales separated by ~50 orders of magnitude — same Γ_cross collapse.</text>
  <text x="60" y="572" font-size="11" fill="#444" font-style="italic">Cross-domain echo, scale-invariant substrate signature; Type 2 unification (Figure 14.1).</text>
</svg>
