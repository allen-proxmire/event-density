<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 10.1 — Five canonical non-Newtonian rheology families and the P4-NN unification</text>

  <!-- Five family boxes -->
  <!-- Layout: 5 boxes in a row, each ~165 wide -->

  <rect x="40" y="80" width="165" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="122" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">1. Shear-thinning</text>
  <line x1="55" y1="115" x2="190" y2="115" stroke="#a05a00" stroke-width="0.8"/>
  <text x="122" y="140" text-anchor="middle" font-size="11" fill="#444">η decreases with</text>
  <text x="122" y="158" text-anchor="middle" font-size="11" fill="#444">increasing shear rate</text>
  <text x="122" y="180" text-anchor="middle" font-size="10" fill="#666" font-style="italic">power-law fluids,</text>
  <text x="122" y="195" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Carreau-Yasuda</text>
  <text x="122" y="225" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">e.g. blood, polymer</text>
  <text x="122" y="240" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">solutions, paint</text>

  <rect x="215" y="80" width="165" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="297" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">2. Shear-thickening</text>
  <line x1="230" y1="115" x2="365" y2="115" stroke="#a05a00" stroke-width="0.8"/>
  <text x="297" y="140" text-anchor="middle" font-size="11" fill="#444">η increases with</text>
  <text x="297" y="158" text-anchor="middle" font-size="11" fill="#444">increasing shear rate</text>
  <text x="297" y="180" text-anchor="middle" font-size="10" fill="#666" font-style="italic">discontinuous</text>
  <text x="297" y="195" text-anchor="middle" font-size="10" fill="#666" font-style="italic">shear-thickening (DST)</text>
  <text x="297" y="225" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">e.g. cornstarch</text>
  <text x="297" y="240" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">suspensions</text>

  <rect x="390" y="80" width="165" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="472" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">3. Yield-stress</text>
  <line x1="405" y1="115" x2="540" y2="115" stroke="#a05a00" stroke-width="0.8"/>
  <text x="472" y="140" text-anchor="middle" font-size="11" fill="#444">no flow until σ &gt; σ_y;</text>
  <text x="472" y="158" text-anchor="middle" font-size="11" fill="#444">solid-like below threshold</text>
  <text x="472" y="180" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Bingham, Herschel–</text>
  <text x="472" y="195" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Bulkley</text>
  <text x="472" y="225" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">e.g. toothpaste,</text>
  <text x="472" y="240" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">drilling muds</text>

  <rect x="565" y="80" width="165" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="647" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">4. Viscoelastic</text>
  <line x1="580" y1="115" x2="715" y2="115" stroke="#a05a00" stroke-width="0.8"/>
  <text x="647" y="140" text-anchor="middle" font-size="11" fill="#444">stress relaxation</text>
  <text x="647" y="158" text-anchor="middle" font-size="11" fill="#444">over time τ_R</text>
  <text x="647" y="180" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Maxwell, Jeffreys,</text>
  <text x="647" y="195" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Oldroyd-B models</text>
  <text x="647" y="225" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">e.g. polymer melts,</text>
  <text x="647" y="240" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">silly putty</text>

  <rect x="740" y="80" width="120" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="800" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">5. Thixotropic</text>
  <line x1="750" y1="115" x2="850" y2="115" stroke="#a05a00" stroke-width="0.8"/>
  <text x="800" y="140" text-anchor="middle" font-size="11" fill="#444">η decreases</text>
  <text x="800" y="158" text-anchor="middle" font-size="11" fill="#444">over time at</text>
  <text x="800" y="176" text-anchor="middle" font-size="11" fill="#444">constant shear</text>
  <text x="800" y="200" text-anchor="middle" font-size="10" fill="#666" font-style="italic">structure breakdown</text>
  <text x="800" y="228" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">e.g. ketchup,</text>
  <text x="800" y="243" text-anchor="middle" font-size="10" fill="#444" font-weight="bold">gels</text>

  <!-- Arrows down to unification box -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="122" y1="252" x2="350" y2="335"/>
    <line x1="297" y1="252" x2="400" y2="335"/>
    <line x1="472" y1="252" x2="450" y2="335"/>
    <line x1="647" y1="252" x2="500" y2="335"/>
    <line x1="800" y1="252" x2="550" y2="335"/>
  </g>

  <!-- Unification box -->
  <rect x="180" y="345" width="540" height="170" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="372" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">P4-NN unification</text>
  <line x1="200" y1="382" x2="700" y2="382" stroke="#fff" stroke-width="0.8"/>
  <g fill="#fff" font-size="12">
    <text x="200" y="408">All five families derive from one substrate principle:</text>
    <text x="200" y="430">  P4 substrate participation-rule modification under flow</text>
    <text x="200" y="455">Mapped to four state-variable applications</text>
    <text x="200" y="475">via DCGT scalar/vector/tensor/V5 channels</text>
  </g>
  <text x="450" y="500" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">— canonical source: papers/P4_NonNewtonian_Paper_Draft/</text>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Five rheology families, one substrate principle. Form-FORCED structure across all five;</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">specific exponents (n, β, σ_y, τ_R, …) and yield thresholds value-INHERITED.</text>
</svg>
