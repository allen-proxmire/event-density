  <text x="685" y="170" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">∇_μ [μ(√(g^αβ ∇_α Φ ∇_β Φ)/a₀) ∇^μ Φ]</text>
  <text x="685" y="190" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">= 4πG T</text>
  <text x="685" y="215" text-anchor="middle" font-size="11" fill="#444">covariantized scalar-tensor structure</text>

  <text x="685" y="248" text-anchor="middle" font-weight="bold" font-size="12" fill="#a05a00">Acoustic metric inputs:</text>
  <g fill="#444" font-size="11">
    <text x="520" y="272">• g^μν_ac kinematic-summary</text>
    <text x="520" y="290">  metric (not Einstein metric)</text>
    <text x="520" y="308">• T = trace of stress-energy</text>
    <text x="520" y="326">• N1 + T18 + Hadamard parametrix</text>
    <text x="520" y="344">  → curved-spacetime V1 (GR1)</text>
