  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 12.1 — From flat-background substrate gravity to curvature emergence</text>

  <!-- LEFT: flat-background -->
  <rect x="40" y="80" width="370" height="380" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="225" y="106" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">Flat-background substrate gravity</text>
  <text x="225" y="124" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">Chapter 11</text>
  <line x1="55" y1="138" x2="395" y2="138" stroke="#1a4f8b" stroke-width="0.8"/>

  <text x="225" y="170" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">∇ · [μ(|∇Φ|/a₀) ∇Φ] = 4πG ρ_m</text>
  <text x="225" y="195" text-anchor="middle" font-size="11" fill="#444">scalar gravitational potential Φ</text>
  <text x="225" y="213" text-anchor="middle" font-size="11" fill="#444">on flat Minkowski background</text>

  <text x="225" y="248" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Substrate-derived inputs:</text>
  <g fill="#444" font-size="11">
    <text x="60" y="272">• T19  G = c³ ℓ_P² / ℏ</text>
    <text x="60" y="290">• T20  a₀ = c H₀ / (2π)</text>
    <text x="60" y="308">• ECR  geometric-mean composition</text>
    <text x="60" y="326">• T21  v⁴ = G M_b a₀  (BTFR slope-4)</text>
  </g>

  <text x="225" y="362" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">no curvature; spacetime is fixed</text>
  <text x="225" y="378" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">background; only Φ is dynamical</text>

  <text x="225" y="415" text-anchor="middle" font-size="10" fill="#666">substrate cumulative-strain</text>
  <text x="225" y="430" text-anchor="middle" font-size="10" fill="#666">propagated through DCGT</text>
  <text x="225" y="445" text-anchor="middle" font-size="10" fill="#666">to flat-background continuum</text>

  <!-- Arrow between -->
  <line x1="420" y1="270" x2="490" y2="270" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="455" y="255" text-anchor="middle" font-size="11" fill="#1a4f8b" font-weight="bold">covariantize</text>
  <text x="455" y="290" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">via Arc ED-10</text>

