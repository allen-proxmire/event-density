  <text x="685" y="380" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">strictly flat-spacetime variant</text>
  <text x="685" y="396" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">recovered in weak-field limit</text>

  <text x="685" y="425" text-anchor="middle" font-size="10" fill="#666">conditional-positive verdict:</text>
  <text x="685" y="440" text-anchor="middle" font-size="10" fill="#666">OS-positive + ghost-free</text>
  <text x="685" y="455" text-anchor="middle" font-size="10" fill="#666">+ gradient-stable</text>

  <!-- Footer -->
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Curvature emergence covariantizes the flat-background equation;</text>
  <text x="450" y="518" text-anchor="middle" font-size="11" fill="#444" font-style="italic">deep-MOND superluminality is the only structural cost (avoidance routes inadmissible — Figure 12.7).</text>
  <text x="450" y="546" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Acoustic metric, not Einstein metric. ED predicts no Einstein equation in current scope (ED-10 guardrails).</text>
  <text x="450" y="564" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Canonical sources: papers/Substrate_Gravity_Foundations/, theory/Substrate_Gravity/Arc_ED-10/</text>
