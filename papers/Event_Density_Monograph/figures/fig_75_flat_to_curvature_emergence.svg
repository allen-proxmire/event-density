  <rect x="500" y="80" width="370" height="380" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="685" y="106" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">Curvature emergence</text>
  <text x="685" y="124" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">Chapter 12 — Arc ED-10</text>
