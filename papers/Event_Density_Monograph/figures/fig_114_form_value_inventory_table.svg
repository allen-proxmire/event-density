<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">
  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Table A.1 — FORCED vs INHERITED inventory by theorem</text>

  <!-- Table headers -->
  <g fill="#1a4f8b" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="40" y="45" width="120" height="32"/>
    <rect x="160" y="45" width="360" height="32"/>
    <rect x="520" y="45" width="340" height="32"/>
  </g>
  <g text-anchor="middle" fill="#fff" font-weight="bold" font-size="12">
    <text x="100" y="65">Theorem</text>
    <text x="340" y="65">Form-FORCED</text>
    <text x="690" y="65">Value-INHERITED</text>
  </g>

  <!-- Rows -->
  <g fill="#fff" stroke="#888" stroke-width="1">
    <rect x="40" y="77" width="120" height="42"/><rect x="160" y="77" width="360" height="42"/><rect x="520" y="77" width="340" height="42"/>
    <rect x="40" y="119" width="120" height="42"/><rect x="160" y="119" width="360" height="42"/><rect x="520" y="119" width="340" height="42"/>
    <rect x="40" y="161" width="120" height="42"/><rect x="160" y="161" width="360" height="42"/><rect x="520" y="161" width="340" height="42"/>
    <rect x="40" y="203" width="120" height="42"/><rect x="160" y="203" width="360" height="42"/><rect x="520" y="203" width="340" height="42"/>
    <rect x="40" y="245" width="120" height="42"/><rect x="160" y="245" width="360" height="42"/><rect x="520" y="245" width="340" height="42"/>
    <rect x="40" y="287" width="120" height="42"/><rect x="160" y="287" width="360" height="42"/><rect x="520" y="287" width="340" height="42"/>
    <rect x="40" y="329" width="120" height="42"/><rect x="160" y="329" width="360" height="42"/><rect x="520" y="329" width="340" height="42"/>
    <rect x="40" y="371" width="120" height="42"/><rect x="160" y="371" width="360" height="42"/><rect x="520" y="371" width="340" height="42"/>
    <rect x="40" y="413" width="120" height="42"/><rect x="160" y="413" width="360" height="42"/><rect x="520" y="413" width="340" height="42"/>
    <rect x="40" y="455" width="120" height="42"/><rect x="160" y="455" width="360" height="42"/><rect x="520" y="455" width="340" height="42"/>
    <rect x="40" y="497" width="120" height="42"/><rect x="160" y="497" width="360" height="42"/><rect x="520" y="497" width="340" height="42"/>
  </g>

  <g font-size="11">
    <!-- T1-T16 -->
    <text x="100" y="100" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T1–T16</text>
    <text x="170" y="98" fill="#444">Born squared, Schröd linear,</text>
    <text x="170" y="113" fill="#444">Heisenberg ½, no-collapse meas</text>
    <text x="530" y="98" fill="#a05a00">absolute ℏ; specific spectra;</text>
    <text x="530" y="113" fill="#a05a00">representation choice</text>

    <!-- T17 -->
    <text x="100" y="142" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T17</text>
    <text x="170" y="140" fill="#444">gauge-field-as-rule-type;</text>
    <text x="170" y="155" fill="#444">interface gauge invariance</text>
    <text x="530" y="140" fill="#a05a00">coupling constants e, g;</text>
    <text x="530" y="155" fill="#a05a00">gauge-group choice</text>

    <!-- T18 -->
    <text x="100" y="184" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T18</text>
    <text x="170" y="182" fill="#444">V1 forward-cone-only support;</text>
    <text x="170" y="197" fill="#444">microscopic arrow of time</text>
    <text x="530" y="182" fill="#a05a00">V1 width function;</text>
    <text x="530" y="197" fill="#a05a00">temporal-moment magnitudes</text>

    <!-- T19 -->
    <text x="100" y="226" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T19</text>
    <text x="170" y="224" fill="#444">G = c³ ℓ_P² / ℏ  (FORCED+DERIVED)</text>
    <text x="170" y="239" fill="#444">inverse-square form</text>
    <text x="530" y="224" fill="#a05a00">substrate inputs ℏ, c, ℓ_P</text>
    <text x="530" y="239" fill="#a05a00">(value DERIVED from inputs)</text>

    <!-- T20 -->
    <text x="100" y="268" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T20</text>
    <text x="170" y="266" fill="#444">a₀ = c H₀ / (2π) (FORCED+DERIVED)</text>
    <text x="170" y="281" fill="#444">2π azimuthal period FORCED</text>
    <text x="530" y="266" fill="#a05a00">substrate input H₀;</text>
    <text x="530" y="281" fill="#a05a00">~15% Hubble-tension band</text>

    <!-- ECR -->
    <text x="100" y="310" text-anchor="middle" font-weight="bold" fill="#1a4f8b">ECR</text>
    <text x="170" y="308" fill="#444">a = √(a_N · a₀);</text>
    <text x="170" y="323" fill="#444">geometric-mean composition</text>
    <text x="530" y="308" fill="#a05a00">specific shape of μ(x)</text>
    <text x="530" y="323" fill="#a05a00">interpolation function</text>

    <!-- T21 -->
    <text x="100" y="352" text-anchor="middle" font-weight="bold" fill="#1a4f8b">T21</text>
    <text x="170" y="350" fill="#444">v⁴ = G M_b a₀ slope-4 BTFR</text>
    <text x="170" y="365" fill="#444">zero intrinsic scatter prediction</text>
    <text x="530" y="350" fill="#a05a00">galaxy-by-galaxy M_b</text>
    <text x="530" y="365" fill="#a05a00">measurement uncertainty</text>

    <!-- N1 -->
    <text x="100" y="394" text-anchor="middle" font-weight="bold" fill="#1a4f8b">N1</text>
    <text x="170" y="392" fill="#444">finite-width V1 vacuum kernel;</text>
    <text x="170" y="407" fill="#444">chain-sourced</text>
    <text x="530" y="392" fill="#a05a00">specific width function;</text>
    <text x="530" y="407" fill="#a05a00">first/second moments</text>

    <!-- GR1 -->
    <text x="100" y="436" text-anchor="middle" font-weight="bold" fill="#1a4f8b">GR1</text>
    <text x="170" y="434" fill="#444">curved-spacetime V1 retarded;</text>
    <text x="170" y="449" fill="#444">Hadamard parametrix structure</text>
    <text x="530" y="434" fill="#a05a00">Hadamard expansion coeffs;</text>
    <text x="530" y="449" fill="#a05a00">Synge function specifics</text>

    <!-- DCGT -->
    <text x="100" y="478" text-anchor="middle" font-weight="bold" fill="#1a4f8b">DCGT</text>
    <text x="170" y="476" fill="#444">substrate→continuum bridge;</text>
    <text x="170" y="491" fill="#444">multi-scale expansion structure</text>
    <text x="530" y="476" fill="#a05a00">α prefactor in Γ_cross;</text>
    <text x="530" y="491" fill="#a05a00">specific kernel shapes</text>

    <!-- UR-1 -->
    <text x="100" y="520" text-anchor="middle" font-weight="bold" fill="#1a4f8b">UR-1</text>
    <text x="170" y="518" fill="#444">three-condition exhaustiveness;</text>
    <text x="170" y="533" fill="#444">three-class A/B/C taxonomy</text>
    <text x="530" y="518" fill="#a05a00">𝓜_crit, Γ_min, Λ_V1, N_corr;</text>
    <text x="530" y="533" fill="#a05a00">μ(x), κ(x) shapes; f-functions</text>
  </g>

  <!-- Footer -->
  <text x="450" y="580" text-anchor="middle" font-size="10" fill="#666" font-style="italic">All structural form FORCED at substrate level; numerical content INHERITED or DERIVED from substrate inputs (ℏ, c, H₀, ℓ_P)</text>
</svg>
