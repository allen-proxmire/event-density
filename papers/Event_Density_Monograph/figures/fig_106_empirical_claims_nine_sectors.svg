  <text x="290" y="480" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="12">3</text>
  <text x="390" y="480" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">13</text>
  <text x="490" y="480" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="12">3</text>
  <text x="590" y="480" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="12">17</text>
  <text x="690" y="480" text-anchor="middle" font-weight="bold" fill="#888" font-size="12">4</text>
  <text x="800" y="480" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">40</text>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Empirical coverage is broad: every sector contributes at least one prediction. QC is the most active sector by entry count.</text>
  <text x="450" y="560" text-anchor="middle" font-size="11" fill="#444" font-style="italic">PASSED entries: dwarf-galaxy Active>Quiet (Ch. 11), UDM β (Ch. 10), multi-timescale photonics (Ch. 7).</text>
