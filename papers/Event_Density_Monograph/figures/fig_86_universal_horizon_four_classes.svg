<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 13.2 — Universal horizon mechanism across four BH classes</text>

  <!-- Common substrate mechanism at top -->
  <rect x="220" y="60" width="460" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="88" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">Universal mechanism: Σ_H formation</text>
  <line x1="240" y1="98" x2="660" y2="98" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="118" text-anchor="middle" fill="#fff" font-size="11">Γ_cross collapse on a closed surface</text>
  <text x="450" y="134" text-anchor="middle" fill="#fff" font-size="10" font-style="italic">substrate-derived; same mechanism in all four BH classes</text>

  <!-- Four arrows down to four classes -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="320" y1="140" x2="155" y2="195"/>
    <line x1="400" y1="140" x2="370" y2="195"/>
    <line x1="500" y1="140" x2="530" y2="195"/>
    <line x1="580" y1="140" x2="745" y2="195"/>
  </g>

  <!-- Four BH classes -->
  <rect x="40" y="205" width="225" height="265" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="152" y="230" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Class 1: Schwarzschild</text>
  <text x="152" y="248" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">non-rotating, uncharged</text>
  <line x1="55" y1="258" x2="250" y2="258" stroke="#a05a00" stroke-width="0.8"/>
  <text x="152" y="282" text-anchor="middle" font-size="11" fill="#444">spherical Σ_H</text>
  <text x="152" y="300" text-anchor="middle" font-size="11" fill="#444">at radius r_s = 2GM/c²</text>
  <text x="152" y="328" text-anchor="middle" font-size="11" fill="#444">substrate radial</text>
  <text x="152" y="346" text-anchor="middle" font-size="11" fill="#444">Γ_cross gradient</text>
  <text x="152" y="380" text-anchor="middle" font-size="10" fill="#666" font-style="italic">simplest case;</text>
  <text x="152" y="396" text-anchor="middle" font-size="10" fill="#666" font-style="italic">decoupling on r = r_s</text>
  <text x="152" y="425" text-anchor="middle" font-size="10" fill="#666" font-style="italic">topological label</text>
  <text x="152" y="441" text-anchor="middle" font-size="10" fill="#666" font-style="italic">𝓣 = sphere</text>
  <text x="152" y="458" text-anchor="middle" font-size="10" fill="#666" font-style="italic">— BH-1 base case</text>

  <rect x="275" y="205" width="225" height="265" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="387" y="230" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Class 2: Reissner–Nordström</text>
  <text x="387" y="248" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">non-rotating, charged</text>
  <line x1="290" y1="258" x2="485" y2="258" stroke="#a05a00" stroke-width="0.8"/>
  <text x="387" y="282" text-anchor="middle" font-size="11" fill="#444">two concentric Σ_H</text>
  <text x="387" y="300" text-anchor="middle" font-size="11" fill="#444">(outer + inner)</text>
  <text x="387" y="328" text-anchor="middle" font-size="11" fill="#444">T17 U(1) coupling</text>
  <text x="387" y="346" text-anchor="middle" font-size="11" fill="#444">modulates Γ_cross</text>
  <text x="387" y="380" text-anchor="middle" font-size="10" fill="#666" font-style="italic">extremal case</text>
  <text x="387" y="396" text-anchor="middle" font-size="10" fill="#666" font-style="italic">at Q = M (G=c=1)</text>
  <text x="387" y="425" text-anchor="middle" font-size="10" fill="#666" font-style="italic">topological label</text>
  <text x="387" y="441" text-anchor="middle" font-size="10" fill="#666" font-style="italic">𝓣 = nested-sphere</text>
  <text x="387" y="458" text-anchor="middle" font-size="10" fill="#666" font-style="italic">— BHPT phase-shift Δ_charge</text>

  <rect x="510" y="205" width="225" height="265" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="622" y="230" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Class 3: Kerr</text>
  <text x="622" y="248" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">rotating, uncharged</text>
  <line x1="525" y1="258" x2="720" y2="258" stroke="#a05a00" stroke-width="0.8"/>
  <text x="622" y="282" text-anchor="middle" font-size="11" fill="#444">oblate Σ_H</text>
  <text x="622" y="300" text-anchor="middle" font-size="11" fill="#444">+ ergosurface</text>
  <text x="622" y="328" text-anchor="middle" font-size="11" fill="#444">Δφ_twist accumulated</text>
  <text x="622" y="346" text-anchor="middle" font-size="11" fill="#444">frame-dragging vorticity</text>
  <text x="622" y="380" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Penrose process,</text>
  <text x="622" y="396" text-anchor="middle" font-size="10" fill="#666" font-style="italic">superradiance</text>
  <text x="622" y="425" text-anchor="middle" font-size="10" fill="#666" font-style="italic">topological label</text>
  <text x="622" y="441" text-anchor="middle" font-size="10" fill="#666" font-style="italic">𝓣 = oblate-spheroid</text>
  <text x="622" y="458" text-anchor="middle" font-size="10" fill="#666" font-style="italic">— Kerr extension</text>

  <rect x="745" y="205" width="115" height="265" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="802" y="230" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Class 4: Kerr–Newman</text>
  <text x="802" y="248" text-anchor="middle" font-size="10" fill="#a05a00" font-style="italic">rotating + charged</text>
  <line x1="755" y1="258" x2="850" y2="258" stroke="#a05a00" stroke-width="0.8"/>
  <text x="802" y="282" text-anchor="middle" font-size="10" fill="#444">combined</text>
  <text x="802" y="298" text-anchor="middle" font-size="10" fill="#444">classes 2 + 3</text>
  <text x="802" y="328" text-anchor="middle" font-size="10" fill="#444">most general</text>
  <text x="802" y="344" text-anchor="middle" font-size="10" fill="#444">stationary BH</text>
  <text x="802" y="378" text-anchor="middle" font-size="10" fill="#666" font-style="italic">all four substrate</text>
  <text x="802" y="394" text-anchor="middle" font-size="10" fill="#666" font-style="italic">channels active</text>
  <text x="802" y="425" text-anchor="middle" font-size="10" fill="#666" font-style="italic">𝓣 = nested-</text>
  <text x="802" y="441" text-anchor="middle" font-size="10" fill="#666" font-style="italic">oblate-spheroid</text>

  <!-- Footer -->
  <rect x="40" y="490" width="820" height="90" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="513" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the universal mechanism</text>
  <text x="60" y="535" font-size="11" fill="#444">All four BH classes share one substrate-level horizon-formation mechanism: Γ_cross collapse on a closed surface.</text>
  <text x="60" y="553" font-size="11" fill="#444">Differences between classes are topological labels 𝓣 (sphere / nested / oblate / nested-oblate) and substrate channels active.</text>
  <text x="60" y="572" font-size="11" fill="#444" font-style="italic">No class-specific substrate primitive invoked. Charge contribution via T17 U(1); rotation via Kerr-twist accumulated frame-dragging.</text>
</svg>
