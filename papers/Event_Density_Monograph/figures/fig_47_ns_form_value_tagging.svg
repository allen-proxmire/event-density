<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 8.6 — Form-FORCED vs Value-INHERITED at Navier–Stokes</text>

  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural NS content from DCGT + V1</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="55" rx="4"/>
    <rect x="60" y="200" width="340" height="55" rx="4"/>
    <rect x="60" y="265" width="340" height="55" rx="4"/>
    <rect x="60" y="330" width="340" height="55" rx="4"/>
    <rect x="60" y="395" width="340" height="55" rx="4"/>
    <rect x="60" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="158" font-weight="bold">Viscous-term form ν ∇²v</text>
    <text x="80" y="178" font-size="11">leading-order DCGT output</text>
    <text x="80" y="223" font-weight="bold">R1 hyperviscous form ∇⁴v</text>
    <text x="80" y="243" font-size="11">first subleading order; substrate-cutoff</text>
    <text x="80" y="288" font-weight="bold">Advection-as-non-ED classification</text>
    <text x="80" y="308" font-size="11">three-angle convergence (Fig. 8.3)</text>
    <text x="80" y="353" font-weight="bold">Vortex-stretching obstruction</text>
    <text x="80" y="373" font-size="11">R1 mechanism prevents singularity</text>
    <text x="80" y="418" font-weight="bold">H1 / H2 / H3 turbulence hypotheses HOLD</text>
    <text x="80" y="438" font-size="11">cascade + Kolmogorov + intermittency</text>
    <text x="80" y="483" font-weight="bold">Path-C smoothness verdict</text>
    <text x="80" y="503" font-size="11">conditional-positive in NS+R1</text>
  </g>

  <!-- RIGHT: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">specific values calibrated empirically</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="55" rx="4"/>
    <rect x="500" y="200" width="340" height="55" rx="4"/>
    <rect x="500" y="265" width="340" height="55" rx="4"/>
    <rect x="500" y="330" width="340" height="55" rx="4"/>
    <rect x="500" y="395" width="340" height="55" rx="4"/>
    <rect x="500" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="158" font-weight="bold">Viscosity coefficient ν</text>
    <text x="520" y="178" font-size="11">fluid-specific empirical value</text>
    <text x="520" y="223" font-weight="bold">R1 prefactor κ μ_V1</text>
    <text x="520" y="243" font-size="11">V1 width INHERITED from N1</text>
    <text x="520" y="288" font-weight="bold">Density ρ, pressure p (constitutive)</text>
    <text x="520" y="308" font-size="11">equation-of-state empirical</text>
    <text x="520" y="353" font-weight="bold">Reynolds number Re thresholds</text>
    <text x="520" y="373" font-size="11">turbulence onset, drag scaling</text>
    <text x="520" y="418" font-weight="bold">Boundary / initial conditions</text>
    <text x="520" y="438" font-size="11">problem-specific continuum-imposed</text>
    <text x="520" y="483" font-weight="bold">External forcing f, body forces</text>
    <text x="520" y="503" font-size="11">externally specified, not derived</text>
  </g>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">NS structural content FORCED by DCGT + V1 finite width;</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">fluid-specific coefficients and conditions INHERITED.</text>
</svg>
