<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 6.6 — Form-FORCED vs Value-INHERITED at form-level QFT</text>

  <!-- Vertical divider -->
  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT column: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural results from substrate primitives</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="55" rx="4"/>
    <rect x="60" y="200" width="340" height="55" rx="4"/>
    <rect x="60" y="265" width="340" height="55" rx="4"/>
    <rect x="60" y="330" width="340" height="55" rx="4"/>
    <rect x="60" y="395" width="340" height="55" rx="4"/>
    <rect x="60" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="158" font-weight="bold">Existence of gauge field for any rule-type</text>
    <text x="80" y="178" font-size="11">T17 — Abelian and non-Abelian</text>
    <text x="80" y="223" font-weight="bold">Gauge invariance as interface property</text>
    <text x="80" y="243" font-size="11">relabel-preserving symmetry FORCED</text>
    <text x="80" y="288" font-weight="bold">Minimal-coupling interaction form</text>
    <text x="80" y="308" font-size="11">Lorentz force on charged matter from T17</text>
    <text x="80" y="353" font-weight="bold">Substrate UV-finiteness</text>
    <text x="80" y="373" font-size="11">P01 + N1 V1 finite kernel width</text>
    <text x="80" y="418" font-weight="bold">Retarded propagator structure</text>
    <text x="80" y="438" font-size="11">T18 forward-cone-only support</text>
    <text x="80" y="483" font-weight="bold">Channel-geometry reading of QI</text>
    <text x="80" y="503" font-size="11">five landmarks via ED-I-13 vocabulary</text>
  </g>

  <!-- RIGHT column: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">numerical content calibrated empirically</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="55" rx="4"/>
    <rect x="500" y="200" width="340" height="55" rx="4"/>
    <rect x="500" y="265" width="340" height="55" rx="4"/>
    <rect x="500" y="330" width="340" height="55" rx="4"/>
    <rect x="500" y="395" width="340" height="55" rx="4"/>
    <rect x="500" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="158" font-weight="bold">Gauge coupling constants</text>
    <text x="520" y="178" font-size="11">e, g, α, fine-structure values</text>
    <text x="520" y="223" font-weight="bold">Choice of rule-type (gauge group)</text>
    <text x="520" y="243" font-size="11">U(1) vs SU(2) vs SU(3) per sector</text>
    <text x="520" y="288" font-weight="bold">Specific spectra of bound states</text>
    <text x="520" y="308" font-size="11">depend on Hamiltonian + couplings</text>
    <text x="520" y="353" font-weight="bold">Exact V1 width function</text>
    <text x="520" y="373" font-size="11">kernel shape INHERITED from N1</text>
    <text x="520" y="418" font-weight="bold">Scattering cross-sections</text>
    <text x="520" y="438" font-size="11">numerical content from couplings + kinematics</text>
    <text x="520" y="483" font-weight="bold">Decoherence rates per system</text>
    <text x="520" y="503" font-size="11">platform-specific empirical anchors</text>
  </g>

  <!-- Footer note -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">All structural QFT content is form-FORCED at substrate level;</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">specific numerical content (couplings, spectra, cross-sections) is value-INHERITED.</text>
</svg>
