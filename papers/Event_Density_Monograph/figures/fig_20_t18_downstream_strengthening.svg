<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 4.5 — T18 downstream strengthening across closed arcs</text>

  <!-- T18 hub at top center -->
  <rect x="320" y="60" width="260" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">Theorem 18</text>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="11">V1 retarded — kernel-arrow</text>
  <text x="450" y="128" text-anchor="middle" fill="#fff" font-size="10" font-style="italic">forward-cone-only support</text>

  <!-- Four downstream arc nodes -->
  <!-- QFT (Ch. 6) -->
  <rect x="40" y="240" width="180" height="160" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="130" y="265" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Form-level QFT  (Ch. 6)</text>
  <line x1="55" y1="276" x2="205" y2="276" stroke="#a05a00" stroke-width="0.8"/>
  <text x="130" y="298" text-anchor="middle" font-size="11" fill="#444">retarded propagator</text>
  <text x="130" y="315" text-anchor="middle" font-size="11" fill="#444">microscopic causal structure</text>
  <text x="130" y="332" text-anchor="middle" font-size="11" fill="#444">substrate UV-finiteness</text>
  <text x="130" y="365" text-anchor="middle" font-size="10" fill="#666" font-style="italic">T18 supplies the</text>
  <text x="130" y="382" text-anchor="middle" font-size="10" fill="#666" font-style="italic">causal structure</text>

  <!-- NS R1 (Ch. 8) -->
  <rect x="240" y="240" width="180" height="160" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="330" y="265" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">NS R1  (Ch. 8)</text>
  <line x1="255" y1="276" x2="405" y2="276" stroke="#a05a00" stroke-width="0.8"/>
  <text x="330" y="298" text-anchor="middle" font-size="11" fill="#444">substrate-cutoff regularization</text>
  <text x="330" y="315" text-anchor="middle" font-size="11" fill="#444">−κ μ_V1 ℓ_P² ∇⁴ v</text>
  <text x="330" y="332" text-anchor="middle" font-size="11" fill="#444">vortex-stretching obstruction</text>
  <text x="330" y="365" text-anchor="middle" font-size="10" fill="#666" font-style="italic">V1 finite-width inherited</text>
  <text x="330" y="382" text-anchor="middle" font-size="10" fill="#666" font-style="italic">via DCGT to R1</text>

  <!-- YM mass-gap (Ch. 9) -->
  <rect x="440" y="240" width="180" height="160" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="530" y="265" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">YM mass-gap  (Ch. 9)</text>
  <line x1="455" y1="276" x2="605" y2="276" stroke="#a05a00" stroke-width="0.8"/>
  <text x="530" y="298" text-anchor="middle" font-size="11" fill="#444">V1 second-moment +</text>
  <text x="530" y="315" text-anchor="middle" font-size="11" fill="#444">non-Abelian quartic</text>
  <text x="530" y="332" text-anchor="middle" font-size="11" fill="#444">stabilization mechanism</text>
  <text x="530" y="365" text-anchor="middle" font-size="10" fill="#666" font-style="italic">retarded V1 underwrites</text>
  <text x="530" y="382" text-anchor="middle" font-size="10" fill="#666" font-style="italic">spectral-gap structure</text>

  <!-- BH (GR1) (Ch. 13) -->
  <rect x="640" y="240" width="180" height="160" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="730" y="265" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">BH / GR1  (Chs. 12–13)</text>
  <line x1="655" y1="276" x2="805" y2="276" stroke="#a05a00" stroke-width="0.8"/>
  <text x="730" y="298" text-anchor="middle" font-size="11" fill="#444">curved-spacetime V1</text>
  <text x="730" y="315" text-anchor="middle" font-size="11" fill="#444">via Hadamard parametrix</text>
  <text x="730" y="332" text-anchor="middle" font-size="11" fill="#444">decoupling-surface structure</text>
  <text x="730" y="365" text-anchor="middle" font-size="10" fill="#666" font-style="italic">forward-cone-only support</text>
  <text x="730" y="382" text-anchor="middle" font-size="10" fill="#666" font-style="italic">extended along geodesics</text>

  <!-- Arrows from T18 to each arc -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="370" y1="142" x2="160" y2="240"/>
    <line x1="410" y1="142" x2="320" y2="240"/>
    <line x1="490" y1="142" x2="520" y2="240"/>
    <line x1="530" y1="142" x2="710" y2="240"/>
  </g>

  <!-- Footer -->
  <rect x="40" y="430" width="820" height="150" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="455" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the strengthening map</text>
  <text x="60" y="478" font-size="11" fill="#444">T18's forward-cone-only V1 kernel is an upstream load-bearing input for at least four downstream closed arcs.</text>
  <text x="60" y="496" font-size="11" fill="#444">Each arc inherits a different aspect of T18: the QFT propagator inherits its causal structure; NS inherits the V1 width</text>
  <text x="60" y="514" font-size="11" fill="#444">that DCGT promotes to R1; YM inherits the V1 second-moment underwriting the mass-gap; BH/GR1 inherits the</text>
  <text x="60" y="532" font-size="11" fill="#544">retardation extended to curved spacetime.</text>
  <text x="60" y="556" font-size="11" fill="#444" font-style="italic">A change to T18 would cascade through all four arcs simultaneously — a structural test of T18's correctness.</text>
  <text x="60" y="574" font-size="11" fill="#444" font-style="italic">No alternative kernel-arrow account in the literature is upstream of this many independent sectors.</text>
</svg>
