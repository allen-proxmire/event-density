<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 13.7 — BH area law: form FORCED, coefficient INHERITED</text>

  <!-- Top: equation banner -->
  <rect x="40" y="60" width="820" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="100" text-anchor="middle" fill="#fff" font-weight="bold" font-size="22">S  =  ( A / ℓ_P² ) · log g</text>
  <text x="450" y="125" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">substrate-derived BH area law</text>

  <!-- Two-column decomposition: form (left) vs coefficient (right) -->

  <!-- LEFT: form FORCED -->
  <rect x="40" y="170" width="380" height="305" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="230" y="195" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">Form FORCED:  A / ℓ_P²</text>
  <text x="230" y="213" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">substrate motif counting</text>
  <line x1="55" y1="223" x2="405" y2="223" stroke="#1a4f8b" stroke-width="0.8"/>

  <text x="230" y="252" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">Why proportional to area, not volume?</text>

  <g fill="#444" font-size="11">
    <text x="60" y="282">• Σ_H is a 2-surface;</text>
    <text x="60" y="300">  substrate motifs live on Σ_H</text>
    <text x="60" y="322">• motif count ~ A / (substrate cell area)</text>
    <text x="60" y="340">  with cell area ~ ℓ_P²</text>
    <text x="60" y="362">• holographic count bound (T19 input)</text>
    <text x="60" y="380">• area-law form FORCED by P01 + DCGT</text>
  </g>

  <text x="230" y="425" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">No alternative scaling admissible:</text>
  <text x="230" y="443" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">substrate cell counting on Σ_H</text>
  <text x="230" y="460" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">FORCES area scaling</text>

  <!-- RIGHT: coefficient INHERITED -->
  <rect x="480" y="170" width="380" height="305" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="670" y="195" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">Coefficient INHERITED:  log g</text>
  <text x="670" y="213" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">substrate motif-count base</text>
  <line x1="495" y1="223" x2="845" y2="223" stroke="#a05a00" stroke-width="0.8"/>

  <text x="670" y="252" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">Why is log g INHERITED?</text>

  <g fill="#444" font-size="11">
    <text x="500" y="282">• log g depends on which substrate</text>
    <text x="500" y="300">  motifs are admissible at Σ_H</text>
    <text x="500" y="322">• closed-form derivation requires</text>
    <text x="500" y="340">  enumeration of motif classes</text>
    <text x="500" y="362">• not derived in current scope</text>
    <text x="500" y="380">• designated O2 in Arc BH open targets</text>
  </g>

  <text x="670" y="420" text-anchor="middle" font-size="13" fill="#a05a00" font-weight="bold">Empirical match:</text>
  <text x="670" y="442" text-anchor="middle" font-size="12" fill="#444">log g ≈ 1/4  →  g ≈ 1.28</text>
  <text x="670" y="462" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">non-integer base; Bekenstein–Hawking match</text>

  <!-- Footer -->
  <rect x="40" y="495" width="820" height="85" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="518" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the area law</text>
  <text x="60" y="540" font-size="11" fill="#444">The structural form A/ℓ_P² is FORCED by substrate motif counting; the prefactor log g is INHERITED.</text>
  <text x="60" y="558" font-size="11" fill="#444">The empirical match log g ≈ 1/4 corresponds to g ≈ 1.28 — a non-integer motif-count base.</text>
  <text x="60" y="576" font-size="11" fill="#444" font-style="italic">Closed-form-substrate-constants program (O2 from Arc BH, alongside O-QC-1 𝓜_crit and E4 κ/|N̂'|).</text>
</svg>
