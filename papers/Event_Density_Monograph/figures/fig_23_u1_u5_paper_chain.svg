<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 5.2 — The U1–U5 derivation chain</text>
  <text x="450" y="50" text-anchor="middle" font-size="12" fill="#666" font-style="italic">substrate → state-vector formalism → Hilbert space → Schrödinger generator → momentum</text>

  <!-- Five paper boxes in a horizontal chain -->
  <!-- y=130, h=130, x=40 to 860, 5 boxes of 145 width with 25 gap -->

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="40" y="130" width="145" height="220" rx="6"/>
    <rect x="210" y="130" width="145" height="220" rx="6"/>
    <rect x="380" y="130" width="145" height="220" rx="6"/>
    <rect x="550" y="130" width="145" height="220" rx="6"/>
    <rect x="720" y="130" width="145" height="220" rx="6"/>
  </g>

  <!-- U1 -->
  <text x="112" y="158" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">U1</text>
  <text x="112" y="178" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Participation</text>
  <text x="112" y="194" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Measure</text>
  <line x1="60" y1="205" x2="165" y2="205" stroke="#1a4f8b" stroke-width="0.8"/>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="112" y="225">substrate-derived</text>
    <text x="112" y="240">participation-measure</text>
    <text x="112" y="255">structure</text>
    <text x="112" y="278">underlies state-vector</text>
    <text x="112" y="293">formalism</text>
  </g>
  <text x="112" y="335" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/U1_*</text>

  <!-- U2 -->
  <text x="282" y="158" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">U2</text>
  <text x="282" y="178" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Inner</text>
  <text x="282" y="194" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Product</text>
  <line x1="230" y1="205" x2="335" y2="205" stroke="#1a4f8b" stroke-width="0.8"/>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="282" y="225">inner-product</text>
    <text x="282" y="240">structure on the</text>
    <text x="282" y="255">participation-state</text>
    <text x="282" y="278">space — makes</text>
    <text x="282" y="293">Hilbert space</text>
    <text x="282" y="308">the appropriate target</text>
  </g>
  <text x="282" y="335" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/U2_*</text>

  <!-- U3 -->
  <text x="452" y="158" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">U3</text>
  <text x="452" y="178" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Time-Translation</text>
  <text x="452" y="194" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Schrödinger</text>
  <line x1="400" y1="205" x2="505" y2="205" stroke="#1a4f8b" stroke-width="0.8"/>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="452" y="225">time-translation</text>
    <text x="452" y="240">symmetry</text>
    <text x="452" y="255">+ Stone (1932)</text>
    <text x="452" y="278">→ Schrödinger generator</text>
    <text x="452" y="293">linear, first-order</text>
  </g>
  <text x="452" y="335" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/U3_*</text>

  <!-- U4 -->
  <text x="622" y="158" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">U4</text>
  <text x="622" y="178" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Hamiltonian</text>
  <text x="622" y="194" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Form</text>
  <line x1="570" y1="205" x2="675" y2="205" stroke="#1a4f8b" stroke-width="0.8"/>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="622" y="225">substrate-level</text>
    <text x="622" y="240">form of the</text>
    <text x="622" y="255">Hamiltonian</text>
    <text x="622" y="278">self-adjoint generator</text>
    <text x="622" y="293">structure derived</text>
  </g>
  <text x="622" y="335" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/U4_*</text>

  <!-- U5 -->
  <text x="792" y="158" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">U5</text>
  <text x="792" y="178" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Translation</text>
  <text x="792" y="194" text-anchor="middle" fill="#1a4f8b" font-size="11" font-weight="bold">Momentum</text>
  <line x1="740" y1="205" x2="845" y2="205" stroke="#1a4f8b" stroke-width="0.8"/>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="792" y="225">spatial translations</text>
    <text x="792" y="240">canonical commutator</text>
    <text x="792" y="255">[x, p] = iℏ</text>
    <text x="792" y="278">substrate momentum</text>
    <text x="792" y="293">content identified</text>
  </g>
  <text x="792" y="335" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/U5_*</text>

  <!-- Connecting arrows -->
  <g stroke="#1a4f8b" stroke-width="1.8" fill="none" marker-end="url(#arr)">
    <line x1="185" y1="240" x2="210" y2="240"/>
    <line x1="355" y1="240" x2="380" y2="240"/>
    <line x1="525" y1="240" x2="550" y2="240"/>
    <line x1="695" y1="240" x2="720" y2="240"/>
  </g>

  <!-- Output panel -->
  <rect x="40" y="400" width="820" height="120" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="428" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Output of the U1–U5 chain</text>
  <line x1="60" y1="438" x2="840" y2="438" stroke="#fff" stroke-width="0.8"/>
  <g fill="#fff" font-size="12">
    <text x="60" y="463">• state-vector formalism, Hilbert-space inner product, Schrödinger evolution, Hamiltonian form, canonical commutator</text>
    <text x="60" y="483">• every standard QM construction recovered structurally; the four QM postulates derived (T1–T16)</text>
    <text x="60" y="503">• specific spectra, representation choices, and absolute scales remain value-INHERITED</text>
  </g>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Each U-paper is an arrow in the substrate-to-formalism chain. Skipping any one leaves the chain incomplete.</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Canonical sources: papers/U1_Participation_Measure/ through papers/U5_Translation_Momentum/</text>
</svg>
