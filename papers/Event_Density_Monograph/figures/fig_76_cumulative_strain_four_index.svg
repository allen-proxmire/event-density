<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 12.2 — Substrate cumulative-strain four-index object</text>

  <!-- Top: substrate strain object -->
  <rect x="220" y="60" width="460" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="92" text-anchor="middle" fill="#fff" font-weight="bold" font-size="18">S^μν_αβ  (substrate strain)</text>
  <line x1="240" y1="102" x2="660" y2="102" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="123" text-anchor="middle" fill="#fff" font-size="11">substrate cumulative-strain four-index tensor</text>
  <text x="450" y="142" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">DCGT-coarse-grained from substrate participation gradients</text>

  <!-- Index decomposition (four panels) -->
  <text x="450" y="195" text-anchor="middle" font-size="12" fill="#444" font-weight="bold">Index roles</text>

  <rect x="40" y="215" width="200" height="180" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="140" y="240" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">μ</text>
  <line x1="55" y1="250" x2="225" y2="250" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="140" y="278" text-anchor="middle" font-size="11" fill="#444">spacetime direction</text>
  <text x="140" y="296" text-anchor="middle" font-size="11" fill="#444">of strain response</text>
  <text x="140" y="328" text-anchor="middle" font-size="10" fill="#666" font-style="italic">where strain is felt</text>
  <text x="140" y="362" text-anchor="middle" font-size="10" fill="#1a4f8b">downstream:</text>
  <text x="140" y="378" text-anchor="middle" font-size="10" fill="#1a4f8b">→ ∇^μ Φ in eq.</text>

  <rect x="250" y="215" width="200" height="180" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="350" y="240" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">ν</text>
  <line x1="265" y1="250" x2="435" y2="250" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="350" y="278" text-anchor="middle" font-size="11" fill="#444">spacetime direction</text>
  <text x="350" y="296" text-anchor="middle" font-size="11" fill="#444">of source coupling</text>
  <text x="350" y="328" text-anchor="middle" font-size="10" fill="#666" font-style="italic">where mass couples</text>
  <text x="350" y="362" text-anchor="middle" font-size="10" fill="#1a4f8b">downstream:</text>
  <text x="350" y="378" text-anchor="middle" font-size="10" fill="#1a4f8b">→ T_μν in eq.</text>

  <rect x="460" y="215" width="200" height="180" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="560" y="240" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">α</text>
  <line x1="475" y1="250" x2="645" y2="250" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="560" y="278" text-anchor="middle" font-size="11" fill="#444">substrate-participation</text>
  <text x="560" y="296" text-anchor="middle" font-size="11" fill="#444">gradient direction</text>
  <text x="560" y="328" text-anchor="middle" font-size="10" fill="#666" font-style="italic">how ρ varies</text>
  <text x="560" y="362" text-anchor="middle" font-size="10" fill="#1a4f8b">downstream:</text>
  <text x="560" y="378" text-anchor="middle" font-size="10" fill="#1a4f8b">→ ∇_α Φ in eq.</text>

  <rect x="670" y="215" width="200" height="180" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="770" y="240" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">β</text>
  <line x1="685" y1="250" x2="855" y2="250" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="770" y="278" text-anchor="middle" font-size="11" fill="#444">substrate-participation</text>
  <text x="770" y="296" text-anchor="middle" font-size="11" fill="#444">cumulative direction</text>
  <text x="770" y="328" text-anchor="middle" font-size="10" fill="#666" font-style="italic">accumulation axis</text>
  <text x="770" y="362" text-anchor="middle" font-size="10" fill="#1a4f8b">downstream:</text>
  <text x="770" y="378" text-anchor="middle" font-size="10" fill="#1a4f8b">→ ∇_β Φ in eq.</text>

  <!-- Arrow down to covariantized field equation -->
  <line x1="450" y1="395" x2="450" y2="430" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Output: covariantized equation -->
  <rect x="120" y="440" width="660" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="465" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Contracted into the covariantized field equation</text>
  <line x1="135" y1="475" x2="765" y2="475" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="500" text-anchor="middle" font-size="13" fill="#a05a00" font-weight="bold">∇_μ [μ(√(g^αβ ∇_α Φ ∇_β Φ)/a₀) ∇^μ Φ] = 4πG T</text>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">The four indices index four substrate degrees of freedom: response direction, source coupling, gradient direction, accumulation direction.</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Contraction with the acoustic metric g^αβ_ac yields the scalar quantity entering the modified Poisson covariantization.</text>
</svg>
