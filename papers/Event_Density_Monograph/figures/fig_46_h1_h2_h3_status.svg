  <g fill="#444" font-size="11">
    <text x="155" y="405">Intermittency:</text>
    <text x="155" y="423">deviations from</text>
    <text x="155" y="441">strict Kolmogorov</text>
    <text x="155" y="459">scaling at small</text>
    <text x="155" y="477">scales due to</text>
    <text x="155" y="495">sparse high-σ events</text>
  </g>
  <g text-anchor="middle">
    <rect x="475" y="415" width="170" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
    <text x="560" y="436" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS</text>
    <text x="560" y="475" font-size="10" fill="#444" font-style="italic">consistent with σ-clustering</text>
    <text x="560" y="493" font-size="10" fill="#444" font-style="italic">in substrate gradient</text>
  </g>
  <g fill="#444" font-size="11">
    <text x="675" y="405">gradient sparsity σ</text>
    <text x="675" y="423">distribution governs</text>
    <text x="675" y="441">cross-bandwidth</text>
    <text x="675" y="459">Γ_cross ~ exp[−ασ];</text>
    <text x="675" y="477">non-Gaussian σ events</text>
    <text x="675" y="497" font-style="italic">— Ch. 2, Ch. 8</text>
  </g>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">All three standard turbulence hypotheses HOLD under ED with substrate-cutoff R1 + canonical-ED cascade structure.</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">No new turbulence template introduced; existing phenomenology consistent with substrate machinery (NS-Turb arc closure).</text>
