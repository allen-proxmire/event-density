    <rect x="140" y="60" width="320" height="40"/>
    <rect x="460" y="60" width="200" height="40"/>
    <rect x="660" y="60" width="200" height="40"/>
  </g>
  <g text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">
    <text x="90" y="86">Hypothesis</text>
    <text x="300" y="86">Statement</text>
    <text x="560" y="86">Status under ED</text>
    <text x="760" y="86">Substrate route</text>
  </g>

  <!-- Row H1 -->
  <g fill="#fff" stroke="#888" stroke-width="1">
    <rect x="40" y="100" width="100" height="140"/>
    <rect x="140" y="100" width="320" height="140"/>
    <rect x="460" y="100" width="200" height="140"/>
    <rect x="660" y="100" width="200" height="140"/>
  </g>
  <text x="90" y="170" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">H1</text>
  <g fill="#444" font-size="11">
    <text x="155" y="125">Energy cascade exists</text>
    <text x="155" y="143">at high Reynolds</text>
    <text x="155" y="170">number;</text>
    <text x="155" y="188">dissipation occurs at</text>
    <text x="155" y="206">scales much smaller</text>
    <text x="155" y="224">than energy-injection</text>
  </g>
  <g text-anchor="middle">
    <rect x="475" y="135" width="170" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
    <text x="560" y="156" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS</text>
    <text x="560" y="195" font-size="10" fill="#444" font-style="italic">consistent with ED</text>
    <text x="560" y="213" font-size="10" fill="#444" font-style="italic">+ R1 cutoff at ℓ_P</text>
  </g>
  <g fill="#444" font-size="11">
    <text x="675" y="125">DCGT directional</text>
    <text x="675" y="143">viscosity carries</text>
    <text x="675" y="161">energy across scales;</text>
    <text x="675" y="179">R1 dissipates at</text>
    <text x="675" y="197">substrate cutoff</text>
    <text x="675" y="222" font-style="italic">— Ch. 8, Ch. 3</text>
  </g>

  <!-- Row H2 -->
  <g fill="#fff" stroke="#888" stroke-width="1">
