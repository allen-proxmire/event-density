    <rect x="140" y="240" width="320" height="140"/>
    <rect x="460" y="240" width="200" height="140"/>
    <rect x="660" y="240" width="200" height="140"/>
  </g>
  <text x="90" y="310" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="15">H2</text>
  <g fill="#444" font-size="11">
    <text x="155" y="265">Inertial-range</text>
    <text x="155" y="283">statistics</text>
    <text x="155" y="301">are Kolmogorov:</text>
    <text x="155" y="319">E(k) ~ k^(−5/3)</text>
    <text x="155" y="345">scaling holds</text>
    <text x="155" y="363">in some range</text>
  </g>
  <g text-anchor="middle">
    <rect x="475" y="275" width="170" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
    <text x="560" y="296" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS</text>
    <text x="560" y="335" font-size="10" fill="#444" font-style="italic">at leading DCGT order</text>
    <text x="560" y="353" font-size="10" fill="#444" font-style="italic">in inertial range</text>
  </g>
  <g fill="#444" font-size="11">
    <text x="675" y="265">canonical-ED</text>
    <text x="675" y="283">cascade structure</text>
    <text x="675" y="301">+ scale-invariance</text>
    <text x="675" y="319">in hydrodynamic</text>
    <text x="675" y="337">window range</text>
    <text x="675" y="362" font-style="italic">— Ch. 8</text>
  </g>

