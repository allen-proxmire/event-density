<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 13.4 — The four assumptions whose joint imposition generates the BH paradox cluster</text>

  <!-- Four assumption boxes (2x2 grid) -->

  <rect x="40" y="80" width="395" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="237" y="108" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Assumption A1: Continuous spacetime</text>
  <line x1="55" y1="118" x2="420" y2="118" stroke="#a05a00" stroke-width="0.8"/>
  <text x="237" y="142" text-anchor="middle" font-size="11" fill="#444">spacetime is a smooth manifold;</text>
  <text x="237" y="160" text-anchor="middle" font-size="11" fill="#444">no smallest length-scale</text>
  <text x="237" y="186" text-anchor="middle" font-size="11" fill="#444" font-style="italic">required for: GR formalism, smooth metric,</text>
  <text x="237" y="204" text-anchor="middle" font-size="11" fill="#444" font-style="italic">curvature divergence at r → 0</text>
  <text x="237" y="232" text-anchor="middle" font-size="11" fill="#a05a00">ED REJECTS via P01 discreteness</text>

  <rect x="465" y="80" width="395" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="662" y="108" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Assumption A2: Pure-state evolution</text>
  <line x1="480" y1="118" x2="845" y2="118" stroke="#a05a00" stroke-width="0.8"/>
  <text x="662" y="142" text-anchor="middle" font-size="11" fill="#444">|ψ⟩ evolves unitarily; no</text>
  <text x="662" y="160" text-anchor="middle" font-size="11" fill="#444">pure-state to mixed-state transition</text>
  <text x="662" y="186" text-anchor="middle" font-size="11" fill="#444" font-style="italic">required for: information conservation,</text>
  <text x="662" y="204" text-anchor="middle" font-size="11" fill="#444" font-style="italic">unitarity-based information paradox</text>
  <text x="662" y="232" text-anchor="middle" font-size="11" fill="#a05a00">ED REPLACES via P11 commitment-irreversibility</text>

  <rect x="40" y="270" width="395" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="237" y="298" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Assumption A3: Universal mode-counting</text>
  <line x1="55" y1="308" x2="420" y2="308" stroke="#a05a00" stroke-width="0.8"/>
  <text x="237" y="332" text-anchor="middle" font-size="11" fill="#444">all matter / radiation modes count</text>
  <text x="237" y="350" text-anchor="middle" font-size="11" fill="#444">equally toward entropy</text>
  <text x="237" y="376" text-anchor="middle" font-size="11" fill="#444" font-style="italic">required for: Bekenstein–Hawking 1/4 coefficient,</text>
  <text x="237" y="394" text-anchor="middle" font-size="11" fill="#444" font-style="italic">universal area-law coupling</text>
  <text x="237" y="422" text-anchor="middle" font-size="11" fill="#a05a00">ED REPLACES via substrate motif counting (log g)</text>

  <rect x="465" y="270" width="395" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="662" y="298" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Assumption A4: Local-only entanglement</text>
  <line x1="480" y1="308" x2="845" y2="308" stroke="#a05a00" stroke-width="0.8"/>
  <text x="662" y="332" text-anchor="middle" font-size="11" fill="#444">entanglement requires local</text>
  <text x="662" y="350" text-anchor="middle" font-size="11" fill="#444">causal connectivity to persist</text>
  <text x="662" y="376" text-anchor="middle" font-size="11" fill="#444" font-style="italic">required for: firewall paradox,</text>
  <text x="662" y="394" text-anchor="middle" font-size="11" fill="#444" font-style="italic">monogamy-based contradictions</text>
  <text x="662" y="422" text-anchor="middle" font-size="11" fill="#a05a00">ED REPLACES via shared-rule-coherence</text>

  <!-- Convergence arrows down to paradox cluster -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="237" y1="250" x2="370" y2="475"/>
    <line x1="662" y1="250" x2="530" y2="475"/>
    <line x1="237" y1="440" x2="380" y2="475"/>
    <line x1="662" y1="440" x2="520" y2="475"/>
  </g>

  <!-- Bottom: paradox cluster summary -->
  <rect x="220" y="485" width="460" height="95" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="510" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">Standard BH paradox cluster</text>
  <line x1="240" y1="520" x2="660" y2="520" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="540" text-anchor="middle" fill="#fff" font-size="11">information paradox · firewall · singularity ·</text>
  <text x="450" y="556" text-anchor="middle" fill="#fff" font-size="11">page-curve / monogamy contradictions</text>
  <text x="450" y="574" text-anchor="middle" fill="#fff" font-size="10" font-style="italic">all generated by joint imposition of A1–A4</text>
</svg>
