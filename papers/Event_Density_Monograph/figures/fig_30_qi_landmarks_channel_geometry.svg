<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 6.3 — Five landmark QI results as channel-geometry manipulations (ED-I-13)</text>

  <!-- Central concept: channel geometry -->
  <rect x="320" y="60" width="260" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="450" y="88" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Channel geometry</text>
  <text x="450" y="108" text-anchor="middle" fill="#fff" font-size="11">substrate participation channels</text>
  <text x="450" y="125" text-anchor="middle" fill="#fff" font-size="11">+ shared rule-coherence</text>

  <!-- Five landmark boxes around it -->
  <!-- Layout: top-left, top-right, middle-left, middle-right, bottom-center -->

  <!-- 1. Entanglement (top-left) -->
  <rect x="40" y="190" width="200" height="120" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="140" y="215" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">1. Entanglement</text>
  <line x1="55" y1="225" x2="225" y2="225" stroke="#a05a00" stroke-width="0.8"/>
  <text x="140" y="248" text-anchor="middle" font-size="11" fill="#444">shared-rule-coherence</text>
  <text x="140" y="265" text-anchor="middle" font-size="11" fill="#444">across separated chains</text>
  <text x="140" y="290" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Bell, EPR, GHZ states</text>

  <!-- 2. No-cloning (top-right) -->
  <rect x="660" y="190" width="200" height="120" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="760" y="215" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">2. No-cloning</text>
  <line x1="675" y1="225" x2="845" y2="225" stroke="#a05a00" stroke-width="0.8"/>
  <text x="760" y="248" text-anchor="middle" font-size="11" fill="#444">channel cannot duplicate</text>
  <text x="760" y="265" text-anchor="middle" font-size="11" fill="#444">a generic substrate rule-state</text>
  <text x="760" y="290" text-anchor="middle" font-size="10" fill="#666" font-style="italic">no-go via P11 + linearity</text>

  <!-- 3. Teleportation (middle-left) -->
  <rect x="40" y="335" width="200" height="120" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="140" y="360" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">3. Teleportation</text>
  <line x1="55" y1="370" x2="225" y2="370" stroke="#a05a00" stroke-width="0.8"/>
  <text x="140" y="393" text-anchor="middle" font-size="11" fill="#444">shared-rule-coherence</text>
  <text x="140" y="410" text-anchor="middle" font-size="11" fill="#444">+ classical channel</text>
  <text x="140" y="435" text-anchor="middle" font-size="10" fill="#666" font-style="italic">channel-geometry transfer</text>

  <!-- 4. Quantum error correction (middle-right) -->
  <rect x="660" y="335" width="200" height="120" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="760" y="360" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">4. Error correction</text>
  <line x1="675" y1="370" x2="845" y2="370" stroke="#a05a00" stroke-width="0.8"/>
  <text x="760" y="393" text-anchor="middle" font-size="11" fill="#444">redundant channel-geometry</text>
  <text x="760" y="410" text-anchor="middle" font-size="11" fill="#444">protects rule-coherence</text>
  <text x="760" y="435" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Class C overlay (Ch. 7)</text>

  <!-- 5. Channel capacity (bottom-center) -->
  <rect x="350" y="475" width="200" height="105" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="498" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">5. Channel capacity</text>
  <line x1="365" y1="508" x2="535" y2="508" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#444">Holevo / quantum-classical</text>
  <text x="450" y="545" text-anchor="middle" font-size="11" fill="#444">capacity bounds</text>
  <text x="450" y="568" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Γ_cross structural ceiling</text>

  <!-- Arrows from central node to landmarks -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="370" y1="140" x2="200" y2="190"/>
    <line x1="530" y1="140" x2="700" y2="190"/>
    <line x1="370" y1="140" x2="200" y2="335"/>
    <line x1="530" y1="140" x2="700" y2="335"/>
    <line x1="450" y1="140" x2="450" y2="475"/>
  </g>

  <!-- Footer (in lower-left/right gap) -->
  <text x="450" y="170" text-anchor="middle" font-size="11" fill="#444" font-style="italic">All five landmarks reduce to manipulations of channel-geometry on substrate participation rules</text>
</svg>
