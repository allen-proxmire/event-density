  <text x="450" y="478" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the Path C verdict for YM</text>
  <text x="60" y="500" font-size="11" fill="#444">Path C delivers a structurally-positive verdict on YM-existence + mass-gap at the level of substrate-derived continuum content.</text>
  <text x="60" y="518" font-size="11" fill="#444">It does not constructively verify Wightman / OS axioms in standard formal-QFT terms; that is Path A or Path B work.</text>
  <text x="60" y="540" font-size="11" fill="#444" font-style="italic">Conditional-positive verdict: YM-existence + mass-gap FORCED in substrate-faithful continuum extensions.</text>
  <text x="60" y="558" font-size="11" fill="#444" font-style="italic">Same Path-C structural-positive pattern as NS smoothness (Figure 8.4) and curvature emergence (Ch. 12).</text>
  <text x="60" y="576" font-size="11" fill="#444" font-style="italic">Conditional on kernel-profile rescaling consistent with substrate-cutoff continuum limit (YM-2 in Yang–Mills arc).</text>
