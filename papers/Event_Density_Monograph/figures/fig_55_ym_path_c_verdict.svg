  <line x1="55" y1="115" x2="295" y2="115" stroke="#888" stroke-width="0.8"/>
  <text x="175" y="138" text-anchor="middle" font-size="11" fill="#444">Wightman / Osterwalder–Schrader</text>
  <text x="175" y="156" text-anchor="middle" font-size="11" fill="#444">axiom verification</text>
  <text x="175" y="178" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">not achieved (Clay open)</text>

  <!-- Path B: lattice → continuum -->
  <rect x="320" y="80" width="270" height="110" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="455" y="105" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">Path B — Lattice continuum limit</text>
