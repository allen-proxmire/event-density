  <!-- Arrow down -->
  <line x1="735" y1="190" x2="735" y2="220" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="450" y="240" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Path C closure structure for YM</text>

  <!-- Three blocks -->
  <rect x="40" y="260" width="270" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="175" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">1. YM equation derived</text>
  <line x1="55" y1="295" x2="295" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="175" y="318" text-anchor="middle" font-size="11" fill="#444">D_μ F^μν = J^ν</text>
  <text x="175" y="336" text-anchor="middle" font-size="11" fill="#444">via DCGT non-Abelian +</text>
  <text x="175" y="354" text-anchor="middle" font-size="11" fill="#444">T17 generalized coupling</text>
  <text x="175" y="376" text-anchor="middle" font-size="11" fill="#444">(Figure 9.4)</text>
  <text x="175" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">substrate-existence</text>
  <text x="175" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">structurally established</text>

  <rect x="320" y="260" width="270" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="455" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">2. Mass-gap mechanism</text>
  <line x1="335" y1="295" x2="575" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="455" y="318" text-anchor="middle" font-size="11" fill="#444">V1 second-moment +</text>
  <text x="455" y="336" text-anchor="middle" font-size="11" fill="#444">non-Abelian quartic</text>
  <text x="455" y="354" text-anchor="middle" font-size="11" fill="#444">stabilization</text>
  <text x="455" y="376" text-anchor="middle" font-size="11" fill="#444">(Figure 9.5)</text>
  <text x="455" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">spectral gap form-FORCED;</text>
  <text x="455" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">m_gap value INHERITED</text>

