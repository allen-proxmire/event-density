  <text x="735" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">3. OS-positivity audit</text>
  <line x1="615" y1="295" x2="855" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="735" y="318" text-anchor="middle" font-size="11" fill="#444">channel-by-channel</text>
  <text x="735" y="336" text-anchor="middle" font-size="11" fill="#444">structural-suggestive</text>
  <text x="735" y="354" text-anchor="middle" font-size="11" fill="#444">positive verdict</text>
  <text x="735" y="376" text-anchor="middle" font-size="11" fill="#444">(YM-3 / YM-6 arc)</text>
  <text x="735" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">not full OS-positivity proof,</text>
  <text x="735" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">but substrate-positive signal</text>

