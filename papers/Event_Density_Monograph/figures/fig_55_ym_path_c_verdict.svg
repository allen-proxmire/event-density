  <line x1="615" y1="115" x2="855" y2="115" stroke="#fff" stroke-width="0.8"/>
  <text x="735" y="138" text-anchor="middle" font-size="11" fill="#fff">substrate-derived YM equation</text>
  <text x="735" y="156" text-anchor="middle" font-size="11" fill="#fff">+ FORCED mass-gap mechanism</text>
