<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 11.5 — T21 derivation flowchart: v⁴ = G M a₀</text>

  <!-- Top row: T19, T20, ECR -->
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#444">Substrate-derived inputs</text>

  <rect x="40" y="80" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="160" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">T19</text>
  <line x1="55" y1="115" x2="265" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="160" y="135" text-anchor="middle" font-size="11" fill="#444">a_N = G M / R²</text>
  <text x="160" y="153" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Newton-class</text>

  <rect x="330" y="80" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="450" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">T20</text>
  <line x1="345" y1="115" x2="555" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="450" y="135" text-anchor="middle" font-size="11" fill="#444">a₀ = c H₀ / (2π)</text>
  <text x="450" y="153" text-anchor="middle" font-size="10" fill="#666" font-style="italic">cosmic-horizon class</text>

  <rect x="620" y="80" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="740" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">ECR</text>
  <line x1="635" y1="115" x2="855" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="740" y="135" text-anchor="middle" font-size="11" fill="#444">a = √(a_N · a₀)</text>
  <text x="740" y="153" text-anchor="middle" font-size="10" fill="#666" font-style="italic">geometric mean</text>

  <!-- Convergence to deep-MOND asymptote -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="160" x2="380" y2="220"/>
    <line x1="450" y1="160" x2="450" y2="220"/>
    <line x1="740" y1="160" x2="520" y2="220"/>
  </g>

  <!-- Step 1: Deep-MOND asymptote -->
  <rect x="220" y="230" width="460" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="252" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Deep-MOND asymptote: a_N ≪ a₀</text>
  <text x="450" y="275" text-anchor="middle" font-size="13" fill="#a05a00" font-weight="bold">a  ≈  √( a_N · a₀ )  =  √( G M a₀ ) / R</text>

  <!-- Arrow + circular-orbit input -->
  <line x1="450" y1="290" x2="450" y2="320" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="475" y="310" font-size="11" fill="#444" font-style="italic">+ circular-orbit centripetal balance:  v² / R = a</text>

  <!-- Step 2: substitute centripetal -->
  <rect x="220" y="335" width="460" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="357" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Substitute  v² / R = a  in deep-MOND limit</text>
  <text x="450" y="380" text-anchor="middle" font-size="13" fill="#a05a00" font-weight="bold">v² / R  =  √( G M a₀ ) / R</text>

  <!-- Arrow -->
  <line x1="450" y1="395" x2="450" y2="425" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Step 3: solve for v⁴ -->
  <rect x="220" y="440" width="460" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="462" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Square both sides; R cancels</text>
  <text x="450" y="485" text-anchor="middle" font-size="13" fill="#a05a00" font-weight="bold">v⁴ = G M a₀  · R / R = G M a₀</text>

  <!-- Final: T21 -->
  <line x1="450" y1="500" x2="450" y2="525" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <rect x="220" y="535" width="460" height="55" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="558" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">T21 — Baryonic Tully–Fisher (slope 4)</text>
  <text x="450" y="580" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">v⁴  =  G M_b a₀</text>
</svg>
