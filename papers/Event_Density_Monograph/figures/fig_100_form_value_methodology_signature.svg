  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="11" fill="#444" font-style="italic">All nine closed sectors share the same FORCED/INHERITED methodology — the program's cross-domain signature.</text>
  <text x="450" y="558" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Form-FORCED column: structural results derived. Value-INHERITED column: numerical content calibrated downstream.</text>
  <text x="450" y="576" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Closed-form-substrate-constants program (Figs. 14.7, D.1) targets the INHERITED column from below.</text>
