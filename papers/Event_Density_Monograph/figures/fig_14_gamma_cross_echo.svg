<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#444"/>
    </marker>
    <marker id="arrD" viewBox="0 0 10 10" refX="5" refY="9" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M0,0 L5,9 L10,0 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 3.5 — Γ_cross collapse: cross-domain echo across ~50 orders of magnitude</text>

  <!-- Log axis spanning 0 .. 50 (orders of magnitude) -->
  <line x1="80" y1="320" x2="820" y2="320" stroke="#444" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="830" y="324" font-size="12" fill="#444">log₁₀ (length)</text>

  <!-- Tick marks every 5 orders -->
  <g stroke="#444" stroke-width="1">
    <line x1="80"  y1="316" x2="80"  y2="324"/>
    <line x1="155" y1="316" x2="155" y2="324"/>
    <line x1="230" y1="316" x2="230" y2="324"/>
    <line x1="305" y1="316" x2="305" y2="324"/>
    <line x1="380" y1="316" x2="380" y2="324"/>
    <line x1="455" y1="316" x2="455" y2="324"/>
    <line x1="530" y1="316" x2="530" y2="324"/>
    <line x1="605" y1="316" x2="605" y2="324"/>
    <line x1="680" y1="316" x2="680" y2="324"/>
    <line x1="755" y1="316" x2="755" y2="324"/>
  </g>
  <g text-anchor="middle" font-size="10" fill="#666">
    <text x="80"  y="340">−35</text>
    <text x="155" y="340">−30</text>
    <text x="230" y="340">−25</text>
    <text x="305" y="340">−20</text>
    <text x="380" y="340">−15</text>
    <text x="455" y="340">−10</text>
    <text x="530" y="340">−5</text>
    <text x="605" y="340">0</text>
    <text x="680" y="340">+5</text>
    <text x="755" y="340">+10</text>
  </g>
  <text x="80" y="360" text-anchor="middle" font-size="9" fill="#888">m</text>
  <text x="755" y="360" text-anchor="middle" font-size="9" fill="#888">m</text>

  <!-- ℓ_P marker on far left -->
  <g stroke="#1a4f8b" stroke-width="2" fill="#1a4f8b">
    <line x1="80" y1="305" x2="80" y2="320"/>
  </g>
  <text x="80" y="295" text-anchor="middle" font-size="10" fill="#1a4f8b" font-weight="bold">ℓ_P</text>

  <!-- TOP region: QC condition (ii) — cross-endpoint connectivity at lab scale -->
  <rect x="650" y="120" width="200" height="130" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="750" y="142" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">QC condition (ii)</text>
  <text x="750" y="160" text-anchor="middle" font-size="11" fill="#444">cross-endpoint connectivity</text>
  <text x="750" y="176" text-anchor="middle" font-size="11" fill="#444">in qubit systems</text>
  <text x="750" y="200" text-anchor="middle" font-size="11" fill="#444" font-style="italic">scale: ~10⁻⁹ to 10⁻³ m</text>
  <text x="750" y="222" text-anchor="middle" font-size="11" fill="#444">Γ_cross  ≥  Γ_min</text>
  <text x="750" y="240" text-anchor="middle" font-size="10" fill="#1a4f8b">→ Class C plateau</text>

  <line x1="750" y1="250" x2="750" y2="320" stroke="#1a4f8b" stroke-width="1.5" stroke-dasharray="3,3" marker-end="url(#arrD)"/>

  <!-- BOTTOM region: BH-2 — Γ_cross collapse at decoupling surface -->
  <rect x="50" y="400" width="200" height="130" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="150" y="422" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">BH-2</text>
  <text x="150" y="440" text-anchor="middle" font-size="11" fill="#444">Γ_cross collapse at</text>
  <text x="150" y="456" text-anchor="middle" font-size="11" fill="#444">decoupling surface Σ_H</text>
  <text x="150" y="480" text-anchor="middle" font-size="11" fill="#444" font-style="italic">scale: ~ ℓ_P near horizon</text>
  <text x="150" y="502" text-anchor="middle" font-size="11" fill="#444">Γ_cross  →  0</text>
  <text x="150" y="520" text-anchor="middle" font-size="10" fill="#a05a00">→ horizon formation</text>

  <line x1="150" y1="400" x2="150" y2="320" stroke="#a05a00" stroke-width="1.5" stroke-dasharray="3,3"/>

  <!-- Connecting bracket spanning ~50 orders -->
  <line x1="150" y1="280" x2="750" y2="280" stroke="#444" stroke-width="1.5"/>
  <line x1="150" y1="270" x2="150" y2="290" stroke="#444" stroke-width="1.5"/>
  <line x1="750" y1="270" x2="750" y2="290" stroke="#444" stroke-width="1.5"/>
  <text x="450" y="266" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">~ 50 orders of magnitude</text>

  <!-- Central identity panel -->
  <rect x="270" y="395" width="360" height="130" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="450" y="420" text-anchor="middle" font-weight="bold" fill="#fff" font-size="14">Same substrate object</text>
  <line x1="290" y1="430" x2="610" y2="430" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="452" text-anchor="middle" fill="#fff" font-size="12">Γ_cross  ~  exp [ −α ∫_path σ dℓ ]</text>
  <text x="450" y="478" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">substrate-locality cross-bandwidth from DCGT</text>
  <text x="450" y="498" text-anchor="middle" fill="#fff" font-size="11">collapses at any scale where σ accumulates;</text>
  <text x="450" y="514" text-anchor="middle" fill="#fff" font-size="11">no scale-specific mechanism is invoked</text>

  <!-- Footer -->
  <text x="450" y="565" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Two phenomena that look domain-specific (BH horizon formation, qubit decoherence) are one substrate quantity</text>
  <text x="450" y="582" text-anchor="middle" font-size="11" fill="#444" font-style="italic">evaluated at different scales. Cross-domain echo: same form, ~50-order separation in length.</text>
</svg>
