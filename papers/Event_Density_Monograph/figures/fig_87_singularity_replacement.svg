<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 13.3 — Singularity replacement: substrate cutoff at ℓ_P</text>

  <!-- Two side-by-side panels: standard GR singularity vs ED no-singularity -->

  <!-- LEFT: Standard GR -->
  <rect x="40" y="60" width="380" height="450" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
  <text x="230" y="86" text-anchor="middle" font-weight="bold" fill="#444" font-size="14">Standard GR</text>
  <text x="230" y="104" text-anchor="middle" font-size="11" fill="#666" font-style="italic">classical Schwarzschild interior</text>
  <line x1="55" y1="115" x2="405" y2="115" stroke="#888" stroke-width="0.8"/>

  <!-- Curvature divergence sketch -->
  <line x1="80" y1="350" x2="380" y2="350" stroke="#444" stroke-width="1.5"/>
  <line x1="80" y1="350" x2="80" y2="160" stroke="#444" stroke-width="1.5"/>
  <text x="60" y="170" font-size="10" fill="#444">R</text>
  <text x="380" y="370" text-anchor="end" font-size="10" fill="#444">r</text>
  <text x="385" y="345" font-size="10" fill="#666">∞</text>
  <text x="80" y="368" text-anchor="middle" font-size="10" fill="#666">0</text>

  <!-- Diverging curvature curve -->
  <path d="M 380,330 C 340,326 250,320 180,300 C 130,280 110,240 95,180" fill="none" stroke="#a05a00" stroke-width="2"/>
  <text x="240" y="245" text-anchor="middle" font-size="11" fill="#a05a00">curvature R → ∞</text>
  <text x="240" y="262" text-anchor="middle" font-size="11" fill="#a05a00">at r → 0</text>

  <text x="230" y="405" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Consequence:</text>
  <text x="230" y="425" text-anchor="middle" font-size="11" fill="#444">curvature divergence</text>
  <text x="230" y="443" text-anchor="middle" font-size="11" fill="#444">at r = 0 (singularity)</text>
  <text x="230" y="475" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">predicted; physically</text>
  <text x="230" y="492" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">unphysical</text>

  <!-- RIGHT: ED -->
  <rect x="480" y="60" width="380" height="450" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="670" y="86" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">ED substrate replacement</text>
  <text x="670" y="104" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">substrate cutoff at ℓ_P</text>
  <line x1="495" y1="115" x2="845" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>

  <!-- Curvature with cutoff -->
  <line x1="520" y1="350" x2="820" y2="350" stroke="#444" stroke-width="1.5"/>
  <line x1="520" y1="350" x2="520" y2="160" stroke="#444" stroke-width="1.5"/>
  <text x="500" y="170" font-size="10" fill="#444">R</text>
  <text x="820" y="370" text-anchor="end" font-size="10" fill="#444">r</text>
  <text x="520" y="368" text-anchor="middle" font-size="10" fill="#666">0</text>

  <!-- Bounded curvature with ℓ_P plateau -->
  <path d="M 820,330 C 780,326 700,320 640,300 C 590,275 565,250 555,205" fill="none" stroke="#1a4f8b" stroke-width="2"/>
  <line x1="555" y1="205" x2="555" y2="190" stroke="#1a4f8b" stroke-width="2"/>
  <line x1="540" y1="190" x2="555" y2="190" stroke="#1a4f8b" stroke-width="2"/>

  <!-- ℓ_P cutoff line -->
  <line x1="555" y1="160" x2="555" y2="350" stroke="#a05a00" stroke-width="1.5" stroke-dasharray="4,3"/>
  <text x="555" y="155" text-anchor="middle" font-size="10" fill="#a05a00">ℓ_P</text>

  <text x="700" y="245" text-anchor="middle" font-size="11" fill="#1a4f8b">curvature bounded</text>
  <text x="700" y="262" text-anchor="middle" font-size="11" fill="#1a4f8b">at substrate scale ℓ_P</text>

  <text x="670" y="405" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Consequence:</text>
  <text x="670" y="425" text-anchor="middle" font-size="11" fill="#444">no curvature divergence;</text>
  <text x="670" y="443" text-anchor="middle" font-size="11" fill="#444">substrate finite participation</text>
  <text x="670" y="461" text-anchor="middle" font-size="11" fill="#444">replaces classical singularity</text>
  <text x="670" y="488" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">no-singularity prediction;</text>
  <text x="670" y="503" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">physically admissible</text>

  <!-- Footer -->
  <rect x="40" y="525" width="820" height="55" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="548" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the substrate replacement</text>
  <text x="60" y="568" font-size="11" fill="#444">P01 event-discreteness + N1 V1 finite-width kernel jointly forbid divergent curvature. No-singularity is FORCED structurally.</text>
</svg>
