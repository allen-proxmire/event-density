<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 8.4 — The Intermediate Path C closure for Navier–Stokes smoothness</text>

  <!-- Three paths overview -->
  <text x="450" y="60" text-anchor="middle" font-size="12" fill="#444">Three closure-status paths for the smoothness question</text>

  <!-- Path A: full proof -->
  <rect x="40" y="80" width="270" height="110" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="175" y="105" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">Path A — Full proof</text>
  <line x1="55" y1="115" x2="295" y2="115" stroke="#888" stroke-width="0.8"/>
  <text x="175" y="138" text-anchor="middle" font-size="11" fill="#444">global regularity proven</text>
  <text x="175" y="156" text-anchor="middle" font-size="11" fill="#444">in standard NS framework</text>
  <text x="175" y="178" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">not achieved (Clay open)</text>

  <!-- Path B: full disproof -->
  <rect x="320" y="80" width="270" height="110" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="455" y="105" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">Path B — Counterexample</text>
  <line x1="335" y1="115" x2="575" y2="115" stroke="#888" stroke-width="0.8"/>
  <text x="455" y="138" text-anchor="middle" font-size="11" fill="#444">explicit blow-up solution</text>
  <text x="455" y="156" text-anchor="middle" font-size="11" fill="#444">with finite-time singularity</text>
  <text x="455" y="178" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">not achieved (Clay open)</text>

  <!-- Path C: structural -->
  <rect x="600" y="80" width="270" height="110" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="735" y="105" text-anchor="middle" font-weight="bold" fill="#fff" font-size="13">Path C — Structural / Intermediate</text>
  <line x1="615" y1="115" x2="855" y2="115" stroke="#fff" stroke-width="0.8"/>
  <text x="735" y="138" text-anchor="middle" font-size="11" fill="#fff">substrate-cutoff R1 forbids</text>
  <text x="735" y="156" text-anchor="middle" font-size="11" fill="#fff">unbounded vortex stretching</text>
  <text x="735" y="178" text-anchor="middle" font-size="11" fill="#fff" font-style="italic">closure achieved (this monograph)</text>

  <!-- Path C structure expanded below -->
  <line x1="735" y1="190" x2="735" y2="220" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <text x="450" y="240" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Path C closure structure</text>

  <!-- Three blocks of Path C -->
  <rect x="40" y="260" width="270" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="175" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">1. Vortex-stretching obstruction</text>
  <line x1="55" y1="295" x2="295" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="175" y="318" text-anchor="middle" font-size="11" fill="#444">vorticity ω cannot grow</text>
  <text x="175" y="336" text-anchor="middle" font-size="11" fill="#444">unboundedly because</text>
  <text x="175" y="358" text-anchor="middle" font-size="11" fill="#444">R1 hyperviscous term</text>
  <text x="175" y="376" text-anchor="middle" font-size="11" fill="#444">activates at scale ~ ℓ_P</text>
  <text x="175" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">substrate cutoff prevents</text>
  <text x="175" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">infinite curvature</text>

  <rect x="320" y="260" width="270" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="455" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">2. R1 mechanism (DCGT)</text>
  <line x1="335" y1="295" x2="575" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="455" y="318" text-anchor="middle" font-size="11" fill="#444">−κ μ_V1 ℓ_P² ∇⁴v</text>
  <text x="455" y="336" text-anchor="middle" font-size="11" fill="#444">becomes dominant at small</text>
  <text x="455" y="358" text-anchor="middle" font-size="11" fill="#444">scales R_cg → ℓ_P</text>
  <text x="455" y="380" text-anchor="middle" font-size="11" fill="#444">enforces L² bounds on ω</text>
  <text x="455" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">first-subleading-order DCGT</text>
  <text x="455" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">output (Figure 8.2)</text>

  <rect x="600" y="260" width="270" height="170" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="735" y="285" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">3. BKM criterion bypassed</text>
  <line x1="615" y1="295" x2="855" y2="295" stroke="#a05a00" stroke-width="0.8"/>
  <text x="735" y="318" text-anchor="middle" font-size="11" fill="#444">Beale–Kato–Majda criterion</text>
  <text x="735" y="336" text-anchor="middle" font-size="11" fill="#444">∫‖ω‖_∞ dt &lt; ∞ enforced</text>
  <text x="735" y="358" text-anchor="middle" font-size="11" fill="#444">structurally by R1 cutoff</text>
  <text x="735" y="380" text-anchor="middle" font-size="11" fill="#444">no singularity admissible</text>
  <text x="735" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">conditional-positive verdict</text>
  <text x="735" y="422" text-anchor="middle" font-size="10" fill="#666" font-style="italic">in ED-extended NS</text>

  <!-- Footer -->
  <rect x="40" y="455" width="820" height="125" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="478" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the Path C verdict</text>
  <text x="60" y="500" font-size="11" fill="#444">Path C does not prove standard-NS smoothness. It proves smoothness in the substrate-extended NS+R1 system, where R1 is</text>
  <text x="60" y="518" font-size="11" fill="#444">the substrate-cutoff hyperviscous term DCGT outputs at first subleading order. Standard NS is the leading-order limit.</text>
  <text x="60" y="540" font-size="11" fill="#444" font-style="italic">Conditional-positive verdict: smoothness FORCED in any substrate-faithful continuum extension of NS.</text>
  <text x="60" y="558" font-size="11" fill="#444" font-style="italic">A direct standard-NS proof would require either Path A or showing the leading-order limit preserves the bound — both open.</text>
  <text x="60" y="576" font-size="11" fill="#444" font-style="italic">Same Path-C structural-positive pattern recurs in Yang–Mills (Ch. 9) and curvature emergence (Ch. 12).</text>
</svg>
