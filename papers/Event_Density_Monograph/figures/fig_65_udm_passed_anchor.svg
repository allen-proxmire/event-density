<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 10.8 — UDM as PASSED-status empirical anchor</text>

  <!-- Status badge -->
  <rect x="320" y="60" width="260" height="60" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="88" text-anchor="middle" fill="#fff" font-weight="bold" font-size="18">PASSED</text>
  <text x="450" y="108" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">Universal Mobility Law</text>

  <!-- Three pillars: prediction, anchor, verdict -->

  <!-- Prediction -->
  <rect x="40" y="150" width="260" height="280" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="170" y="178" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Substrate prediction</text>
  <line x1="55" y1="188" x2="285" y2="188" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="170" y="220" text-anchor="middle" font-size="14" fill="#1a4f8b" font-weight="bold">M(ρ) ∝ (1 − ρ/ρ_max)^β</text>
  <text x="170" y="250" text-anchor="middle" font-size="11" fill="#444">canonical β = 2</text>
  <text x="170" y="282" text-anchor="middle" font-size="11" fill="#444">FORCED by P4-NN</text>
  <text x="170" y="300" text-anchor="middle" font-size="11" fill="#444">+ DCGT bandwidth-capacity</text>
  <text x="170" y="332" text-anchor="middle" font-size="11" fill="#444">universal across</text>
  <text x="170" y="350" text-anchor="middle" font-size="11" fill="#444">soft-matter platforms</text>
  <text x="170" y="385" text-anchor="middle" font-size="10" fill="#666" font-style="italic">canonical-source:</text>
  <text x="170" y="403" text-anchor="middle" font-size="10" fill="#666" font-style="italic">papers/Universal_</text>
  <text x="170" y="418" text-anchor="middle" font-size="10" fill="#666" font-style="italic">Mobility_Law/</text>

  <!-- Empirical anchor -->
  <rect x="320" y="150" width="260" height="280" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="178" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Empirical anchor</text>
  <line x1="335" y1="188" x2="565" y2="188" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="220" text-anchor="middle" font-size="14" fill="#a05a00" font-weight="bold">β = 1.72 ± 0.37</text>
  <text x="450" y="250" text-anchor="middle" font-size="11" fill="#444">across 10 distinct</text>
  <text x="450" y="268" text-anchor="middle" font-size="11" fill="#444">soft-matter systems</text>
  <text x="450" y="295" text-anchor="middle" font-size="11" fill="#444">suspensions, polymers,</text>
  <text x="450" y="313" text-anchor="middle" font-size="11" fill="#444">gels, biological fluids,</text>
  <text x="450" y="331" text-anchor="middle" font-size="11" fill="#444">colloidal pastes</text>
  <text x="450" y="362" text-anchor="middle" font-size="11" fill="#444">scatter is mechanism-</text>
  <text x="450" y="380" text-anchor="middle" font-size="11" fill="#444">clustered (Fig. 10.3)</text>
  <text x="450" y="408" text-anchor="middle" font-size="10" fill="#666" font-style="italic">~17% offset from canonical 2</text>

  <!-- Verdict -->
  <rect x="600" y="150" width="260" height="280" fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5" rx="6"/>
  <text x="730" y="178" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="13">Verdict</text>
  <line x1="615" y1="188" x2="845" y2="188" stroke="#5a2090" stroke-width="0.8"/>
  <text x="730" y="220" text-anchor="middle" font-size="13" fill="#5a2090" font-weight="bold">PASSED</text>
  <text x="730" y="250" text-anchor="middle" font-size="11" fill="#444">universal power-law form</text>
  <text x="730" y="268" text-anchor="middle" font-size="11" fill="#444">empirically confirmed</text>
  <text x="730" y="295" text-anchor="middle" font-size="11" fill="#444">across diverse platforms</text>
  <text x="730" y="320" text-anchor="middle" font-size="11" fill="#444">structural prediction</text>
  <text x="730" y="338" text-anchor="middle" font-size="11" fill="#444">verified;</text>
  <text x="730" y="362" text-anchor="middle" font-size="11" fill="#444">canonical-2 vs empirical-1.72</text>
  <text x="730" y="380" text-anchor="middle" font-size="11" fill="#444">offset = anchored prediction</text>
  <text x="730" y="398" text-anchor="middle" font-size="11" fill="#444">for closed-form correction</text>
  <text x="730" y="421" text-anchor="middle" font-size="10" fill="#666" font-style="italic">downstream work</text>

  <!-- Footer -->
  <rect x="40" y="455" width="820" height="125" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="478" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the PASSED-status anchor</text>
  <text x="60" y="500" font-size="11" fill="#444">UDM is one of three PASSED predictions in the program (with dwarf-galaxy Active &gt; Quiet and multi-timescale photonics).</text>
  <text x="60" y="518" font-size="11" fill="#444">The structural form (universal power law) is FORCED by P4-NN; the empirical exponent fits the form across 10 systems.</text>
  <text x="60" y="540" font-size="11" fill="#444" font-style="italic">The 17% offset from canonical β = 2 is itself an anchored prediction: a closed-form correction route is downstream work.</text>
  <text x="60" y="560" font-size="11" fill="#444" font-style="italic">Status taxonomy: PASSED &gt; ANCHORED &gt; IN PROGRESS &gt; ACTIVE &gt; OPEN — see Chapter 15, Figure 15.1.</text>
  <text x="60" y="578" font-size="11" fill="#444" font-style="italic">Canonical sources: papers/Universal_Mobility_Law/, papers/P4_NonNewtonian_Paper_Draft/</text>
</svg>
