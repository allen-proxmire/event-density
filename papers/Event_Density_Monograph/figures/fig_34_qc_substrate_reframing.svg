<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 7.1 — Reframing QC: from decoherence-centric to multiplicity-centric</text>

  <!-- Two side-by-side panels -->

  <!-- LEFT: Standard decoherence-centric framing -->
  <rect x="40" y="60" width="380" height="500" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
  <text x="230" y="85" text-anchor="middle" font-weight="bold" fill="#444" font-size="14">Standard framing</text>
  <text x="230" y="103" text-anchor="middle" font-size="11" fill="#666" font-style="italic">decoherence-centric</text>

  <!-- Central concept: decoherence -->
  <rect x="60" y="125" width="340" height="60" fill="#fff" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="230" y="150" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Decoherence</text>
  <text x="230" y="170" text-anchor="middle" font-size="11" fill="#444">loss of off-diagonal density-matrix terms</text>

  <text x="230" y="208" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Strategy taxonomy:</text>
  <g fill="#444" font-size="11">
    <text x="60" y="232">• environmental isolation</text>
    <text x="60" y="252">• error correction codes</text>
    <text x="60" y="272">• topological protection</text>
    <text x="60" y="292">• dynamical decoupling</text>
    <text x="60" y="312">• reservoir engineering</text>
    <text x="60" y="332">• fast gate operations</text>
  </g>

  <text x="230" y="370" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Architectural status:</text>
  <text x="230" y="392" text-anchor="middle" font-size="11" fill="#444">classes are platform-specific</text>
  <text x="230" y="410" text-anchor="middle" font-size="11" fill="#444">strategies are mutually exclusive</text>
  <text x="230" y="428" text-anchor="middle" font-size="11" fill="#444">no unifying substrate quantity</text>

  <text x="230" y="475" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">empirical limit:</text>
  <text x="230" y="495" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">platform-by-platform optimization</text>
  <text x="230" y="515" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">no theoretical ceiling identified</text>

  <!-- Reframing arrow between panels -->
  <line x1="430" y1="300" x2="475" y2="300" stroke="#1a4f8b" stroke-width="2.5" marker-end="url(#arr)"/>
  <text x="452" y="285" text-anchor="middle" font-size="11" fill="#1a4f8b" font-weight="bold">reframing</text>
  <text x="452" y="320" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">via UR-1</text>

  <!-- RIGHT: ED multiplicity-centric framing -->
  <rect x="480" y="60" width="380" height="500" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="670" y="85" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">ED framing</text>
  <text x="670" y="103" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">multiplicity-centric</text>

  <!-- Central concept: UR-1 unresolvedness -->
  <rect x="500" y="125" width="340" height="60" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="670" y="148" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">UR-1 unresolvedness 𝓤</text>
  <text x="670" y="170" text-anchor="middle" fill="#fff" font-size="11">𝓤 = μ(𝓜) · κ(Γ_cross) · exp(−∫Λ ds)</text>

  <text x="670" y="208" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Three independent conditions:</text>
  <g fill="#444" font-size="11">
    <text x="500" y="232">(i) bounded multiplicity 𝓜 ≤ 𝓜_crit</text>
    <text x="500" y="252">(ii) sustained Γ_cross ≥ Γ_min</text>
    <text x="500" y="272">(iii) bounded Λ ≤ Λ_V1</text>
  </g>

  <text x="670" y="305" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Three exhaustive classes (A/B/C):</text>
  <g fill="#444" font-size="11">
    <text x="500" y="328">A: engineered-low-multiplicity</text>
    <text x="500" y="348">B: global-geometric-rigidity</text>
    <text x="500" y="368">C: high-multiplicity-redundancy</text>
  </g>

  <text x="670" y="400" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Architectural status:</text>
  <text x="670" y="422" text-anchor="middle" font-size="11" fill="#444">classes substrate-derived (FORCED)</text>
  <text x="670" y="440" text-anchor="middle" font-size="11" fill="#444">meta-overlays = compositions</text>
  <text x="670" y="458" text-anchor="middle" font-size="11" fill="#444">M(𝓢, K, 𝓔, 𝓞) one substrate object</text>

  <text x="670" y="495" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">empirical limit:</text>
  <text x="670" y="515" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">τ_QC = min(τ_(i), τ_(ii), τ_(iii))</text>
  <text x="670" y="535" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">structural ceilings identified</text>
</svg>
