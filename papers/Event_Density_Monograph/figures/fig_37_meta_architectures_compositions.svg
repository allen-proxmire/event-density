<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 7.4 — Meta-architectures as compositions of A / B / C, not new classes</text>

  <!-- Top row: three primitive classes (small) -->
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#444">Three primitive classes (FORCED by UR-1)</text>

  <g>
    <rect x="100" y="80" width="180" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
    <text x="190" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">A</text>
    <text x="190" y="125" text-anchor="middle" font-size="11" fill="#444">engineered-low-𝓜</text>

    <rect x="360" y="80" width="180" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
    <text x="450" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">B</text>
    <text x="450" y="125" text-anchor="middle" font-size="11" fill="#444">global-geometric-rigidity</text>

    <rect x="620" y="80" width="180" height="60" fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5" rx="4"/>
    <text x="710" y="105" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="13">C</text>
    <text x="710" y="125" text-anchor="middle" font-size="11" fill="#444">high-𝓜-redundancy</text>
  </g>

  <!-- Composition operator label -->
  <text x="450" y="175" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">⨂  composed via meta-architectural overlay 𝓞</text>

  <!-- Middle row: meta-architectures, each as a composition -->
  <text x="450" y="210" text-anchor="middle" font-size="12" fill="#444">Meta-architectures (compositions; not new classes)</text>

  <g>
    <!-- Error correction -->
    <rect x="40" y="230" width="200" height="120" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
    <text x="140" y="255" text-anchor="middle" font-weight="bold" fill="#444" font-size="12">Error correction</text>
    <line x1="55" y1="265" x2="225" y2="265" stroke="#888" stroke-width="0.8"/>
    <text x="140" y="288" text-anchor="middle" font-size="11" fill="#444">Class A logical qubits</text>
    <text x="140" y="306" text-anchor="middle" font-size="11" fill="#444">+ Class C redundancy</text>
    <text x="140" y="332" text-anchor="middle" font-size="11" fill="#666" font-style="italic">A ⨂ C</text>

    <!-- Dynamical decoupling -->
    <rect x="250" y="230" width="200" height="120" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
    <text x="350" y="255" text-anchor="middle" font-weight="bold" fill="#444" font-size="12">Dynamical decoupling</text>
    <line x1="265" y1="265" x2="435" y2="265" stroke="#888" stroke-width="0.8"/>
    <text x="350" y="288" text-anchor="middle" font-size="11" fill="#444">Class A control pulses</text>
    <text x="350" y="306" text-anchor="middle" font-size="11" fill="#444">on Class A substrate</text>
    <text x="350" y="332" text-anchor="middle" font-size="11" fill="#666" font-style="italic">A ⨂ A (control)</text>

    <!-- Reservoir engineering -->
    <rect x="460" y="230" width="200" height="120" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
    <text x="560" y="255" text-anchor="middle" font-weight="bold" fill="#444" font-size="12">Reservoir engineering</text>
    <line x1="475" y1="265" x2="645" y2="265" stroke="#888" stroke-width="0.8"/>
    <text x="560" y="288" text-anchor="middle" font-size="11" fill="#444">Class A + engineered Λ</text>
    <text x="560" y="306" text-anchor="middle" font-size="11" fill="#444">to drive substrate</text>
    <text x="560" y="332" text-anchor="middle" font-size="11" fill="#666" font-style="italic">A ⨂ environmental shaping</text>

    <!-- Hybrid -->
    <rect x="670" y="230" width="200" height="120" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="6"/>
    <text x="770" y="255" text-anchor="middle" font-weight="bold" fill="#444" font-size="12">Hybrid</text>
    <line x1="685" y1="265" x2="855" y2="265" stroke="#888" stroke-width="0.8"/>
    <text x="770" y="288" text-anchor="middle" font-size="11" fill="#444">e.g. topological + codes</text>
    <text x="770" y="306" text-anchor="middle" font-size="11" fill="#444">B + C composition</text>
    <text x="770" y="332" text-anchor="middle" font-size="11" fill="#666" font-style="italic">B ⨂ C</text>
  </g>

  <!-- Arrows from primitive classes down to compositions -->
  <g stroke="#1a4f8b" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <line x1="190" y1="140" x2="140" y2="230"/>
    <line x1="190" y1="140" x2="350" y2="230"/>
    <line x1="190" y1="140" x2="560" y2="230"/>
    <line x1="450" y1="140" x2="770" y2="230"/>
    <line x1="710" y1="140" x2="140" y2="230"/>
    <line x1="710" y1="140" x2="770" y2="230"/>
  </g>

  <!-- Bottom: structural conclusion -->
  <rect x="40" y="385" width="820" height="195" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="412" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Three-class exhaustiveness</text>
  <line x1="60" y1="422" x2="840" y2="422" stroke="#fff" stroke-width="0.8"/>
  <g fill="#fff" font-size="12">
    <text x="60" y="448">• Every meta-architecture in current QC research can be expressed as a composition of A / B / C plus an overlay 𝓞.</text>
    <text x="60" y="468">• No fourth class is admissible at substrate level (UR-1 condition exhaustiveness).</text>
    <text x="60" y="488">• Meta-overlays change which substrate ceiling is dominant, but do not add a new ceiling.</text>
    <text x="60" y="508">• The multiplicity-cap function M(𝓢, K, 𝓔, 𝓞) is one substrate object that takes overlays as a fourth argument.</text>
    <text x="60" y="528">• Compositions are subject to the τ_QC = min(τ_(i), τ_(ii), τ_(iii)) bound of the dominant component class.</text>
  </g>
  <text x="450" y="560" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">Conceptual shift: research strategy moves from "find a new class" to "compose existing classes more efficiently."</text>
</svg>
