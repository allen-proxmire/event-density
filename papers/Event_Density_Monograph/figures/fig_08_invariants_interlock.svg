<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="bold">Figure 2.4 — The interlock of five load-bearing invariants</text>

  <!-- Pentagon arrangement around (cx=450, cy=320), radius=180 -->
  <!-- Node positions (5 vertices, top, upper-right, lower-right, lower-left, upper-left) -->
  <!-- 𝓜 top: (450, 140) -->
  <!-- Γ_cross upper-right: (621, 264) -->
  <!-- V1 lower-right: (556, 466) -->
  <!-- P11 lower-left: (344, 466) -->
  <!-- σ upper-left: (279, 264) -->

  <!-- Edges (lines) drawn first so nodes overlap them -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <!-- 𝓜 ↔ σ: gradient sparsity selects pathways counted by 𝓜 -->
    <line x1="430" y1="170" x2="299" y2="244"/>
    <line x1="299" y1="244" x2="430" y2="170"/>
    <!-- σ → Γ_cross: sparsity controls cross-bandwidth via exp[-α σ] -->
    <line x1="319" y1="264" x2="581" y2="264"/>
    <!-- Γ_cross ↔ V1: V1 sets the kernel through which Γ_cross propagates -->
    <line x1="612" y1="294" x2="565" y2="436"/>
    <line x1="565" y1="436" x2="612" y2="294"/>
    <!-- V1 → P11: V1 retardation forced by P11 + chain structure -->
    <line x1="516" y1="466" x2="384" y2="466"/>
    <!-- P11 ↔ 𝓜: irreversible commitments reduce multiplicity -->
    <line x1="364" y1="436" x2="445" y2="170"/>
    <line x1="455" y1="170" x2="375" y2="436"/>
    <!-- σ ↔ V1: substrate-cutoff R1 (V1 finite width) connects across regions of varying σ -->
    <line x1="299" y1="284" x2="540" y2="446"/>
    <!-- 𝓜 ↔ Γ_cross: rule-spanning connectivity gates multiplicity-resolved channels -->
    <line x1="470" y1="170" x2="611" y2="244"/>
  </g>

  <!-- Node labels for edges (small captions on midpoints) -->
  <g font-size="10" fill="#444" font-style="italic" text-anchor="middle">
    <text x="364" y="200">selects pathways</text>
    <text x="540" y="200">gates channels</text>
    <text x="450" y="252">σ controls Γ_cross</text>
    <text x="615" y="380">V1 mediates</text>
    <text x="450" y="486">retardation forced</text>
    <text x="285" y="380">cross-cutoff (R1)</text>
  </g>

  <!-- Nodes (drawn last to sit on top of edges) -->
  <g stroke="#1a4f8b" stroke-width="2" fill="#e8f0ff">
    <circle cx="450" cy="140" r="40"/>
    <circle cx="621" cy="264" r="40"/>
    <circle cx="556" cy="466" r="40"/>
    <circle cx="344" cy="466" r="40"/>
    <circle cx="279" cy="264" r="40"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-weight="bold" font-size="14">
    <text x="450" y="146">𝓜</text>
    <text x="621" y="270">Γ_cross</text>
    <text x="556" y="472">V1</text>
    <text x="344" y="472">P11</text>
    <text x="279" y="270">σ</text>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-size="10">
    <text x="450" y="160">multiplicity</text>
    <text x="621" y="284">cross-bandwidth</text>
    <text x="556" y="486">vacuum kernel</text>
    <text x="344" y="486">commitment</text>
    <text x="279" y="284">gradient sparsity</text>
  </g>

  <!-- Footer note -->
  <rect x="50" y="540" width="800" height="50" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="562" text-anchor="middle" font-size="11" fill="#444" font-style="italic">No invariant is independent. Each is structurally entangled with at least two others;</text>
  <text x="450" y="578" text-anchor="middle" font-size="11" fill="#444" font-style="italic">the unresolvedness functional 𝓤 = μ(𝓜/𝓜_crit) · κ(Γ_cross/Γ_min) · exp(−∫Λ ds) composes three of these into one substrate object.</text>
</svg>
