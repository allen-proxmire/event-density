<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 14.1 — Three cross-domain unification types in the ED program</text>

  <!-- Three vertical panels -->

  <!-- Type 1: Cross-platform identity -->
  <rect x="40" y="60" width="265" height="490" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="172" y="88" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Type 1</text>
  <text x="172" y="106" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">Cross-platform identity</text>
  <text x="172" y="124" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">same threshold, different platforms</text>
  <line x1="55" y1="138" x2="290" y2="138" stroke="#1a4f8b" stroke-width="0.8"/>

  <text x="172" y="170" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Mechanism</text>
  <text x="172" y="190" text-anchor="middle" font-size="11" fill="#444">one substrate threshold</text>
  <text x="172" y="208" text-anchor="middle" font-size="11" fill="#444">pins multiple empirical scales</text>

  <text x="172" y="245" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Examples</text>
  <g fill="#444" font-size="11">
    <text x="60" y="270">• 𝓜_crit:  matter-wave Q-C</text>
    <text x="75" y="288">  boundary ↔ qubit wall</text>
    <text x="60" y="312">• Λ_V1:  Class A isolation</text>
    <text x="75" y="330">  ceiling across platforms</text>
  </g>

  <text x="172" y="370" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">Closed-form-substrate-</text>
  <text x="172" y="386" text-anchor="middle" font-weight="bold" font-size="12" fill="#1a4f8b">constants targets</text>
  <text x="172" y="408" text-anchor="middle" font-size="11" fill="#444">O-QC-1 (𝓜_crit)</text>

  <text x="172" y="450" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">empirical posture:</text>
  <text x="172" y="468" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">two-point extrapolation;</text>
  <text x="172" y="486" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">closed-form derivation</text>
  <text x="172" y="504" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">downstream</text>
  <text x="172" y="535" text-anchor="middle" font-size="10" fill="#666">→ Figure 14.2</text>

  <!-- Type 2: Cross-scale identity -->
  <rect x="320" y="60" width="265" height="490" fill="#fff4e0" stroke="#a05a00" stroke-width="2" rx="6"/>
  <text x="452" y="88" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Type 2</text>
  <text x="452" y="106" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">Cross-scale identity</text>
  <text x="452" y="124" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">same form, scales separated</text>
  <line x1="335" y1="138" x2="570" y2="138" stroke="#a05a00" stroke-width="0.8"/>

  <text x="452" y="170" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Mechanism</text>
  <text x="452" y="190" text-anchor="middle" font-size="11" fill="#444">one substrate quantity</text>
  <text x="452" y="208" text-anchor="middle" font-size="11" fill="#444">evaluated at distinct scales</text>

  <text x="452" y="245" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Example</text>
  <g fill="#444" font-size="11">
    <text x="340" y="270">• Γ_cross collapse</text>
    <text x="355" y="288">  in QC class C plateau</text>
    <text x="355" y="306">  ↔ BH-2 horizon formation</text>
    <text x="340" y="335">• ~ 50 orders of magnitude</text>
    <text x="355" y="353">  scale separation</text>
  </g>

  <text x="452" y="390" text-anchor="middle" font-weight="bold" font-size="12" fill="#a05a00">Substrate quantity</text>
  <text x="452" y="412" text-anchor="middle" font-size="13" fill="#444" font-weight="bold">Γ_cross  ~  exp[−α σ ℓ]</text>

  <text x="452" y="450" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">empirical posture:</text>
  <text x="452" y="468" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">scale-bridging finding;</text>
  <text x="452" y="486" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">no domain-specific</text>
  <text x="452" y="504" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">mechanism invoked</text>
  <text x="452" y="535" text-anchor="middle" font-size="10" fill="#666">→ Figure 14.3</text>

  <!-- Type 3: Cross-channel identity -->
  <rect x="600" y="60" width="265" height="490" fill="#f0e8ff" stroke="#5a2090" stroke-width="2" rx="6"/>
  <text x="732" y="88" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="13">Type 3</text>
  <text x="732" y="106" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="14">Cross-channel identity</text>
  <text x="732" y="124" text-anchor="middle" font-size="11" fill="#5a2090" font-style="italic">same primitive across sectors</text>
  <line x1="615" y1="138" x2="850" y2="138" stroke="#5a2090" stroke-width="0.8"/>

  <text x="732" y="170" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Mechanism</text>
  <text x="732" y="190" text-anchor="middle" font-size="11" fill="#444">one substrate primitive</text>
  <text x="732" y="208" text-anchor="middle" font-size="11" fill="#444">enters multiple closed arcs</text>

  <text x="732" y="245" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Examples</text>
  <g fill="#444" font-size="11">
    <text x="620" y="270">• P04 mobility-capacity bound:</text>
    <text x="635" y="288">  UDM ↔ Class A QC</text>
    <text x="620" y="312">• V1 across kernel-arrow,</text>
    <text x="635" y="330">  R1 in NS, YM mass-gap,</text>
    <text x="635" y="348">  BH motif alphabet</text>
  </g>

  <text x="732" y="386" text-anchor="middle" font-weight="bold" font-size="12" fill="#5a2090">Structural pattern</text>
  <text x="732" y="408" text-anchor="middle" font-size="11" fill="#444">substrate primitive feeds</text>
  <text x="732" y="426" text-anchor="middle" font-size="11" fill="#444">multiple sectorial outputs</text>

  <text x="732" y="465" text-anchor="middle" font-size="11" fill="#5a2090" font-style="italic">empirical posture:</text>
  <text x="732" y="482" text-anchor="middle" font-size="11" fill="#5a2090" font-style="italic">multi-sector consistency;</text>
  <text x="732" y="500" text-anchor="middle" font-size="11" fill="#5a2090" font-style="italic">primitive validated by</text>
  <text x="732" y="518" text-anchor="middle" font-size="11" fill="#5a2090" font-style="italic">cross-arc coherence</text>
  <text x="732" y="540" text-anchor="middle" font-size="10" fill="#666">→ Figs. 14.4, 14.5</text>

  <!-- Footer (just below panels — overlaps last lines if I'm not careful, omit footer here) -->
</svg>
