<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 13.9 — BH-2 Γ_cross-collapse: cross-domain echo with QC condition (ii)</text>

  <!-- Top: shared substrate quantity -->
  <rect x="180" y="60" width="540" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="90" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">Γ_cross  ~  exp [ −α ∫_path σ dℓ ]</text>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="11">substrate-locality cross-bandwidth (DCGT)</text>
  <text x="450" y="128" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">collapses at any scale where σ accumulates</text>

  <!-- BH (left) and QC (right) panels -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="350" y1="140" x2="240" y2="200"/>
    <line x1="550" y1="140" x2="660" y2="200"/>
  </g>

  <!-- LEFT: BH-2 -->
  <rect x="40" y="210" width="380" height="240" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="230" y="236" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">BH-2: horizon formation (Ch. 13)</text>
  <text x="230" y="254" text-anchor="middle" font-size="11" fill="#444" font-style="italic">decoupling-surface formation</text>
  <line x1="55" y1="264" x2="405" y2="264" stroke="#a05a00" stroke-width="0.8"/>

  <text x="230" y="294" text-anchor="middle" font-size="11" fill="#444">scale: ~ ℓ_P near horizon</text>
  <text x="230" y="314" text-anchor="middle" font-size="11" fill="#444">stellar-mass to supermassive BH</text>

  <text x="230" y="345" text-anchor="middle" font-size="12" fill="#a05a00" font-weight="bold">Γ_cross  →  0  across Σ_H</text>
  <text x="230" y="365" text-anchor="middle" font-size="11" fill="#444">→ rule-spanning fully severed</text>
  <text x="230" y="383" text-anchor="middle" font-size="11" fill="#444">across decoupling surface</text>

  <text x="230" y="412" text-anchor="middle" font-size="11" fill="#444">information blocking,</text>
  <text x="230" y="430" text-anchor="middle" font-size="11" fill="#444">entanglement straddling</text>

  <!-- RIGHT: QC condition (ii) -->
  <rect x="480" y="210" width="380" height="240" fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5" rx="6"/>
  <text x="670" y="236" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="13">QC condition (ii) (Ch. 7)</text>
  <text x="670" y="254" text-anchor="middle" font-size="11" fill="#444" font-style="italic">cross-endpoint connectivity</text>
  <line x1="495" y1="264" x2="845" y2="264" stroke="#5a2090" stroke-width="0.8"/>

  <text x="670" y="294" text-anchor="middle" font-size="11" fill="#444">scale: ~ 10⁻⁹ to 10⁻³ m</text>
  <text x="670" y="314" text-anchor="middle" font-size="11" fill="#444">qubit array, redundant codes</text>

  <text x="670" y="345" text-anchor="middle" font-size="12" fill="#5a2090" font-weight="bold">Γ_cross saturates at Γ_min</text>
  <text x="670" y="365" text-anchor="middle" font-size="11" fill="#444">→ N_corr correlation</text>
  <text x="670" y="383" text-anchor="middle" font-size="11" fill="#444">budget exhausted</text>

  <text x="670" y="412" text-anchor="middle" font-size="11" fill="#444">Class C correlation-budget</text>
  <text x="670" y="430" text-anchor="middle" font-size="11" fill="#444">plateau prediction</text>

  <!-- Connecting bracket -->
  <line x1="230" y1="468" x2="670" y2="468" stroke="#444" stroke-width="1.5"/>
  <line x1="230" y1="458" x2="230" y2="478" stroke="#444" stroke-width="1.5"/>
  <line x1="670" y1="458" x2="670" y2="478" stroke="#444" stroke-width="1.5"/>
  <text x="450" y="455" text-anchor="middle" font-size="13" font-weight="bold" fill="#444">~ 50 orders of magnitude</text>

  <!-- Footer -->
  <text x="450" y="510" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Cross-domain echo: same substrate quantity (Γ_cross) governs domain-specific phenomena at scales separated by ~50 orders.</text>
  <text x="450" y="528" text-anchor="middle" font-size="11" fill="#444" font-style="italic">No scale-specific mechanism invoked. Scale-bridging via DCGT is the program's structural signature.</text>
  <text x="450" y="558" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Companion to Figure 7.8 (QC reading) and Figure 3.5 (DCGT reading) — same identity from three perspectives.</text>
</svg>
