  <text x="60" y="98" font-weight="bold" fill="#1a4f8b" font-size="14">Track 1 — Closed-form-substrate-constants program</text>
  <line x1="55" y1="108" x2="845" y2="108" stroke="#1a4f8b" stroke-width="0.8"/>

  <text x="60" y="132" font-size="11" fill="#444">attack INHERITED-constant boundary from below; derive values currently anchored empirically</text>

