  <text x="60" y="253" font-weight="bold" fill="#a05a00" font-size="14">Track 2 — Next-arc program</text>
  <line x1="55" y1="263" x2="845" y2="263" stroke="#a05a00" stroke-width="0.8"/>

  <text x="60" y="287" font-size="11" fill="#444">open new structural fronts; B4 is the immediate concrete arc; COSMO and GR-4A long-horizon</text>

