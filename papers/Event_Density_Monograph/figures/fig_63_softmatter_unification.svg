<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 10.6 — Soft-matter unification: one substrate framework, four phenomena</text>

  <!-- Top: substrate inputs (three) -->
  <text x="450" y="58" text-anchor="middle" font-size="12" fill="#444">Substrate inputs</text>

  <rect x="40" y="75" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="160" y="100" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">P04 + P11</text>
  <text x="160" y="120" text-anchor="middle" font-size="11" fill="#444">bandwidth update +</text>
  <text x="160" y="138" text-anchor="middle" font-size="11" fill="#444">commitment-irreversibility</text>

  <rect x="330" y="75" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="450" y="100" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">V5 cross-chain memory</text>
  <text x="450" y="120" text-anchor="middle" font-size="11" fill="#444">finite-width temporal kernel</text>
  <text x="450" y="138" text-anchor="middle" font-size="11" fill="#444">across distinct chains</text>

  <rect x="620" y="75" width="240" height="80" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="740" y="100" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">DCGT</text>
  <text x="740" y="120" text-anchor="middle" font-size="11" fill="#444">multi-scale expansion</text>
  <text x="740" y="138" text-anchor="middle" font-size="11" fill="#444">substrate → continuum</text>

  <!-- Convergence to central unification node -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="160" y1="155" x2="380" y2="225"/>
    <line x1="450" y1="155" x2="450" y2="225"/>
    <line x1="740" y1="155" x2="520" y2="225"/>
  </g>

  <!-- Center: P4-NN unification -->
  <rect x="280" y="240" width="340" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="270" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">P4-NN unification</text>
  <line x1="300" y1="280" x2="600" y2="280" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="303" text-anchor="middle" fill="#fff" font-size="12">one substrate principle, four state-variable channels</text>
  <text x="450" y="322" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">(ρ, γ̇, σ, t) — Figure 10.4</text>

  <!-- Four downstream phenomena -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="350" y1="340" x2="135" y2="395"/>
    <line x1="400" y1="340" x2="335" y2="395"/>
    <line x1="500" y1="340" x2="555" y2="395"/>
    <line x1="550" y1="340" x2="765" y2="395"/>
  </g>

  <!-- Phenomenon boxes -->
  <rect x="40" y="400" width="190" height="130" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="135" y="425" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">UDM mobility</text>
  <line x1="55" y1="435" x2="215" y2="435" stroke="#a05a00" stroke-width="0.8"/>
  <text x="135" y="458" text-anchor="middle" font-size="11" fill="#444">M(ρ) ∝ (1 − ρ/ρ_max)^β</text>
  <text x="135" y="478" text-anchor="middle" font-size="11" fill="#444">PASSED across 10 systems</text>
  <text x="135" y="510" text-anchor="middle" font-size="10" fill="#666" font-style="italic">scalar channel (ρ)</text>

  <rect x="240" y="400" width="190" height="130" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="335" y="425" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Shear-thinning / DST</text>
  <line x1="255" y1="435" x2="415" y2="435" stroke="#a05a00" stroke-width="0.8"/>
  <text x="335" y="458" text-anchor="middle" font-size="11" fill="#444">η(γ̇) flow-induced</text>
  <text x="335" y="478" text-anchor="middle" font-size="11" fill="#444">microstructural change</text>
  <text x="335" y="510" text-anchor="middle" font-size="10" fill="#666" font-style="italic">tensor-rate channel (γ̇)</text>

  <rect x="460" y="400" width="190" height="130" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="555" y="425" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Yield-stress plasticity</text>
  <line x1="475" y1="435" x2="635" y2="435" stroke="#a05a00" stroke-width="0.8"/>
  <text x="555" y="458" text-anchor="middle" font-size="11" fill="#444">Bingham + Herschel–</text>
  <text x="555" y="476" text-anchor="middle" font-size="11" fill="#444">Bulkley</text>
  <text x="555" y="510" text-anchor="middle" font-size="10" fill="#666" font-style="italic">threshold channel (σ)</text>

  <rect x="670" y="400" width="190" height="130" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="765" y="425" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Maxwell viscoelastic</text>
  <line x1="685" y1="435" x2="845" y2="435" stroke="#a05a00" stroke-width="0.8"/>
  <text x="765" y="458" text-anchor="middle" font-size="11" fill="#444">τ_R = ⟨t⟩_V5</text>
  <text x="765" y="478" text-anchor="middle" font-size="11" fill="#444">via DCGT</text>
  <text x="765" y="510" text-anchor="middle" font-size="10" fill="#666" font-style="italic">memory channel (t)</text>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Five non-Newtonian families (Figure 10.1) compose from these four channels of one substrate principle.</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">No new substrate primitive needed; all soft-matter rheology emerges from P04 + P11 + V5 + DCGT.</text>
</svg>
