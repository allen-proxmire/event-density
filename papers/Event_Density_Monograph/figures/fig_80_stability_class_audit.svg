<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 12.6 — Stability-class audit under conditions (C1)–(C3)</text>

  <!-- Headers -->
  <g fill="#1a4f8b" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="40" y="60" width="200" height="40"/>
    <rect x="240" y="60" width="200" height="40"/>
    <rect x="440" y="60" width="200" height="40"/>
    <rect x="640" y="60" width="220" height="40"/>
  </g>
  <g text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">
    <text x="140" y="86">Stability test</text>
    <text x="340" y="86">Standard standard</text>
    <text x="540" y="86">ED verdict</text>
    <text x="750" y="86">Substrate route</text>
  </g>

  <!-- Row 1: OS-positivity -->
  <g fill="#fff" stroke="#888" stroke-width="1">
    <rect x="40" y="100" width="200" height="120"/>
    <rect x="240" y="100" width="200" height="120"/>
    <rect x="440" y="100" width="200" height="120"/>
    <rect x="640" y="100" width="220" height="120"/>
  </g>
  <text x="140" y="148" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">OS-positivity</text>
  <text x="140" y="170" text-anchor="middle" font-size="10" fill="#666">Osterwalder–Schrader</text>
  <text x="140" y="186" text-anchor="middle" font-size="10" fill="#666">reflection positivity</text>

  <text x="340" y="148" text-anchor="middle" font-size="11" fill="#444">required for</text>
  <text x="340" y="166" text-anchor="middle" font-size="11" fill="#444">probabilistic</text>
  <text x="340" y="184" text-anchor="middle" font-size="11" fill="#444">interpretation</text>

  <rect x="465" y="135" width="150" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
  <text x="540" y="156" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS  (under C1)</text>
  <text x="540" y="186" text-anchor="middle" font-size="10" fill="#444" font-style="italic">structural-positive</text>
  <text x="540" y="200" text-anchor="middle" font-size="10" fill="#444" font-style="italic">channel-by-channel</text>

  <text x="750" y="148" text-anchor="middle" font-size="11" fill="#444">substrate participation</text>
  <text x="750" y="166" text-anchor="middle" font-size="11" fill="#444">density ρ &gt; 0</text>
  <text x="750" y="184" text-anchor="middle" font-size="11" fill="#444">+ V1 retardation</text>

  <!-- Row 2: Ghost-freedom -->
  <g fill="#fff" stroke="#888" stroke-width="1">
    <rect x="40" y="220" width="200" height="120"/>
    <rect x="240" y="220" width="200" height="120"/>
    <rect x="440" y="220" width="200" height="120"/>
    <rect x="640" y="220" width="220" height="120"/>
  </g>
  <text x="140" y="268" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Ghost-freedom</text>
  <text x="140" y="290" text-anchor="middle" font-size="10" fill="#666">no negative-energy</text>
  <text x="140" y="306" text-anchor="middle" font-size="10" fill="#666">propagating modes</text>

  <text x="340" y="268" text-anchor="middle" font-size="11" fill="#444">required for</text>
  <text x="340" y="286" text-anchor="middle" font-size="11" fill="#444">stability of vacuum</text>
  <text x="340" y="304" text-anchor="middle" font-size="11" fill="#444">+ unitarity</text>

  <rect x="465" y="255" width="150" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
  <text x="540" y="276" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS  (under C2)</text>
  <text x="540" y="306" text-anchor="middle" font-size="10" fill="#444" font-style="italic">single scalar Φ;</text>
  <text x="540" y="320" text-anchor="middle" font-size="10" fill="#444" font-style="italic">no extra modes</text>

  <text x="750" y="268" text-anchor="middle" font-size="11" fill="#444">RAQUAL-class with</text>
  <text x="750" y="286" text-anchor="middle" font-size="11" fill="#444">μ &gt; 0 propagator</text>
  <text x="750" y="304" text-anchor="middle" font-size="11" fill="#444">positive-norm states</text>

  <!-- Row 3: Gradient stability -->
  <g fill="#fff" stroke="#888" stroke-width="1">
    <rect x="40" y="340" width="200" height="120"/>
    <rect x="240" y="340" width="200" height="120"/>
    <rect x="440" y="340" width="200" height="120"/>
    <rect x="640" y="340" width="220" height="120"/>
  </g>
  <text x="140" y="388" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Gradient stability</text>
  <text x="140" y="410" text-anchor="middle" font-size="10" fill="#666">no exponential</text>
  <text x="140" y="426" text-anchor="middle" font-size="10" fill="#666">runaway in</text>
  <text x="140" y="442" text-anchor="middle" font-size="10" fill="#666">spatial gradients</text>

  <text x="340" y="388" text-anchor="middle" font-size="11" fill="#444">required for</text>
  <text x="340" y="406" text-anchor="middle" font-size="11" fill="#444">well-posed</text>
  <text x="340" y="424" text-anchor="middle" font-size="11" fill="#444">Cauchy problem</text>

  <rect x="465" y="375" width="150" height="32" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1"/>
  <text x="540" y="396" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">HOLDS  (under C3)</text>
  <text x="540" y="426" text-anchor="middle" font-size="10" fill="#444" font-style="italic">μ-shape monotone</text>
  <text x="540" y="440" text-anchor="middle" font-size="10" fill="#444" font-style="italic">+ bounded asymptotes</text>

  <text x="750" y="388" text-anchor="middle" font-size="11" fill="#444">substrate-derived</text>
  <text x="750" y="406" text-anchor="middle" font-size="11" fill="#444">μ has correct sign</text>
  <text x="750" y="424" text-anchor="middle" font-size="11" fill="#444">in transition regime</text>

  <!-- Conditions C1/C2/C3 footnote -->
  <rect x="40" y="475" width="820" height="105" fill="#fff4e0" stroke="#a05a00" stroke-width="1.2" rx="4"/>
  <text x="450" y="498" text-anchor="middle" font-weight="bold" font-size="12" fill="#a05a00">Conditions (C1)–(C3)</text>
  <line x1="60" y1="508" x2="840" y2="508" stroke="#a05a00" stroke-width="0.5"/>
  <g fill="#444" font-size="11">
    <text x="60" y="530">(C1)  participation density ρ &gt; 0 throughout substrate region</text>
    <text x="60" y="548">(C2)  μ-interpolation function differentiable and monotone-increasing in argument</text>
    <text x="60" y="566">(C3)  μ-asymptotes Newtonian (→1) and deep-MOND (→x) bounded — substrate-cumulative-strain regularity</text>
  </g>
</svg>
