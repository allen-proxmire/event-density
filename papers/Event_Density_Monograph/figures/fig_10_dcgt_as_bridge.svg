<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 3.1 — DCGT as the only substrate-to-continuum bridge</text>

  <!-- LEFT pillar: Substrate (Chapter 1) -->
  <rect x="40" y="100" width="260" height="380" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="170" y="130" text-anchor="middle" font-weight="bold" font-size="13" fill="#1a4f8b">Substrate (Ch. 1)</text>
  <g fill="#fff" stroke="#1a4f8b" stroke-width="1.2">
    <rect x="60" y="150" width="220" height="36" rx="3"/>
    <rect x="60" y="195" width="220" height="36" rx="3"/>
    <rect x="60" y="240" width="220" height="36" rx="3"/>
    <rect x="60" y="285" width="220" height="36" rx="3"/>
    <rect x="60" y="330" width="220" height="36" rx="3"/>
    <rect x="60" y="375" width="220" height="36" rx="3"/>
    <rect x="60" y="420" width="220" height="36" rx="3"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-size="12">
    <text x="170" y="173">Primitives P01–P13</text>
    <text x="170" y="218">ρ  (participation density)</text>
    <text x="170" y="263">σ  (gradient sparsity)</text>
    <text x="170" y="308">𝓜  (multiplicity)</text>
    <text x="170" y="353">Γ_cross  (cross-bandwidth)</text>
    <text x="170" y="398">V1, V5  (kernels)</text>
    <text x="170" y="443">P11  (commitment)</text>
  </g>

  <!-- CENTER: DCGT bridge -->
  <rect x="320" y="200" width="260" height="200" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="240" text-anchor="middle" fill="#fff" font-weight="bold" font-size="20">DCGT</text>
  <text x="450" y="265" text-anchor="middle" fill="#fff" font-size="12">Diffusion Coarse-Graining Theorem</text>
  <line x1="350" y1="280" x2="550" y2="280" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="305" text-anchor="middle" fill="#fff" font-size="11">hydrodynamic-window</text>
  <text x="450" y="322" text-anchor="middle" fill="#fff" font-size="11">scale separation:</text>
  <text x="450" y="346" text-anchor="middle" fill="#fff" font-size="13" font-weight="bold">ℓ_P  ≪  R_cg  ≪  L_flow</text>
  <text x="450" y="375" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">multi-scale expansion</text>

  <!-- RIGHT pillar: Continuum -->
  <rect x="600" y="100" width="260" height="380" fill="#fff4e0" stroke="#a05a00" stroke-width="2" rx="6"/>
  <text x="730" y="130" text-anchor="middle" font-weight="bold" font-size="13" fill="#a05a00">Continuum (Chs. 5–13)</text>
  <g fill="#fff" stroke="#a05a00" stroke-width="1.2">
    <rect x="620" y="150" width="220" height="36" rx="3"/>
    <rect x="620" y="195" width="220" height="36" rx="3"/>
    <rect x="620" y="240" width="220" height="36" rx="3"/>
    <rect x="620" y="285" width="220" height="36" rx="3"/>
    <rect x="620" y="330" width="220" height="36" rx="3"/>
    <rect x="620" y="375" width="220" height="36" rx="3"/>
    <rect x="620" y="420" width="220" height="36" rx="3"/>
  </g>
  <g text-anchor="middle" fill="#a05a00" font-size="12">
    <text x="730" y="173">Schrödinger / Born  (Ch. 5)</text>
    <text x="730" y="218">QFT propagators  (Ch. 6)</text>
    <text x="730" y="263">UR-1 / M  (Ch. 7)</text>
    <text x="730" y="308">Navier–Stokes + R1  (Ch. 8)</text>
    <text x="730" y="353">MHD, Yang–Mills  (Ch. 9)</text>
    <text x="730" y="398">Maxwell viscoelastic  (Ch. 10)</text>
    <text x="730" y="443">mod. Poisson, BH  (Chs. 11–13)</text>
  </g>

  <!-- Arrows substrate → DCGT and DCGT → continuum -->
  <g stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)">
    <line x1="300" y1="300" x2="320" y2="300"/>
    <line x1="580" y1="300" x2="600" y2="300"/>
  </g>

  <!-- Footer -->
  <rect x="40" y="500" width="820" height="80" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="525" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">DCGT is the only bridge</text>
  <text x="60" y="548" font-size="11" fill="#444">Every continuum equation in Parts II–IV reaches its substrate origin through DCGT or a non-Abelian generalization (Ch. 9).</text>
  <text x="60" y="566" font-size="11" fill="#444">No alternative substrate-to-continuum route is admitted by the program; DCGT's hydrodynamic-window scale separation is the gate.</text>
</svg>
