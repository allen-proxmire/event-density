<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#666"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Figure A.1 — Theorem provenance DAG</text>

  <!-- Substrate primitives column (left) -->
  <text x="80" y="50" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="12">Substrate primitives</text>
  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.2">
    <circle cx="80" cy="80" r="16"/>
    <circle cx="80" cy="115" r="16"/>
    <circle cx="80" cy="150" r="16"/>
    <circle cx="80" cy="185" r="16"/>
    <circle cx="80" cy="220" r="16"/>
    <circle cx="80" cy="255" r="16"/>
    <circle cx="80" cy="290" r="16"/>
    <circle cx="80" cy="325" r="16"/>
    <circle cx="80" cy="360" r="16"/>
    <circle cx="80" cy="395" r="16"/>
    <circle cx="80" cy="430" r="16"/>
    <circle cx="80" cy="465" r="16"/>
    <circle cx="80" cy="500" r="16"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-size="10" font-weight="bold">
    <text x="80" y="84">P01</text>
    <text x="80" y="119">P02</text>
    <text x="80" y="154">P03</text>
    <text x="80" y="189">P04</text>
    <text x="80" y="224">P05</text>
    <text x="80" y="259">P06</text>
    <text x="80" y="294">P07</text>
    <text x="80" y="329">P08</text>
    <text x="80" y="364">P09</text>
    <text x="80" y="399">P10</text>
    <text x="80" y="434">P11</text>
    <text x="80" y="469">P12</text>
    <text x="80" y="504">P13</text>
  </g>

  <!-- Foundational theorems cluster (left-center) -->
  <text x="270" y="50" text-anchor="middle" font-weight="bold" fill="#5a2090" font-size="12">Foundational</text>
  <g fill="#f0e8ff" stroke="#5a2090" stroke-width="1.5">
    <rect x="220" y="80" width="100" height="32" rx="3"/>
    <rect x="220" y="120" width="100" height="32" rx="3"/>
    <rect x="220" y="160" width="100" height="32" rx="3"/>
    <rect x="220" y="200" width="100" height="32" rx="3"/>
  </g>
  <g text-anchor="middle" fill="#5a2090" font-weight="bold">
    <text x="270" y="100">N1</text>
    <text x="270" y="140">DCGT</text>
    <text x="270" y="180">T18</text>
    <text x="270" y="220">GR1</text>
  </g>

  <!-- QM closure cluster (top center) -->
  <text x="455" y="50" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">QM closure</text>
  <rect x="395" y="80" width="120" height="50" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="3"/>
  <text x="455" y="100" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">T1–T16</text>
  <text x="455" y="118" text-anchor="middle" font-size="10" fill="#444">Born + Schröd</text>

  <!-- Gauge / QC cluster (right-center) -->
  <text x="640" y="50" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="12">Gauge / QC</text>
  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="590" y="80" width="100" height="32" rx="3"/>
    <rect x="590" y="120" width="100" height="32" rx="3"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-weight="bold">
    <text x="640" y="100">T17</text>
    <text x="640" y="140">UR-1</text>
  </g>

  <!-- Substrate-gravity cluster (right) -->
  <text x="820" y="50" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Substrate gravity</text>
  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="770" y="80" width="100" height="32" rx="3"/>
    <rect x="770" y="120" width="100" height="32" rx="3"/>
    <rect x="770" y="160" width="100" height="32" rx="3"/>
    <rect x="770" y="200" width="100" height="32" rx="3"/>
  </g>
  <g text-anchor="middle" fill="#a05a00" font-weight="bold">
    <text x="820" y="100">T19</text>
    <text x="820" y="140">T20</text>
    <text x="820" y="180">ECR</text>
    <text x="820" y="220">T21</text>
  </g>

  <!-- Edges (representative selection — primitive → foundational, foundational → cluster outputs) -->
  <g stroke="#666" stroke-width="1" fill="none" marker-end="url(#arr)">
    <!-- P01 → N1 -->
    <line x1="96" y1="80" x2="220" y2="92"/>
    <!-- P04 → N1 -->
    <line x1="96" y1="185" x2="220" y2="98"/>
    <!-- P11 → T18 -->
    <line x1="96" y1="430" x2="220" y2="180"/>
    <!-- P13 → T18 -->
    <line x1="96" y1="500" x2="220" y2="190"/>
    <!-- N1 → T18 -->
    <line x1="320" y1="100" x2="320" y2="160"/>
    <!-- T18 → GR1 -->
    <line x1="320" y1="195" x2="320" y2="200"/>
    <!-- N1 → GR1 -->
    <line x1="305" y1="115" x2="305" y2="200"/>
    <!-- P-cluster → T1-T16 -->
    <line x1="96" y1="115" x2="395" y2="98"/>
    <line x1="96" y1="185" x2="395" y2="105"/>
    <line x1="96" y1="430" x2="395" y2="115"/>
    <!-- DCGT → T17 -->
    <line x1="320" y1="135" x2="590" y2="98"/>
    <!-- DCGT → UR-1 -->
    <line x1="320" y1="145" x2="590" y2="135"/>
    <!-- P-cluster → DCGT -->
    <line x1="96" y1="220" x2="220" y2="135"/>
    <line x1="96" y1="290" x2="220" y2="145"/>
    <!-- P-cluster → T19 -->
    <line x1="96" y1="255" x2="770" y2="98"/>
    <line x1="96" y1="290" x2="770" y2="100"/>
    <!-- T19 → ECR -->
    <line x1="820" y1="115" x2="820" y2="160"/>
    <!-- T20 → ECR -->
    <line x1="820" y1="155" x2="820" y2="160"/>
    <!-- ECR → T21 -->
    <line x1="820" y1="195" x2="820" y2="200"/>
    <!-- T19 → T21 (direct) -->
    <line x1="870" y1="100" x2="870" y2="200"/>
  </g>

  <!-- Legend -->
  <rect x="40" y="545" width="820" height="50" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <g font-size="10">
    <circle cx="65" cy="565" r="6" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.2"/>
    <text x="78" y="568" fill="#444">Substrate primitives (P01–P13)</text>
    <rect x="240" y="559" width="12" height="12" fill="#f0e8ff" stroke="#5a2090" stroke-width="1.2"/>
    <text x="258" y="568" fill="#444">Foundational (N1, DCGT, T18, GR1)</text>
    <rect x="450" y="559" width="12" height="12" fill="#fff4e0" stroke="#a05a00" stroke-width="1.2"/>
    <text x="468" y="568" fill="#444">QM closure  (T1–T16)</text>
    <rect x="615" y="559" width="12" height="12" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.2"/>
    <text x="633" y="568" fill="#444">Gauge / QC  (T17, UR-1)</text>
    <rect x="775" y="559" width="12" height="12" fill="#fff4e0" stroke="#a05a00" stroke-width="1.2"/>
    <text x="793" y="568" fill="#444">Substrate gravity</text>
  </g>
  <text x="450" y="588" text-anchor="middle" font-size="10" fill="#666" font-style="italic">edges: primitive feeds theorem; representative subset shown for clarity (no cycles)</text>
</svg>
