<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 9.2 — From NS to MHD via T17 U(1) coupling</text>

  <!-- Three-stage pipeline -->

  <!-- Stage 1: NS -->
  <rect x="40" y="120" width="220" height="240" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="150" y="148" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="14">NS  (Ch. 8)</text>
  <line x1="55" y1="158" x2="245" y2="158" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="150" y="185" text-anchor="middle" font-size="11" fill="#444">∂ₜv + (v · ∇)v</text>
  <text x="150" y="205" text-anchor="middle" font-size="11" fill="#444">= −∇p / ρ + ν ∇²v + R1</text>

  <text x="150" y="240" text-anchor="middle" font-weight="bold" font-size="11" fill="#1a4f8b">Architectural inputs:</text>
  <g fill="#444" font-size="11">
    <text x="60" y="262">• DCGT viscous (ε⁰)</text>
    <text x="60" y="280">• DCGT R1 (ε²)</text>
    <text x="60" y="298">• ED-coupled pressure</text>
    <text x="60" y="316">• transport-kinematic</text>
    <text x="70" y="332">advection</text>
  </g>

  <!-- Plus T17 U(1) coupling -->
  <rect x="320" y="200" width="260" height="80" fill="#fff" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="450" y="225" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">+  T17 U(1) coupling  (Ch. 6)</text>
  <line x1="335" y1="235" x2="565" y2="235" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="450" y="255" text-anchor="middle" font-size="11" fill="#444">gauge field A_μ as participation</text>
  <text x="450" y="272" text-anchor="middle" font-size="11" fill="#444">measure of U(1) rule-type</text>

  <!-- Arrow from NS to MHD via T17 -->
  <line x1="260" y1="240" x2="320" y2="240" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <line x1="580" y1="240" x2="640" y2="240" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- Stage 3: MHD -->
  <rect x="640" y="120" width="220" height="240" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="750" y="148" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">MHD  (Ch. 9)</text>
  <line x1="655" y1="158" x2="845" y2="158" stroke="#a05a00" stroke-width="0.8"/>
  <text x="750" y="185" text-anchor="middle" font-size="11" fill="#444">NS  +  Maxwell  +</text>
  <text x="750" y="203" text-anchor="middle" font-size="11" fill="#444">Lorentz coupling J × B</text>

  <text x="750" y="240" text-anchor="middle" font-weight="bold" font-size="11" fill="#a05a00">Architectural inputs:</text>
  <g fill="#444" font-size="11">
    <text x="660" y="262">• all 6 NS canonical-ED</text>
    <text x="660" y="280">• ohmic dissipation η ∇²B</text>
    <text x="660" y="298">• Lorentz force (T17)</text>
    <text x="660" y="316">• induction kinematic</text>
    <text x="660" y="332">• ∇·B = 0 constraint</text>
  </g>

  <!-- Bottom: classification result -->
  <rect x="40" y="400" width="820" height="180" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="427" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Classification result: MHD = NS + T17-coupled extensions</text>
  <line x1="60" y1="437" x2="840" y2="437" stroke="#fff" stroke-width="0.8"/>
  <g fill="#fff" font-size="12">
    <text x="60" y="462">• Adding T17 U(1) coupling to NS produces all 11 MHD items via DCGT + Maxwell.</text>
    <text x="60" y="482">• 6 canonical-ED + 2 transport-kinematic + 3 ED-coupled (Figure 9.1).</text>
    <text x="60" y="502">• No new substrate primitive is invoked at the MHD step beyond what NS + T17 already provide.</text>
    <text x="60" y="522">• H1 / H2 / H3 turbulence hypotheses extend cleanly to MHD via the same canonical-ED machinery.</text>
  </g>
  <text x="450" y="555" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">MHD is structurally NS plus a single T17 U(1) coupling — not a separate sector with its own substrate machinery.</text>
</svg>
