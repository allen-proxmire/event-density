<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 3.6 — DCGT footprint across the closed-arc inventory</text>

  <!-- Central DCGT hub -->
  <circle cx="450" cy="300" r="65" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2"/>
  <text x="450" y="296" text-anchor="middle" fill="#fff" font-weight="bold" font-size="18">DCGT</text>
  <text x="450" y="316" text-anchor="middle" fill="#fff" font-size="10">substrate → continuum</text>

  <!-- Six arc nodes around the hub -->
  <!-- NS top-left, MHD top, YM top-right, soft-matter bottom-right, substrate-gravity bottom, BH bottom-left -->

  <!-- NS (top-left) -->
  <rect x="80" y="100" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="170" y="124" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">NS  (Ch. 8)</text>
  <text x="170" y="143" text-anchor="middle" font-size="11" fill="#444">viscous + R1</text>
  <text x="170" y="160" text-anchor="middle" font-size="11" fill="#444">substrate-cutoff</text>
  <text x="170" y="174" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT leading + ε²</text>

  <!-- MHD (top) -->
  <rect x="360" y="80" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="104" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">MHD  (Ch. 9)</text>
  <text x="450" y="123" text-anchor="middle" font-size="11" fill="#444">NS + T17 U(1) coupling</text>
  <text x="450" y="140" text-anchor="middle" font-size="11" fill="#444">induction equation</text>
  <text x="450" y="154" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT + T17</text>

  <!-- YM (top-right) -->
  <rect x="640" y="100" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="730" y="124" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">YM  (Ch. 9)</text>
  <text x="730" y="143" text-anchor="middle" font-size="11" fill="#444">non-Abelian</text>
  <text x="730" y="160" text-anchor="middle" font-size="11" fill="#444">D_μ F^μν = J^ν</text>
  <text x="730" y="174" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT non-Abelian</text>

  <!-- Soft-matter (bottom-right) -->
  <rect x="640" y="420" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="730" y="444" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Soft-matter  (Ch. 10)</text>
  <text x="730" y="463" text-anchor="middle" font-size="11" fill="#444">V5 → Maxwell τ_R</text>
  <text x="730" y="480" text-anchor="middle" font-size="11" fill="#444">UDM mobility</text>
  <text x="730" y="494" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT + V5 moment</text>

  <!-- Substrate gravity (bottom) -->
  <rect x="360" y="440" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="464" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Substrate gravity  (Ch. 11)</text>
  <text x="450" y="483" text-anchor="middle" font-size="11" fill="#444">mod. Poisson eq.</text>
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#444">consolidates T19/T20/ECR/T21</text>
  <text x="450" y="514" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT flat-background</text>

  <!-- BH (bottom-left) -->
  <rect x="80" y="420" width="180" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="170" y="444" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">BH  (Ch. 13)</text>
  <text x="170" y="463" text-anchor="middle" font-size="11" fill="#444">decoupling surface,</text>
  <text x="170" y="480" text-anchor="middle" font-size="11" fill="#444">area-law form A/ℓ_P²</text>
  <text x="170" y="494" text-anchor="middle" font-size="10" fill="#666" font-style="italic">DCGT + GR1</text>

  <!-- Edges from DCGT hub to each arc -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="395" y1="262" x2="245" y2="180"/>
    <line x1="430" y1="237" x2="445" y2="160"/>
    <line x1="505" y1="262" x2="655" y2="180"/>
    <line x1="505" y1="338" x2="655" y2="420"/>
    <line x1="450" y1="365" x2="450" y2="440"/>
    <line x1="395" y1="338" x2="245" y2="420"/>
  </g>

  <!-- Footer -->
  <rect x="40" y="540" width="820" height="50" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="560" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Six closed arcs, one substrate-to-continuum bridge</text>
  <text x="450" y="578" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Each arc reaches its substrate origin through DCGT; no arc invokes a separate substrate-to-continuum mechanism.</text>
</svg>
