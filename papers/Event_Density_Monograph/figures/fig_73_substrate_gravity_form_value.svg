<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 11.8 — Form-FORCED vs Value-INHERITED at substrate gravity</text>

  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural results from substrate primitives</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="55" rx="4"/>
    <rect x="60" y="200" width="340" height="55" rx="4"/>
    <rect x="60" y="265" width="340" height="55" rx="4"/>
    <rect x="60" y="330" width="340" height="55" rx="4"/>
    <rect x="60" y="395" width="340" height="55" rx="4"/>
    <rect x="60" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="158" font-weight="bold">G = c³ ℓ_P² / ℏ  (T19)</text>
    <text x="80" y="178" font-size="11">Newton's constant FORCED + DERIVED</text>
    <text x="80" y="223" font-weight="bold">a₀ = c H₀ / (2π)  (T20)</text>
    <text x="80" y="243" font-size="11">MOND acceleration FORCED + DERIVED</text>
    <text x="80" y="288" font-weight="bold">a = √(a_N · a₀)  (ECR)</text>
    <text x="80" y="308" font-size="11">geometric-mean composition FORCED</text>
    <text x="80" y="353" font-weight="bold">v⁴ = G M_b a₀  (T21)</text>
    <text x="80" y="373" font-size="11">BTFR slope-4 FORCED, parameter-free</text>
    <text x="80" y="418" font-weight="bold">Modified Poisson equation form</text>
    <text x="80" y="438" font-size="11">∇·[μ(|∇Φ|/a₀) ∇Φ] = 4πG ρ_m</text>
    <text x="80" y="483" font-weight="bold">Zero intrinsic BTFR scatter prediction</text>
    <text x="80" y="503" font-size="11">in deep-MOND asymptotic regime</text>
  </g>

  <!-- RIGHT: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">substrate inputs and INHERITED-shape items</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="55" rx="4"/>
    <rect x="500" y="200" width="340" height="55" rx="4"/>
    <rect x="500" y="265" width="340" height="55" rx="4"/>
    <rect x="500" y="330" width="340" height="55" rx="4"/>
    <rect x="500" y="395" width="340" height="55" rx="4"/>
    <rect x="500" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="158" font-weight="bold">Substrate inputs ℏ, c, H₀, ℓ_P</text>
    <text x="520" y="178" font-size="11">substrate-input layer; ℓ_P = Planck length via T19</text>
    <text x="520" y="223" font-weight="bold">Hubble-tension band on a₀</text>
    <text x="520" y="243" font-size="11">~15% prediction band from H₀ ∈ [67, 73]</text>
    <text x="520" y="288" font-weight="bold">Specific shape of μ(x) interpolation</text>
    <text x="520" y="308" font-size="11">monotone with limits FORCED; shape INHERITED</text>
    <text x="520" y="353" font-weight="bold">Galaxy-by-galaxy mass M_b values</text>
    <text x="520" y="373" font-size="11">empirical baryonic-mass measurements</text>
    <text x="520" y="418" font-weight="bold">Observed BTFR scatter source</text>
    <text x="520" y="438" font-size="11">dominated by mass-measurement uncertainty</text>
    <text x="520" y="483" font-weight="bold">Active &gt; Quiet specific 53% ratio</text>
    <text x="520" y="503" font-size="11">empirical population-level value</text>
  </g>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">All four substrate-gravity results (T19, T20, ECR, T21) are form-FORCED + value-DERIVED</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">in named substrate inputs (ℏ, c, H₀, ℓ_P); only the μ-interpolation shape and observed scatter are INHERITED.</text>
</svg>
