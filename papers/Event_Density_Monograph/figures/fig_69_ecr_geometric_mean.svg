<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 11.4 — ED Combination Rule (ECR): geometric-mean composition</text>

  <!-- Two acceleration sources at top -->
  <rect x="40" y="80" width="380" height="100" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="230" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Newton-class acceleration  (T19)</text>
  <line x1="55" y1="115" x2="405" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="230" y="140" text-anchor="middle" font-size="14" fill="#1a4f8b" font-weight="bold">a_N  =  G M / R²</text>
  <text x="230" y="162" text-anchor="middle" font-size="11" fill="#444">substrate cumulative-strain mechanism</text>

  <rect x="480" y="80" width="380" height="100" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="670" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Cosmic-horizon-class acceleration  (T20)</text>
  <line x1="495" y1="115" x2="845" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="670" y="140" text-anchor="middle" font-size="14" fill="#1a4f8b" font-weight="bold">a₀  =  c H₀ / (2π)</text>
  <text x="670" y="162" text-anchor="middle" font-size="11" fill="#444">cosmic-horizon dipole projection</text>

  <!-- Convergence to ECR -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="230" y1="180" x2="380" y2="245"/>
    <line x1="670" y1="180" x2="520" y2="245"/>
  </g>

  <!-- Cross-term (substrate logarithmic stability landscape) -->
  <text x="450" y="220" text-anchor="middle" font-size="11" fill="#444" font-style="italic">substrate logarithmic stability landscape</text>
  <text x="450" y="234" text-anchor="middle" font-size="11" fill="#444" font-style="italic">supplies cross-term  √(G M a₀) · log(R/R₀)</text>

  <!-- ECR -->
  <rect x="220" y="265" width="460" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="293" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">ED Combination Rule (ECR)</text>
  <line x1="240" y1="303" x2="660" y2="303" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="333" text-anchor="middle" fill="#fff" font-weight="bold" font-size="22">a  =  √( a_N · a₀ )</text>
  <text x="450" y="356" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">geometric-mean composition in deep-galactic regime</text>

  <!-- Arrow to T21 -->
  <line x1="450" y1="365" x2="450" y2="405" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>

  <!-- T21 box (preview) -->
  <rect x="220" y="415" width="460" height="80" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="440" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">→ T21 BTFR slope-4</text>
  <line x1="235" y1="450" x2="665" y2="450" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="475" text-anchor="middle" font-size="14" fill="#a05a00" font-weight="bold">v⁴  =  G M_b a₀</text>
  <text x="450" y="490" text-anchor="middle" font-size="10" fill="#666" font-style="italic">circular-orbit balance applied to ECR in deep-MOND asymptote</text>

  <!-- Footer -->
  <rect x="40" y="510" width="820" height="70" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="533" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the geometric mean</text>
  <text x="60" y="555" font-size="11" fill="#444">In the deep-galactic regime where a_N and a₀ are comparable, the substrate composes them multiplicatively as a geometric mean.</text>
  <text x="60" y="572" font-size="11" fill="#444" font-style="italic">ECR replaces MOND's phenomenological interpolation function in the asymptotic regime — substrate-derived, not phenomenological.</text>
</svg>
