<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#a05a00"/>
    </marker>
    <marker id="arrSm" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 11.3 — T20 cosmic-horizon dipole projection: a₀ = c H₀ / (2π)</text>

  <!-- LEFT panel: geometry -->
  <rect x="40" y="60" width="440" height="500" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="260" y="84" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">Geometry</text>

  <!-- Cosmic horizon sphere (large outer circle) -->
  <circle cx="260" cy="300" r="180" fill="none" stroke="#1a4f8b" stroke-width="2" stroke-dasharray="6,4"/>
  <text x="260" y="115" text-anchor="middle" font-size="11" fill="#1a4f8b" font-weight="bold">cosmic horizon</text>
  <text x="260" y="130" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">radius ~ c / H₀</text>

  <!-- Accelerating chain at center -->
  <circle cx="260" cy="300" r="6" fill="#1a4f8b"/>
  <text x="260" y="290" text-anchor="middle" font-size="10" fill="#1a4f8b" font-weight="bold">chain</text>

  <!-- Acceleration axis (horizontal) -->
  <line x1="190" y1="300" x2="335" y2="300" stroke="#a05a00" stroke-width="2" marker-end="url(#arrR)"/>
  <text x="350" y="304" font-size="11" fill="#a05a00" font-weight="bold">a (acceleration)</text>

  <!-- Dipole anisotropy: lobes along acceleration axis -->
  <ellipse cx="320" cy="300" rx="40" ry="22" fill="#a05a00" opacity="0.3" stroke="#a05a00" stroke-width="1.2"/>
  <ellipse cx="200" cy="300" rx="40" ry="22" fill="#a05a00" opacity="0.15" stroke="#a05a00" stroke-width="1.2"/>
  <text x="320" y="335" text-anchor="middle" font-size="10" fill="#a05a00" font-style="italic">+lobe</text>
  <text x="200" y="335" text-anchor="middle" font-size="10" fill="#a05a00" font-style="italic">−lobe</text>

  <!-- Azimuthal angle indicator -->
  <path d="M 290,300 A 30,30 0 0 1 281,329" fill="none" stroke="#444" stroke-width="1"/>
  <text x="305" y="335" text-anchor="middle" font-size="11" fill="#444" font-style="italic">φ</text>

  <!-- Sample inflow arrows from horizon to chain (dipole-modulated) -->
  <g stroke="#1a4f8b" stroke-width="1" fill="none" marker-end="url(#arrSm)">
    <line x1="100" y1="250" x2="220" y2="295"/>
    <line x1="100" y1="350" x2="220" y2="305"/>
    <line x1="420" y1="250" x2="300" y2="295"/>
    <line x1="420" y1="350" x2="300" y2="305"/>
    <line x1="260" y1="140" x2="260" y2="290"/>
    <line x1="260" y1="460" x2="260" y2="310"/>
  </g>

  <!-- Footer geometry note -->
  <text x="260" y="510" text-anchor="middle" font-size="10" fill="#666" font-style="italic">accelerating chain breaks isotropy</text>
  <text x="260" y="528" text-anchor="middle" font-size="10" fill="#666" font-style="italic">leading anisotropic mode = dipole</text>
  <text x="260" y="546" text-anchor="middle" font-size="10" fill="#666" font-style="italic">azimuthal period 2π</text>

  <!-- RIGHT panel: derivation -->
  <rect x="500" y="60" width="360" height="500" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="680" y="84" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Derivation</text>
  <line x1="515" y1="94" x2="845" y2="94" stroke="#a05a00" stroke-width="0.8"/>

  <text x="680" y="120" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Step 1</text>
  <text x="680" y="138" text-anchor="middle" font-size="11" fill="#444">Cosmic horizon contributes</text>
  <text x="680" y="156" text-anchor="middle" font-size="11" fill="#444">background participation density</text>
  <text x="680" y="172" text-anchor="middle" font-size="11" fill="#444">at scale ~ c / H₀</text>

  <text x="680" y="208" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Step 2</text>
  <text x="680" y="226" text-anchor="middle" font-size="11" fill="#444">accelerating chain's reference frame</text>
  <text x="680" y="244" text-anchor="middle" font-size="11" fill="#444">breaks rotational symmetry</text>
  <text x="680" y="262" text-anchor="middle" font-size="11" fill="#444">→ dipole projection along axis</text>

  <text x="680" y="298" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Step 3</text>
  <text x="680" y="316" text-anchor="middle" font-size="11" fill="#444">azimuthal integration</text>
  <text x="680" y="334" text-anchor="middle" font-size="11" fill="#444">over angle φ ∈ [0, 2π)</text>
  <text x="680" y="352" text-anchor="middle" font-size="11" fill="#444">contributes the 2π factor</text>

  <text x="680" y="388" text-anchor="middle" font-size="11" fill="#444" font-weight="bold">Step 4</text>
  <text x="680" y="406" text-anchor="middle" font-size="11" fill="#444">leading-order projection scale:</text>

  <rect x="540" y="425" width="280" height="50" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="4"/>
  <text x="680" y="458" text-anchor="middle" fill="#fff" font-weight="bold" font-size="16">a₀  =  c H₀ / (2π)</text>

  <text x="680" y="498" text-anchor="middle" font-size="11" fill="#444">≈ 1.08 × 10⁻¹⁰ m/s²</text>
  <text x="680" y="516" text-anchor="middle" font-size="10" fill="#666" font-style="italic">matches empirical MOND a₀</text>
  <text x="680" y="532" text-anchor="middle" font-size="10" fill="#666" font-style="italic">to ~10% (Hubble band)</text>
</svg>
