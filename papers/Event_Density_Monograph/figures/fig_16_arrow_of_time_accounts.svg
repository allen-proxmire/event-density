<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arrU" viewBox="0 0 10 10" refX="5" refY="0" markerWidth="7" markerHeight="7" orient="auto">
      <path d="M0,10 L5,0 L10,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 4.1 — Four standard accounts of arrow of time and ED's substrate-level placement</text>

  <!-- Top row: four standard accounts -->
  <text x="450" y="62" text-anchor="middle" font-size="12" fill="#666" font-style="italic">Standard accounts (each derived or postulated at a non-substrate level)</text>

  <!-- Box 1: Thermodynamic -->
  <rect x="40" y="80" width="195" height="180" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="137" y="103" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Thermodynamic</text>
  <line x1="55" y1="115" x2="220" y2="115" stroke="#888" stroke-width="0.8"/>
  <g text-anchor="middle" font-size="11" fill="#444">
    <text x="137" y="138">entropy increase</text>
    <text x="137" y="155">(2nd law)</text>
  </g>
  <text x="137" y="190" text-anchor="middle" font-size="10" fill="#666" font-style="italic">level: statistical mechanics</text>
  <text x="137" y="208" text-anchor="middle" font-size="10" fill="#666" font-style="italic">requires low-entropy</text>
  <text x="137" y="223" text-anchor="middle" font-size="10" fill="#666" font-style="italic">past boundary condition</text>
  <text x="137" y="248" text-anchor="middle" font-size="10" fill="#a05a00">postulated, not derived</text>

  <!-- Box 2: Cosmological -->
  <rect x="250" y="80" width="195" height="180" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="347" y="103" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Cosmological</text>
  <line x1="265" y1="115" x2="430" y2="115" stroke="#888" stroke-width="0.8"/>
  <g text-anchor="middle" font-size="11" fill="#444">
    <text x="347" y="138">universe expansion</text>
    <text x="347" y="155">/ Big Bang asymmetry</text>
  </g>
  <text x="347" y="190" text-anchor="middle" font-size="10" fill="#666" font-style="italic">level: cosmological</text>
  <text x="347" y="208" text-anchor="middle" font-size="10" fill="#666" font-style="italic">large-scale boundary</text>
  <text x="347" y="223" text-anchor="middle" font-size="10" fill="#666" font-style="italic">condition of spacetime</text>
  <text x="347" y="248" text-anchor="middle" font-size="10" fill="#a05a00">empirical, not derived</text>

  <!-- Box 3: Causal / EM radiation -->
  <rect x="460" y="80" width="195" height="180" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="557" y="103" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Causal (radiation)</text>
  <line x1="475" y1="115" x2="640" y2="115" stroke="#888" stroke-width="0.8"/>
  <g text-anchor="middle" font-size="11" fill="#444">
    <text x="557" y="138">retarded vs advanced</text>
    <text x="557" y="155">EM Green's functions</text>
  </g>
  <text x="557" y="190" text-anchor="middle" font-size="10" fill="#666" font-style="italic">level: classical field theory</text>
  <text x="557" y="208" text-anchor="middle" font-size="10" fill="#666" font-style="italic">retardation chosen</text>
  <text x="557" y="223" text-anchor="middle" font-size="10" fill="#666" font-style="italic">by boundary conditions</text>
  <text x="557" y="248" text-anchor="middle" font-size="10" fill="#a05a00">conventionally selected</text>

  <!-- Box 4: Psychological / phenomenal -->
  <rect x="670" y="80" width="195" height="180" fill="#f9f9f9" stroke="#888" stroke-width="1.2" rx="6"/>
  <text x="767" y="103" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Psychological</text>
  <line x1="685" y1="115" x2="850" y2="115" stroke="#888" stroke-width="0.8"/>
  <g text-anchor="middle" font-size="11" fill="#444">
    <text x="767" y="138">memory, perception</text>
    <text x="767" y="155">of past vs future</text>
  </g>
  <text x="767" y="190" text-anchor="middle" font-size="10" fill="#666" font-style="italic">level: cognitive</text>
  <text x="767" y="208" text-anchor="middle" font-size="10" fill="#666" font-style="italic">supervenes on physical</text>
  <text x="767" y="223" text-anchor="middle" font-size="10" fill="#666" font-style="italic">substrate</text>
  <text x="767" y="248" text-anchor="middle" font-size="10" fill="#a05a00">derived (epiphenomenal)</text>

  <!-- Arrows up from substrate placement to each standard account -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arrU)">
    <line x1="137" y1="430" x2="137" y2="265"/>
    <line x1="347" y1="430" x2="347" y2="265"/>
    <line x1="557" y1="430" x2="557" y2="265"/>
    <line x1="767" y1="430" x2="767" y2="265"/>
  </g>

  <!-- ED's substrate-level placement at the bottom -->
  <rect x="80" y="440" width="740" height="120" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="468" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">ED substrate-level placement: kernel-level arrow of time</text>
  <line x1="100" y1="478" x2="800" y2="478" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="500" text-anchor="middle" fill="#fff" font-size="12">V1 vacuum kernel is FORCED to forward-cone-only support at primitive level</text>
  <text x="450" y="518" text-anchor="middle" fill="#fff" font-size="12">(Theorem 18 + N1 — see Chapter 4)</text>
  <text x="450" y="540" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">All four standard accounts inherit consistency with this kernel-level arrow;</text>
  <text x="450" y="556" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">none of them re-derives it. ED's account is upstream of all four.</text>

  <!-- Footer note -->
  <text x="450" y="585" text-anchor="middle" font-size="11" fill="#444" font-style="italic">arrows indicate downstream-consistency, not derivation in the standard direction</text>
</svg>
