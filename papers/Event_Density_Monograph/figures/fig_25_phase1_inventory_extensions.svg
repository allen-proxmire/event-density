  <text x="450" y="498" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the inventory</text>
  <text x="60" y="520" font-size="11" fill="#444">Phase-1 closes QM by deriving each of the four standard postulates from substrate primitives + standard mathematical theorems.</text>
  <text x="60" y="538" font-size="11" fill="#444">The closure is structurally complete at the form level. Phase-1 is upstream of every Chapter 6 and Chapter 7 result.</text>
  <text x="60" y="558" font-size="11" fill="#444" font-style="italic">Each cluster of four T-numbers groups by which postulate it primarily addresses; the labels (Born, Schröd, Heis, Meas) are mnemonic.</text>
  <text x="60" y="575" font-size="11" fill="#444" font-style="italic">Canonical sources: papers/Phase_1/, papers/QM_Emergence_Structural_Completion/, papers/Born_Gleason/, U1–U5</text>
