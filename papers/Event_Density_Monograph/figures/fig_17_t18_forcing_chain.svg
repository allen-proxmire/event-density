<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 4.2 — Theorem 18 forcing chain: V1 retardation forced at primitive level</text>

  <!-- Top tier: five primitives -->
  <text x="450" y="68" text-anchor="middle" font-size="12" fill="#444">Substrate primitives (Chapter 1)</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <circle cx="115" cy="120" r="34"/>
    <circle cx="265" cy="120" r="34"/>
    <circle cx="415" cy="120" r="34"/>
    <circle cx="565" cy="120" r="34"/>
    <circle cx="715" cy="120" r="34"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-weight="bold" font-size="13">
    <text x="115" y="125">P01</text>
    <text x="265" y="125">P02</text>
    <text x="415" y="125">P04</text>
    <text x="565" y="125">P11</text>
    <text x="715" y="125">P13</text>
  </g>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="115" y="172">discreteness</text>
    <text x="265" y="172">chains</text>
    <text x="415" y="172">bandwidth</text>
    <text x="565" y="172">commitment</text>
    <text x="715" y="172">proper-time</text>
  </g>

  <!-- Mid tier: N1 and Q.8 -->
  <text x="450" y="225" text-anchor="middle" font-size="12" fill="#444">Intermediate constructions (Chapters 2, 3)</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="220" y="245" width="200" height="56" rx="6"/>
    <rect x="480" y="245" width="200" height="56" rx="6"/>
  </g>
  <g text-anchor="middle" fill="#a05a00" font-weight="bold" font-size="13">
    <text x="320" y="270">N1</text>
    <text x="580" y="270">Q.8</text>
  </g>
  <g text-anchor="middle" fill="#444" font-size="10">
    <text x="320" y="290">V1 finite-width vacuum kernel</text>
    <text x="580" y="290">effective-vacuum factorization</text>
  </g>

  <!-- Edges from primitives to intermediate -->
  <g stroke="#1a4f8b" stroke-width="1.2" fill="none" marker-end="url(#arr)">
    <line x1="115" y1="154" x2="290" y2="245"/>
    <line x1="265" y1="154" x2="310" y2="245"/>
    <line x1="415" y1="154" x2="335" y2="245"/>
    <line x1="565" y1="154" x2="540" y2="245"/>
    <line x1="715" y1="154" x2="615" y2="245"/>
    <line x1="415" y1="154" x2="555" y2="245"/>
  </g>

  <!-- Bottom tier: T18 conclusion -->
  <rect x="220" y="375" width="460" height="120" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="405" text-anchor="middle" fill="#fff" font-weight="bold" font-size="16">Theorem 18</text>
  <line x1="240" y1="415" x2="660" y2="415" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="438" text-anchor="middle" fill="#fff" font-size="13">V1 kernel  →  forward-cone-only support</text>
  <text x="450" y="460" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">no symmetric, advanced, or hybrid kernel admissible</text>
  <text x="450" y="478" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">microscopic arrow of time FORCED structurally</text>

  <!-- Edges from N1 and Q.8 to T18 -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="320" y1="301" x2="370" y2="375"/>
    <line x1="580" y1="301" x2="530" y2="375"/>
  </g>
  <text x="450" y="340" text-anchor="middle" font-size="11" fill="#444" font-style="italic">jointly impose retardation</text>

  <!-- Footer -->
  <rect x="40" y="525" width="820" height="60" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="546" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Forcing — not postulation</text>
  <text x="60" y="565" font-size="11" fill="#444">No alternative kernel can be constructed at primitive level. The asymmetry of past and future is built into</text>
  <text x="60" y="580" font-size="11" fill="#444">the substrate: it is not a boundary condition imposed on a time-symmetric base, but a derived structural property.</text>
</svg>
