  <text x="685" y="295" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Calibrates INHERITED</text>
  <g fill="#444" font-size="11">
    <text x="530" y="318">• 𝓜_crit (matter-wave + qubit identity)</text>
