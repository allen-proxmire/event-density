  <!-- Footer -->
  <text x="450" y="545" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Bidirectional interface: substrate program predicts; empirical observations anchor INHERITED constants and test predictions.</text>
  <text x="450" y="565" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Cross-domain identities are the program's distinctive empirical posture — sharp prediction, multi-platform falsifiability.</text>
  <text x="450" y="585" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Canonical sources: Desktop/ED_Public_Test_Inventory.md, docs/Investigation_Priority_List.md</text>
