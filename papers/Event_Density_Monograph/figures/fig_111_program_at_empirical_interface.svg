  <text x="685" y="106" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">Empirical interface</text>
  <text x="685" y="124" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">PASSED + ANCHORED + ACTIVE + OPEN</text>
  <line x1="525" y1="135" x2="845" y2="135" stroke="#a05a00" stroke-width="0.8"/>

  <text x="685" y="162" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Inputs from observation</text>
  <g fill="#444" font-size="11">
    <text x="530" y="185">• PASSED ×3</text>
    <text x="530" y="203">  dwarf-galaxy, UDM β, multi-timescale photonics</text>
    <text x="530" y="225">• ANCHORED ×13</text>
    <text x="530" y="243">  per-sector empirical fits</text>
    <text x="530" y="265">• IN PROGRESS ×3 (active campaigns)</text>
