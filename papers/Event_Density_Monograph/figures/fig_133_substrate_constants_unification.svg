<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Figure 133 — Why three INHERITED constants are mutually constraining</text>

  <!-- Top: shared substrate counting machinery -->
  <rect x="220" y="50" width="460" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="78" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Substrate counting machinery</text>
  <line x1="240" y1="88" x2="660" y2="88" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="110" text-anchor="middle" fill="#fff" font-size="11">discrete events, motif enumeration, multiplicity counting</text>
  <text x="450" y="125" text-anchor="middle" fill="#fff" font-size="10" font-style="italic">P01 + P04 + DCGT + V1 + cumulative-strain</text>

  <!-- Three target nodes (triangle) -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="370" y1="135" x2="220" y2="200"/>
    <line x1="450" y1="135" x2="450" y2="200"/>
    <line x1="530" y1="135" x2="680" y2="200"/>
  </g>

  <rect x="60" y="210" width="300" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="210" y="237" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">𝓜_crit</text>
  <line x1="75" y1="247" x2="345" y2="247" stroke="#a05a00" stroke-width="0.8"/>
  <text x="210" y="270" text-anchor="middle" font-size="11" fill="#444">multiplicity-counting application:</text>
  <text x="210" y="288" text-anchor="middle" font-size="11" fill="#444">how many viable participation</text>
  <text x="210" y="304" text-anchor="middle" font-size="11" fill="#444">pathways before unresolved fails</text>

  <rect x="380" y="210" width="220" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="490" y="237" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">log g</text>
  <line x1="395" y1="247" x2="585" y2="247" stroke="#a05a00" stroke-width="0.8"/>
  <text x="490" y="270" text-anchor="middle" font-size="11" fill="#444">motif enumeration on Σ_H:</text>
  <text x="490" y="288" text-anchor="middle" font-size="11" fill="#444">how many admissible substrate</text>
  <text x="490" y="304" text-anchor="middle" font-size="11" fill="#444">motifs per ℓ_P² cell</text>

  <rect x="620" y="210" width="220" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="730" y="237" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="14">κ / |N̂'|</text>
  <line x1="635" y1="247" x2="825" y2="247" stroke="#a05a00" stroke-width="0.8"/>
  <text x="730" y="270" text-anchor="middle" font-size="11" fill="#444">cross-scale invariance:</text>
  <text x="730" y="288" text-anchor="middle" font-size="11" fill="#444">how counting structure scales</text>
  <text x="730" y="304" text-anchor="middle" font-size="11" fill="#444">across substrate-coarse-graining</text>

  <!-- Bidirectional connection arrows (mutual constraint) -->
  <g stroke="#a05a00" stroke-width="1.5" fill="none" stroke-dasharray="6,4">
    <line x1="360" y1="260" x2="380" y2="260"/>
    <line x1="600" y1="260" x2="620" y2="260"/>
    <path d="M 210,310 C 350,400 580,400 730,310"/>
  </g>

  <!-- Why-mutually-constraining panel -->
  <rect x="40" y="370" width="820" height="220" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="395" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Mutual-constraint logic</text>
  <line x1="60" y1="405" x2="840" y2="405" stroke="#bbb" stroke-width="0.5"/>

  <g fill="#444" font-size="11">
    <text x="60" y="428">All three constants are dimensionless or quasi-dimensionless quantities counting substrate structures:</text>
    <text x="80" y="448">• 𝓜_crit  counts viable distinct ED-gradient pathways through a substrate region</text>
    <text x="80" y="466">• log g  counts admissible substrate motifs on the BH decoupling surface Σ_H</text>
    <text x="80" y="484">• κ / |N̂'|  counts scale-invariance ratios between substrate-coarse-graining levels</text>

    <text x="60" y="513">A closed-form derivation of any one fixes the substrate-counting machinery used by the others:</text>
    <text x="80" y="531">• closed-form 𝓜_crit  →  pathway-counting structure  →  constrains motif-counting (log g) and scale-counting (κ/|N̂'|)</text>
    <text x="80" y="549">• closed-form log g  →  motif-enumeration structure  →  constrains pathway-counting and scale-counting</text>
    <text x="80" y="567">• closed-form κ/|N̂'|  →  scale-invariance counting  →  constrains pathway-counting and motif-enumeration</text>
  </g>
</svg>
