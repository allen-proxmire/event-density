<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Table B.3 — Substrate-input vs Derived-quantity inventory</text>

  <line x1="450" y1="50" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT: Substrate inputs -->
  <rect x="40" y="50" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="75" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Substrate inputs</text>
  <text x="230" y="105" text-anchor="middle" font-size="11" fill="#444" font-style="italic">taken as given by the program</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="125" width="340" height="55" rx="4"/>
    <rect x="60" y="190" width="340" height="55" rx="4"/>
    <rect x="60" y="255" width="340" height="55" rx="4"/>
    <rect x="60" y="320" width="340" height="55" rx="4"/>
    <rect x="60" y="385" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="13">
    <text x="80" y="148" font-weight="bold">ℏ  Planck's constant</text>
    <text x="80" y="168" font-size="11">~ 1.054 × 10⁻³⁴ J·s</text>
    <text x="80" y="213" font-weight="bold">c  speed of light</text>
    <text x="80" y="233" font-size="11">~ 2.998 × 10⁸ m/s</text>
    <text x="80" y="278" font-weight="bold">H₀  Hubble rate</text>
    <text x="80" y="298" font-size="11">∈ [67, 73] km/s/Mpc (Hubble band)</text>
    <text x="80" y="343" font-weight="bold">ℓ_P  substrate length scale</text>
    <text x="80" y="363" font-size="11">~ 1.616 × 10⁻³⁵ m  (= Planck length via T19)</text>
    <text x="80" y="408" font-weight="bold">P01–P13  substrate primitives</text>
    <text x="80" y="428" font-size="11">irreducible structural commitments (Ch. 1)</text>
  </g>

  <text x="230" y="475" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">no closed-form derivation within the program;</text>
  <text x="230" y="495" text-anchor="middle" font-size="11" fill="#1a4f8b" font-style="italic">these are the irreducible inputs</text>

  <!-- RIGHT: Derived quantities -->
  <rect x="480" y="50" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="75" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Derived from substrate inputs</text>
  <text x="670" y="105" text-anchor="middle" font-size="11" fill="#444" font-style="italic">FORCED + DERIVED via theorem chain</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="125" width="340" height="55" rx="4"/>
    <rect x="500" y="190" width="340" height="55" rx="4"/>
    <rect x="500" y="255" width="340" height="55" rx="4"/>
    <rect x="500" y="320" width="340" height="55" rx="4"/>
    <rect x="500" y="385" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="13">
    <text x="520" y="148" font-weight="bold">G = c³ ℓ_P² / ℏ  via T19</text>
    <text x="520" y="168" font-size="11">Newton's gravitational constant</text>
    <text x="520" y="213" font-weight="bold">a₀ = c H₀ / (2π)  via T20</text>
    <text x="520" y="233" font-size="11">MOND transition acceleration</text>
    <text x="520" y="278" font-weight="bold">v⁴ = G M_b a₀  via T21</text>
    <text x="520" y="298" font-size="11">BTFR slope-4 (parameter-free)</text>
    <text x="520" y="343" font-weight="bold">Heisenberg ½  via T1–T16</text>
    <text x="520" y="363" font-size="11">Δx Δp ≥ ℏ/2 (factor ½ FORCED)</text>
    <text x="520" y="408" font-weight="bold">S = (A/ℓ_P²) · log g  via Arc BH</text>
    <text x="520" y="428" font-size="11">BH area-law form (log g INHERITED)</text>
  </g>

  <text x="670" y="475" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">value DERIVED from substrate inputs;</text>
  <text x="670" y="495" text-anchor="middle" font-size="11" fill="#a05a00" font-style="italic">no phenomenological calibration needed</text>

  <!-- Footer -->
  <rect x="40" y="525" width="820" height="55" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="546" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the inventory</text>
  <text x="60" y="566" font-size="11" fill="#444">Four substrate inputs (ℏ, c, H₀, ℓ_P) plus the primitive layer feed all derived constants and structural results across nine sectors.</text>
</svg>
