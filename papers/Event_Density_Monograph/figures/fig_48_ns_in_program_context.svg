<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 8.7 — NS within the program's broader closed-arc context</text>

  <!-- Center: NS arc -->
  <rect x="340" y="240" width="220" height="120" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="270" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">NS  (Ch. 8)</text>
  <line x1="360" y1="280" x2="540" y2="280" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="304" text-anchor="middle" fill="#fff" font-size="12">Path C closure</text>
  <text x="450" y="322" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">conditional-positive</text>
  <text x="450" y="343" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">smoothness verdict</text>

  <!-- Upstream feeds (top) -->
  <rect x="40" y="80" width="220" height="100" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="150" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">DCGT  (Ch. 3)</text>
  <line x1="55" y1="115" x2="245" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="150" y="138" text-anchor="middle" font-size="11" fill="#444">substrate-to-continuum bridge</text>
  <text x="150" y="156" text-anchor="middle" font-size="11" fill="#444">leading + subleading orders</text>

  <rect x="340" y="80" width="220" height="100" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="450" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">N1 V1 finite kernel  (Ch. 4)</text>
  <line x1="355" y1="115" x2="545" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="450" y="138" text-anchor="middle" font-size="11" fill="#444">substrate-cutoff width ℓ_P</text>
  <text x="450" y="156" text-anchor="middle" font-size="11" fill="#444">propagates to R1 hyperviscous</text>

  <rect x="640" y="80" width="220" height="100" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="750" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">ED-I-06  (Ch. 2)</text>
  <line x1="655" y1="115" x2="845" y2="115" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="750" y="138" text-anchor="middle" font-size="11" fill="#444">field/force ontology</text>
  <text x="750" y="156" text-anchor="middle" font-size="11" fill="#444">non-ED classification basis</text>

  <!-- Downstream extensions (bottom) -->
  <rect x="40" y="430" width="220" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="150" y="455" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">MHD  (Ch. 9 App. C)</text>
  <line x1="55" y1="465" x2="245" y2="465" stroke="#a05a00" stroke-width="0.8"/>
  <text x="150" y="488" text-anchor="middle" font-size="11" fill="#444">NS + T17 U(1) coupling</text>
  <text x="150" y="506" text-anchor="middle" font-size="11" fill="#444">induction equation kinematic</text>

  <rect x="340" y="430" width="220" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="455" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Yang–Mills  (Ch. 9)</text>
  <line x1="355" y1="465" x2="545" y2="465" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="488" text-anchor="middle" font-size="11" fill="#444">DCGT non-Abelian</text>
  <text x="450" y="506" text-anchor="middle" font-size="11" fill="#444">+ V1 mass-gap</text>

  <rect x="640" y="430" width="220" height="100" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="750" y="455" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Soft-matter  (Ch. 10)</text>
  <line x1="655" y1="465" x2="845" y2="465" stroke="#a05a00" stroke-width="0.8"/>
  <text x="750" y="488" text-anchor="middle" font-size="11" fill="#444">V5-Maxwell viscoelastic</text>
  <text x="750" y="506" text-anchor="middle" font-size="11" fill="#444">UDM mobility law</text>

  <!-- Arrows from upstream into NS -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="200" y1="180" x2="380" y2="240"/>
    <line x1="450" y1="180" x2="450" y2="240"/>
    <line x1="700" y1="180" x2="520" y2="240"/>
  </g>

  <!-- Arrows from NS to downstream extensions -->
  <g stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)">
    <line x1="380" y1="360" x2="200" y2="430"/>
    <line x1="450" y1="360" x2="450" y2="430"/>
    <line x1="520" y1="360" x2="700" y2="430"/>
  </g>

  <!-- Footer -->
  <text x="450" y="565" text-anchor="middle" font-size="11" fill="#444" font-style="italic">NS sits at a structural waypoint: upstream of MHD, Yang–Mills (via DCGT non-Abelian), and soft-matter; downstream of DCGT + V1 + ED-I-06.</text>
  <text x="450" y="582" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Same Path-C structural-positive verdict pattern recurs in YM (Ch. 9) and curvature emergence (Ch. 12).</text>
</svg>
