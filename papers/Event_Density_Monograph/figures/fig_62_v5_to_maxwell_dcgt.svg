<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 10.5 — V5 cross-chain memory kernel → Maxwell viscoelasticity via DCGT</text>

  <!-- Three-stage pipeline -->

  <!-- Stage 1: V5 substrate kernel -->
  <rect x="40" y="100" width="240" height="220" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="6"/>
  <text x="160" y="125" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">V5 substrate kernel</text>
  <line x1="55" y1="135" x2="265" y2="135" stroke="#1a4f8b" stroke-width="0.8"/>
  <text x="160" y="160" text-anchor="middle" font-size="11" fill="#444">cross-chain memory kernel</text>
  <text x="160" y="178" text-anchor="middle" font-size="11" fill="#444">finite temporal width</text>
  <text x="160" y="200" text-anchor="middle" font-size="11" fill="#444">substrate-level participation</text>
  <text x="160" y="218" text-anchor="middle" font-size="11" fill="#444">across distinct chains</text>

  <!-- Small kernel sketch -->
  <line x1="80" y1="270" x2="240" y2="270" stroke="#888" stroke-width="1"/>
  <path d="M 90,270 C 110,225 130,225 150,260 C 170,290 200,290 230,270" fill="none" stroke="#1a4f8b" stroke-width="1.5"/>
  <text x="160" y="295" text-anchor="middle" font-size="10" fill="#666" font-style="italic">V5(t)</text>

  <!-- Arrow 1 -->
  <line x1="280" y1="210" x2="320" y2="210" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="300" y="195" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">DCGT</text>

  <!-- Stage 2: First temporal moment -->
  <rect x="330" y="100" width="240" height="220" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="125" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">First temporal moment</text>
  <line x1="345" y1="135" x2="555" y2="135" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="170" text-anchor="middle" font-size="14" fill="#a05a00" font-weight="bold">τ_R  =  ⟨t⟩_V5</text>
  <text x="450" y="200" text-anchor="middle" font-size="11" fill="#444">extracted via</text>
  <text x="450" y="218" text-anchor="middle" font-size="11" fill="#444">multi-scale expansion</text>
  <text x="450" y="248" text-anchor="middle" font-size="11" fill="#444">τ_R = ∫ t · V5(t) dt</text>
  <text x="450" y="278" text-anchor="middle" font-size="10" fill="#666" font-style="italic">substrate-derived relaxation</text>
  <text x="450" y="295" text-anchor="middle" font-size="10" fill="#666" font-style="italic">timescale</text>

  <!-- Arrow 2 -->
  <line x1="570" y1="210" x2="610" y2="210" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="590" y="195" text-anchor="middle" font-size="10" fill="#1a4f8b" font-style="italic">continuum</text>

  <!-- Stage 3: Maxwell viscoelasticity -->
  <rect x="620" y="100" width="240" height="220" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="6"/>
  <text x="740" y="125" text-anchor="middle" fill="#fff" font-weight="bold" font-size="13">Maxwell viscoelasticity</text>
  <line x1="635" y1="135" x2="845" y2="135" stroke="#fff" stroke-width="0.8"/>
  <text x="740" y="170" text-anchor="middle" font-size="14" fill="#fff" font-weight="bold">σ + τ_R ∂ₜσ = 2η₀ ε̇</text>
  <text x="740" y="200" text-anchor="middle" font-size="11" fill="#fff">stress-relaxation equation</text>
  <text x="740" y="220" text-anchor="middle" font-size="11" fill="#fff">at continuum scale</text>
  <text x="740" y="250" text-anchor="middle" font-size="11" fill="#fff" font-style="italic">τ_R inherited from V5;</text>
  <text x="740" y="270" text-anchor="middle" font-size="11" fill="#fff" font-style="italic">η₀ INHERITED</text>
  <text x="740" y="295" text-anchor="middle" font-size="10" fill="#fff">→ polymer melt, gel rheology</text>

  <!-- Bottom: structural notes -->
  <rect x="40" y="350" width="820" height="230" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="375" text-anchor="middle" font-weight="bold" font-size="13" fill="#444">Reading the V5 → Maxwell derivation</text>
  <line x1="60" y1="385" x2="840" y2="385" stroke="#bbb" stroke-width="0.5"/>
  <g fill="#444" font-size="11">
    <text x="60" y="408">• V5 is a finite-width substrate kernel mediating cross-chain participation memory.</text>
    <text x="60" y="426">• DCGT multi-scale expansion at first subleading order extracts the first temporal moment ⟨t⟩_V5.</text>
    <text x="60" y="444">• At the continuum scale, this moment becomes the Maxwell viscoelastic relaxation time τ_R.</text>
    <text x="60" y="462">• Higher moments produce Jeffreys / Oldroyd-B corrections at higher subleading orders.</text>
    <text x="60" y="492">Form-FORCED:</text>
    <text x="60" y="510">  • existence of τ_R; relaxation-equation form ∂ₜσ + σ/τ_R = …</text>
    <text x="60" y="528">  • higher-moment hierarchy → Jeffreys, Oldroyd-B</text>
    <text x="60" y="552">Value-INHERITED:</text>
    <text x="60" y="570">  • specific magnitudes of τ_R and η₀ depend on system-specific V5 width function</text>
  </g>
</svg>
