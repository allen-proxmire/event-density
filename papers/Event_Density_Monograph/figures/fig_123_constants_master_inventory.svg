  <g font-size="10">
    <!-- ℏ -->
    <text x="90" y="97" text-anchor="middle" font-weight="bold" fill="#1a4f8b">ℏ</text>
    <text x="150" y="97" fill="#444">Heisenberg ½, T19 input</text>
    <text x="440" y="97" text-anchor="middle" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="610" y="97" text-anchor="middle" fill="#444">1.054 × 10⁻³⁴ J·s</text>
    <text x="780" y="97" text-anchor="middle" fill="#444">Ch. 5, 11</text>

    <text x="90" y="129" text-anchor="middle" font-weight="bold" fill="#1a4f8b">c</text>
    <text x="150" y="129" fill="#444">propagation, T19, T20 input</text>
    <text x="440" y="129" text-anchor="middle" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="610" y="129" text-anchor="middle" fill="#444">2.998 × 10⁸ m/s</text>
    <text x="780" y="129" text-anchor="middle" fill="#444">Ch. 4, 11, 12</text>

    <text x="90" y="161" text-anchor="middle" font-weight="bold" fill="#1a4f8b">H₀</text>
    <text x="150" y="161" fill="#444">cosmic-horizon, T20 input</text>
    <text x="440" y="161" text-anchor="middle" fill="#a05a00">SUBSTRATE INPUT</text>
    <text x="610" y="161" text-anchor="middle" fill="#444">[67, 73] km/s/Mpc</text>
    <text x="780" y="161" text-anchor="middle" fill="#444">Ch. 11</text>

    <text x="90" y="193" text-anchor="middle" font-weight="bold" fill="#1a4f8b">ℓ_P</text>
    <text x="150" y="193" fill="#444">substrate length scale</text>
    <text x="440" y="193" text-anchor="middle" fill="#1a4f8b">DERIVED via T19</text>
    <text x="610" y="193" text-anchor="middle" fill="#444">1.616 × 10⁻³⁵ m</text>
    <text x="780" y="193" text-anchor="middle" fill="#444">Ch. 2, 3, 7, 8, 11–13</text>

    <text x="90" y="225" text-anchor="middle" font-weight="bold" fill="#1a4f8b">G</text>
    <text x="150" y="225" fill="#444">Newton's constant</text>
    <text x="440" y="225" text-anchor="middle" fill="#1a4f8b">FORCED + DERIVED</text>
    <text x="610" y="225" text-anchor="middle" fill="#444">c³ ℓ_P² / ℏ</text>
    <text x="780" y="225" text-anchor="middle" fill="#444">Ch. 11, 12, 13</text>

    <text x="90" y="257" text-anchor="middle" font-weight="bold" fill="#1a4f8b">a₀</text>
    <text x="150" y="257" fill="#444">MOND acceleration</text>
    <text x="440" y="257" text-anchor="middle" fill="#1a4f8b">FORCED + DERIVED</text>
    <text x="610" y="257" text-anchor="middle" fill="#444">c H₀ / (2π)</text>
    <text x="780" y="257" text-anchor="middle" fill="#444">Ch. 11, 12, 15</text>

    <text x="90" y="289" text-anchor="middle" font-weight="bold" fill="#1a4f8b">α (DCGT)</text>
    <text x="150" y="289" fill="#444">cross-bandwidth prefactor</text>
    <text x="440" y="289" text-anchor="middle" fill="#5a2090">INHERITED</text>
    <text x="610" y="289" text-anchor="middle" fill="#444">— closed form open</text>
    <text x="780" y="289" text-anchor="middle" fill="#444">Ch. 3</text>

    <text x="90" y="321" text-anchor="middle" font-weight="bold" fill="#1a4f8b">β (UDM)</text>
    <text x="150" y="321" fill="#444">mobility-law exponent</text>
    <text x="440" y="321" text-anchor="middle" fill="#1a4f8b">FORCED canonical = 2</text>
    <text x="610" y="321" text-anchor="middle" fill="#444">empirical 1.72 ± 0.37</text>
    <text x="780" y="321" text-anchor="middle" fill="#444">Ch. 10</text>

    <text x="90" y="353" text-anchor="middle" font-weight="bold" fill="#1a4f8b">𝓜_crit</text>
    <text x="150" y="353" fill="#444">critical multiplicity</text>
    <text x="440" y="353" text-anchor="middle" fill="#5a2090">INHERITED (O-QC-1)</text>
    <text x="610" y="353" text-anchor="middle" fill="#444">140–250 kDa anchor</text>
    <text x="780" y="353" text-anchor="middle" fill="#444">Ch. 7, 14</text>

    <text x="90" y="385" text-anchor="middle" font-weight="bold" fill="#1a4f8b">Γ_min</text>
    <text x="150" y="385" fill="#444">minimum cross-bandwidth</text>
    <text x="440" y="385" text-anchor="middle" fill="#5a2090">INHERITED</text>
    <text x="610" y="385" text-anchor="middle" fill="#444">— V1 + DCGT details</text>
    <text x="780" y="385" text-anchor="middle" fill="#444">Ch. 3, 7, 13</text>

    <text x="90" y="417" text-anchor="middle" font-weight="bold" fill="#1a4f8b">Λ_V1</text>
    <text x="150" y="417" fill="#444">vacuum residual injection rate</text>
    <text x="440" y="417" text-anchor="middle" fill="#5a2090">INHERITED</text>
    <text x="610" y="417" text-anchor="middle" fill="#444">— Class A ceiling</text>
    <text x="780" y="417" text-anchor="middle" fill="#444">Ch. 7</text>

    <text x="90" y="449" text-anchor="middle" font-weight="bold" fill="#1a4f8b">β_crit</text>
    <text x="150" y="449" fill="#444">critical gradient threshold</text>
    <text x="440" y="449" text-anchor="middle" fill="#5a2090">INHERITED-shape</text>
    <text x="610" y="449" text-anchor="middle" fill="#444">~ log(R_cg / ℓ_P)</text>
    <text x="780" y="449" text-anchor="middle" fill="#444">Ch. 7, 13</text>

    <text x="90" y="481" text-anchor="middle" font-weight="bold" fill="#1a4f8b">log g</text>
    <text x="150" y="481" fill="#444">BH area-law coefficient</text>
    <text x="440" y="481" text-anchor="middle" fill="#5a2090">INHERITED (O2)</text>
    <text x="610" y="481" text-anchor="middle" fill="#444">≈ 1/4  (g ≈ 1.28)</text>
    <text x="780" y="481" text-anchor="middle" fill="#444">Ch. 13</text>

    <text x="90" y="513" text-anchor="middle" font-weight="bold" fill="#1a4f8b">N_corr</text>
    <text x="150" y="513" fill="#444">Class C correlation budget</text>
    <text x="440" y="513" text-anchor="middle" fill="#5a2090">INHERITED</text>
    <text x="610" y="513" text-anchor="middle" fill="#444">— platform-specific</text>
    <text x="780" y="513" text-anchor="middle" fill="#444">Ch. 7</text>

    <text x="90" y="545" text-anchor="middle" font-weight="bold" fill="#1a4f8b">κ/|N̂'|</text>
    <text x="150" y="545" fill="#444">cross-scale invariance ratio</text>
    <text x="440" y="545" text-anchor="middle" fill="#5a2090">INHERITED (E4)</text>
    <text x="610" y="545" text-anchor="middle" fill="#444">≈ 0.001766 ± 10.78%</text>
    <text x="780" y="545" text-anchor="middle" fill="#444">cross-ref ED-SC</text>
  </g>

  <!-- Footer -->
  <text x="450" y="585" text-anchor="middle" font-size="10" fill="#666" font-style="italic">closed-form-substrate-constants targets: 𝓜_crit (O-QC-1), log g (O2), κ/|N̂'| (E4) — see Figure D.1</text>
</svg>
