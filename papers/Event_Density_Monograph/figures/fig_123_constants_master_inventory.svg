<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="11">
  <text x="450" y="22" text-anchor="middle" font-size="14" font-weight="bold">Table D.1 — Master substrate-constants inventory</text>

  <!-- Headers -->
  <g fill="#1a4f8b" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="40" y="45" width="100" height="32"/>
    <rect x="140" y="45" width="220" height="32"/>
    <rect x="360" y="45" width="160" height="32"/>
    <rect x="520" y="45" width="180" height="32"/>
