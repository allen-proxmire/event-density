<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 5.5 — Substrate-to-standard-QM mapping</text>

  <!-- Three-column header -->
  <text x="155" y="62" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">Substrate object</text>
  <text x="450" y="62" text-anchor="middle" font-weight="bold" fill="#444" font-size="13">Map (DCGT / Phase-1)</text>
  <text x="745" y="62" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Standard-QM object</text>

  <!-- Row 1: Participation chain → State vector -->
  <rect x="40" y="80" width="230" height="65" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="155" y="106" text-anchor="middle" fill="#1a4f8b" font-size="12">participation chain</text>
  <text x="155" y="125" text-anchor="middle" fill="#444" font-size="11">P02 worldline</text>

  <line x1="270" y1="112" x2="335" y2="112" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="80" width="230" height="65" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="4"/>
  <text x="450" y="106" text-anchor="middle" fill="#444" font-size="12">U1 participation measure</text>
  <text x="450" y="125" text-anchor="middle" fill="#444" font-size="11" font-style="italic">papers/U1_Participation_Measure/</text>

  <line x1="565" y1="112" x2="630" y2="112" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="80" width="230" height="65" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="745" y="106" text-anchor="middle" fill="#a05a00" font-size="12">state vector  |ψ⟩</text>
  <text x="745" y="125" text-anchor="middle" fill="#444" font-size="11">on Hilbert space</text>

  <!-- Row 2: Substrate non-contextuality → Inner product -->
  <rect x="40" y="160" width="230" height="65" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="155" y="186" text-anchor="middle" fill="#1a4f8b" font-size="12">non-contextual rules +</text>
  <text x="155" y="205" text-anchor="middle" fill="#444" font-size="11">substrate participation</text>

  <line x1="270" y1="192" x2="335" y2="192" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="160" width="230" height="65" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="4"/>
  <text x="450" y="186" text-anchor="middle" fill="#444" font-size="12">U2 inner-product structure</text>
  <text x="450" y="205" text-anchor="middle" fill="#444" font-size="11" font-style="italic">papers/U2_Inner_Product/</text>

  <line x1="565" y1="192" x2="630" y2="192" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="160" width="230" height="65" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="745" y="186" text-anchor="middle" fill="#a05a00" font-size="12">inner product  ⟨φ|ψ⟩</text>
  <text x="745" y="205" text-anchor="middle" fill="#444" font-size="11">Hilbert-space norm</text>

  <!-- Row 3: Time-translation symmetry → Schrödinger -->
  <rect x="40" y="240" width="230" height="65" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="155" y="266" text-anchor="middle" fill="#1a4f8b" font-size="12">time-translation symmetry</text>
  <text x="155" y="285" text-anchor="middle" fill="#444" font-size="11">P13 + Stone (1932)</text>

  <line x1="270" y1="272" x2="335" y2="272" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="240" width="230" height="65" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="4"/>
  <text x="450" y="266" text-anchor="middle" fill="#444" font-size="12">U3 + U4 generator structure</text>
  <text x="450" y="285" text-anchor="middle" fill="#444" font-size="11" font-style="italic">papers/U3_*, papers/U4_*</text>

  <line x1="565" y1="272" x2="630" y2="272" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="240" width="230" height="65" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="745" y="266" text-anchor="middle" fill="#a05a00" font-size="12">iℏ ∂ₜ ψ = H ψ</text>
  <text x="745" y="285" text-anchor="middle" fill="#444" font-size="11">Schrödinger generator</text>

  <!-- Row 4: P11 commitment → Measurement rule -->
  <rect x="40" y="320" width="230" height="65" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="155" y="346" text-anchor="middle" fill="#1a4f8b" font-size="12">P11 commitment-irreversibility</text>
  <text x="155" y="365" text-anchor="middle" fill="#444" font-size="11">+ recording step</text>

  <line x1="270" y1="352" x2="335" y2="352" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="320" width="230" height="65" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="4"/>
  <text x="450" y="346" text-anchor="middle" fill="#444" font-size="12">substrate asymmetric recording</text>
  <text x="450" y="365" text-anchor="middle" fill="#444" font-size="11" font-style="italic">no separate collapse postulate</text>

  <line x1="565" y1="352" x2="630" y2="352" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="320" width="230" height="65" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="745" y="346" text-anchor="middle" fill="#a05a00" font-size="12">measurement outcome</text>
  <text x="745" y="365" text-anchor="middle" fill="#444" font-size="11">single recorded result</text>

  <!-- Row 5: Bandwidth bound → Heisenberg -->
  <rect x="40" y="400" width="230" height="65" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="155" y="426" text-anchor="middle" fill="#1a4f8b" font-size="12">P04 finite bandwidth</text>
  <text x="155" y="445" text-anchor="middle" fill="#444" font-size="11">+ orthogonal conjugacy</text>

  <line x1="270" y1="432" x2="335" y2="432" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="335" y="400" width="230" height="65" fill="#f9f9f9" stroke="#888" stroke-width="1.5" rx="4"/>
  <text x="450" y="426" text-anchor="middle" fill="#444" font-size="12">Robertson commutator bound</text>
  <text x="450" y="445" text-anchor="middle" fill="#444" font-size="11" font-style="italic">canonical-conjugate inequality</text>

  <line x1="565" y1="432" x2="630" y2="432" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="630" y="400" width="230" height="65" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="745" y="426" text-anchor="middle" fill="#a05a00" font-size="12">Δx Δp ≥ ℏ/2</text>
  <text x="745" y="445" text-anchor="middle" fill="#444" font-size="11">Heisenberg uncertainty</text>

  <!-- Footer -->
  <rect x="40" y="490" width="820" height="90" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="513" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the mapping</text>
  <text x="60" y="535" font-size="11" fill="#444">Each row maps a substrate object through Phase-1 / U1–U5 machinery to a standard QM construct. The mapping is one-directional</text>
  <text x="60" y="552" font-size="11" fill="#444">(substrate → standard); standard QM never needs to map back to substrate, because substrate is upstream by construction.</text>
  <text x="60" y="572" font-size="11" fill="#444" font-style="italic">All standard QM constructs are FORCED-DERIVED from substrate primitives; absolute scales are value-INHERITED.</text>
</svg>
