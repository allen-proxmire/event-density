<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="13">
  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 10.7 — Form-FORCED vs Value-INHERITED at soft-matter mobility</text>

  <line x1="450" y1="55" x2="450" y2="560" stroke="#888" stroke-width="1.5" stroke-dasharray="4,4"/>

  <!-- LEFT: Form-FORCED -->
  <rect x="40" y="55" width="380" height="40" fill="#1a4f8b"/>
  <text x="230" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Form-FORCED</text>
  <text x="230" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">structural results from P4-NN + V5 + DCGT</text>

  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5">
    <rect x="60" y="135" width="340" height="55" rx="4"/>
    <rect x="60" y="200" width="340" height="55" rx="4"/>
    <rect x="60" y="265" width="340" height="55" rx="4"/>
    <rect x="60" y="330" width="340" height="55" rx="4"/>
    <rect x="60" y="395" width="340" height="55" rx="4"/>
    <rect x="60" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#1a4f8b" font-size="12">
    <text x="80" y="158" font-weight="bold">UDM functional form</text>
    <text x="80" y="178" font-size="11">M(ρ) = M₀(1 − ρ/ρ_max)^β power law</text>
    <text x="80" y="223" font-weight="bold">Canonical β = 2 substrate prediction</text>
    <text x="80" y="243" font-size="11">leading-order DCGT bandwidth-capacity</text>
    <text x="80" y="288" font-weight="bold">Maxwell viscoelastic structure</text>
    <text x="80" y="308" font-size="11">∂ₜσ + σ/τ_R = 2η₀ ε̇ form FORCED</text>
    <text x="80" y="353" font-weight="bold">τ_R = ⟨t⟩_V5 (V5 first temporal moment)</text>
    <text x="80" y="373" font-size="11">extracted via DCGT subleading order</text>
    <text x="80" y="418" font-weight="bold">Five rheology families unified by P4-NN</text>
    <text x="80" y="438" font-size="11">one substrate principle, four channels</text>
    <text x="80" y="483" font-weight="bold">Mechanism-clustered β scatter pattern</text>
    <text x="80" y="503" font-size="11">three substrate-derived sub-clusters</text>
  </g>

  <!-- RIGHT: Value-INHERITED -->
  <rect x="480" y="55" width="380" height="40" fill="#a05a00"/>
  <text x="670" y="80" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Value-INHERITED</text>
  <text x="670" y="115" text-anchor="middle" font-size="11" fill="#444" font-style="italic">numerical content calibrated empirically</text>

  <g fill="#fff4e0" stroke="#a05a00" stroke-width="1.5">
    <rect x="500" y="135" width="340" height="55" rx="4"/>
    <rect x="500" y="200" width="340" height="55" rx="4"/>
    <rect x="500" y="265" width="340" height="55" rx="4"/>
    <rect x="500" y="330" width="340" height="55" rx="4"/>
    <rect x="500" y="395" width="340" height="55" rx="4"/>
    <rect x="500" y="460" width="340" height="55" rx="4"/>
  </g>
  <g fill="#a05a00" font-size="12">
    <text x="520" y="158" font-weight="bold">Empirical β = 1.72 ± 0.37</text>
    <text x="520" y="178" font-size="11">PASSED across 10 systems; offset from canonical 2</text>
    <text x="520" y="223" font-weight="bold">Packing limit ρ_max</text>
    <text x="520" y="243" font-size="11">system-specific microstructural input</text>
    <text x="520" y="288" font-weight="bold">Mobility magnitude M₀</text>
    <text x="520" y="308" font-size="11">depends on substrate-coupling strength</text>
    <text x="520" y="353" font-weight="bold">Magnitude of τ_R</text>
    <text x="520" y="373" font-size="11">V5 width function INHERITED</text>
    <text x="520" y="418" font-weight="bold">Yield stress σ_y, threshold scales</text>
    <text x="520" y="438" font-size="11">material-specific calibration</text>
    <text x="520" y="483" font-weight="bold">Specific shear-thinning exponents (n)</text>
    <text x="520" y="503" font-size="11">flow-regime + microstructure dependent</text>
  </g>

  <!-- Footer -->
  <text x="450" y="540" text-anchor="middle" font-size="12" fill="#444" font-style="italic">All structural rheology FORCED at substrate level; specific exponents, magnitudes, thresholds INHERITED.</text>
  <text x="450" y="558" text-anchor="middle" font-size="12" fill="#444" font-style="italic">Discrepancy from canonical β = 2 is the program's anchored prediction of a closed-form correction route.</text>
</svg>
