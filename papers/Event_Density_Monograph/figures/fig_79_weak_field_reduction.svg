<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 12.5 — Reduction to flat-spacetime in the weak-field limit</text>

  <!-- Top: covariantized equation -->
  <rect x="40" y="60" width="820" height="80" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="92" text-anchor="middle" fill="#fff" font-weight="bold" font-size="15">Covariantized equation  (Arc ED-10)</text>
  <text x="450" y="118" text-anchor="middle" fill="#fff" font-size="13">∇_μ [ μ(√(g^αβ ∇_α Φ ∇_β Φ)/a₀) ∇^μ Φ ]  =  4π G T</text>

  <!-- Arrow down with weak-field limit label -->
  <line x1="450" y1="140" x2="450" y2="180" stroke="#1a4f8b" stroke-width="2" fill="none" marker-end="url(#arr)"/>
  <text x="475" y="165" font-size="11" fill="#444" font-style="italic">weak-field limit:  g^αβ → η^αβ (Minkowski),  T → ρ_m</text>

  <!-- Three intermediate steps -->
  <rect x="40" y="195" width="260" height="115" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="170" y="220" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Step 1</text>
  <line x1="55" y1="230" x2="285" y2="230" stroke="#a05a00" stroke-width="0.8"/>
  <text x="170" y="252" text-anchor="middle" font-size="11" fill="#444">replace g^αβ → η^αβ</text>
  <text x="170" y="270" text-anchor="middle" font-size="11" fill="#444">(flat Minkowski metric)</text>
  <text x="170" y="293" text-anchor="middle" font-size="10" fill="#666" font-style="italic">drop curvature corrections</text>

  <rect x="320" y="195" width="260" height="115" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="450" y="220" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Step 2</text>
  <line x1="335" y1="230" x2="565" y2="230" stroke="#a05a00" stroke-width="0.8"/>
  <text x="450" y="252" text-anchor="middle" font-size="11" fill="#444">∇_μ → ∂_μ in flat space</text>
  <text x="450" y="270" text-anchor="middle" font-size="11" fill="#444">∇^μ Φ ∇_μ Φ → |∇Φ|²</text>
  <text x="450" y="293" text-anchor="middle" font-size="10" fill="#666" font-style="italic">covariant → coordinate gradient</text>

  <rect x="600" y="195" width="260" height="115" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="6"/>
  <text x="730" y="220" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="12">Step 3</text>
  <line x1="615" y1="230" x2="845" y2="230" stroke="#a05a00" stroke-width="0.8"/>
  <text x="730" y="252" text-anchor="middle" font-size="11" fill="#444">T → ρ_m  (matter density)</text>
  <text x="730" y="270" text-anchor="middle" font-size="11" fill="#444">in non-relativistic limit</text>
  <text x="730" y="293" text-anchor="middle" font-size="10" fill="#666" font-style="italic">relativistic source → mass density</text>

  <!-- Convergence arrow -->
  <line x1="170" y1="310" x2="370" y2="365" stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="450" y1="310" x2="450" y2="365" stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>
  <line x1="730" y1="310" x2="530" y2="365" stroke="#1a4f8b" stroke-width="1.5" fill="none" marker-end="url(#arr)"/>

  <!-- Result: flat-background mod. Poisson -->
  <rect x="180" y="375" width="540" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="403" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Recovers Chapter 11 modified Poisson equation</text>
  <line x1="200" y1="413" x2="700" y2="413" stroke="#fff" stroke-width="0.8"/>
  <text x="450" y="440" text-anchor="middle" fill="#fff" font-size="14" font-weight="bold">∇ · [ μ(|∇Φ|/a₀) ∇Φ ]  =  4π G ρ_m</text>
  <text x="450" y="462" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">— consistency check passed</text>

  <!-- Footer -->
  <rect x="40" y="500" width="820" height="80" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="523" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Reading the reduction</text>
  <text x="60" y="545" font-size="11" fill="#444">Curvature emergence (Arc ED-10) extends the flat-background equation, not replaces it. Weak-field limit recovers Ch. 11.</text>
  <text x="60" y="563" font-size="11" fill="#444" font-style="italic">Each substrate-gravity prediction (T19, T20, ECR, T21) is therefore preserved in the covariantized form.</text>
</svg>
