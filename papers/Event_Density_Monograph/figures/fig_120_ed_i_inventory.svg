  <!-- Note section -->
  <rect x="40" y="380" width="820" height="180" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="405" text-anchor="middle" font-weight="bold" font-size="12" fill="#444">Notes on the ED-I series</text>
  <line x1="60" y1="415" x2="840" y2="415" stroke="#bbb" stroke-width="0.5"/>
  <g fill="#444" font-size="11">
    <text x="60" y="438">• ED-I papers supply sector-specific substrate-level interpretations of canonical physics phenomena.</text>
    <text x="60" y="456">• Eight ED-I papers are load-bearing in the monograph (assigned above); additional ED-I papers in the program</text>
    <text x="60" y="474">  cover sectors not load-bearing in any chapter and contribute to Chapter 15's prediction inventory only.</text>
    <text x="60" y="498">• Numbering follows the program's sectorial cataloging; the index is not contiguous because some ED-I numbers</text>
    <text x="60" y="516">  belong to interpretation papers in sectors not load-bearing within this monograph.</text>
    <text x="60" y="540">• Each ED-I paper is a structural reading, not a derivation; derivations live in the corresponding closed-arc papers.</text>
    <text x="60" y="558">  ED-I-06 is the ontological roof grounding the field/force taxonomy throughout the program.</text>
  </g>
</svg>
