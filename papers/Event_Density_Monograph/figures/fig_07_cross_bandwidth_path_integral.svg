<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <text x="450" y="26" text-anchor="middle" font-size="14" font-weight="bold">Figure 2.3 — Cross-bandwidth as a substrate-locality path integral</text>

  <!-- Two regions: x1 (left), x2 (right) -->
  <g fill="#e8f0ff" stroke="#1a4f8b" stroke-width="2">
    <circle cx="130" cy="280" r="55"/>
    <circle cx="770" cy="280" r="55"/>
  </g>
  <g text-anchor="middle" fill="#1a4f8b" font-weight="bold" font-size="14">
    <text x="130" y="285">x₁</text>
    <text x="770" y="285">x₂</text>
  </g>
  <g text-anchor="middle" fill="#444" font-size="11">
    <text x="130" y="360">region 1</text>
    <text x="770" y="360">region 2</text>
  </g>

  <!-- Substrate-locality-permitted path connecting them. Curved path with σ profile shown above. -->
  <!-- Path: start (185,280), through control points making a shallow S-curve, end (715,280) -->
  <path d="M 185,280 C 280,200 360,360 460,280 C 560,200 640,360 715,280"
        fill="none" stroke="#a05a00" stroke-width="2.5"/>

  <!-- Path label -->
  <text x="450" y="395" text-anchor="middle" fill="#a05a00" font-style="italic" font-size="12">substrate-locality-permitted pathway</text>

  <!-- Sample tick marks along path with σ values (no numbers, just heights) -->
  <g stroke="#666" stroke-width="1" fill="none">
    <line x1="230" y1="240" x2="230" y2="225"/>
    <line x1="290" y1="220" x2="290" y2="195"/>
    <line x1="350" y1="270" x2="350" y2="295"/>
    <line x1="410" y1="305" x2="410" y2="335"/>
    <line x1="460" y1="280" x2="460" y2="310"/>
    <line x1="510" y1="240" x2="510" y2="220"/>
    <line x1="570" y1="220" x2="570" y2="200"/>
    <line x1="630" y1="280" x2="630" y2="305"/>
    <line x1="680" y1="295" x2="680" y2="320"/>
  </g>

  <!-- σ(x) profile panel above (small inset) -->
  <text x="450" y="55" text-anchor="middle" font-size="12" fill="#444">σ(x) along path</text>
  <line x1="200" y1="155" x2="700" y2="155" stroke="#888" stroke-width="1"/>
  <text x="195" y="158" text-anchor="end" font-size="10" fill="#666">0</text>
  <!-- σ profile curve: low/high oscillating -->
  <path d="M 200,140 C 240,90 290,170 360,150 C 430,130 470,165 530,100 C 590,40 640,150 700,130"
        fill="none" stroke="#a05a00" stroke-width="1.8"/>
  <text x="195" y="80" text-anchor="end" font-size="10" fill="#666">σ</text>

  <!-- Vertical guides connecting σ profile to path -->
  <g stroke="#bbb" stroke-width="0.8" stroke-dasharray="2,3">
    <line x1="200" y1="155" x2="200" y2="290"/>
    <line x1="450" y1="155" x2="450" y2="290"/>
    <line x1="700" y1="155" x2="700" y2="290"/>
  </g>

  <!-- Path-integral exponential annotation -->
  <rect x="220" y="430" width="460" height="80" fill="#fff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="450" y="460" text-anchor="middle" font-weight="bold" font-size="16" fill="#1a4f8b">Γ_cross  ~  exp [ −α ∫_path σ(x) dℓ ]</text>
  <text x="450" y="485" text-anchor="middle" font-size="11" fill="#444">cross-bandwidth between x₁ and x₂ is suppressed exponentially</text>
  <text x="450" y="500" text-anchor="middle" font-size="11" fill="#444">by the path-integrated gradient sparsity along the connecting pathway</text>

  <!-- Footer -->
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#666" font-style="italic">α is a DCGT prefactor (form-FORCED, value-INHERITED). σ = |∇ρ|·ℓ_P² / ρ_local is dimensionless.</text>
</svg>
