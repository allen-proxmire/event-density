<svg width="900" height="600" xmlns="http://www.w3.org/2000/svg" font-family="sans-serif" font-size="12">
  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a4f8b"/>
    </marker>
  </defs>

  <text x="450" y="28" text-anchor="middle" font-size="14" font-weight="bold">Figure 6.4 — Substrate-level vocabulary for quantum information</text>

  <!-- Column headers -->
  <text x="225" y="62" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">Standard QI term</text>
  <text x="675" y="62" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">ED substrate-level reading</text>

  <!-- Row 1: entanglement -->
  <rect x="50" y="80" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="105" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">entanglement</text>
  <text x="225" y="125" text-anchor="middle" font-size="11" fill="#444">|ψ⟩_AB ≠ |φ⟩_A ⊗ |χ⟩_B</text>

  <line x1="400" y1="110" x2="500" y2="110" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="80" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="105" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">shared-rule-coherence</text>
  <text x="675" y="125" text-anchor="middle" font-size="11" fill="#444">across separated chains</text>

  <!-- Row 2: superposition -->
  <rect x="50" y="155" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="180" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">superposition</text>
  <text x="225" y="200" text-anchor="middle" font-size="11" fill="#444">α|0⟩ + β|1⟩</text>

  <line x1="400" y1="185" x2="500" y2="185" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="155" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="180" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">unresolved participation rule</text>
  <text x="675" y="200" text-anchor="middle" font-size="11" fill="#444">𝓤 ≈ 1, no commitment yet</text>

  <!-- Row 3: decoherence -->
  <rect x="50" y="230" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="255" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">decoherence</text>
  <text x="225" y="275" text-anchor="middle" font-size="11" fill="#444">loss of off-diagonal density-matrix terms</text>

  <line x1="400" y1="260" x2="500" y2="260" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="230" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="255" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">𝓤 → 0 via UR-1 condition failure</text>
  <text x="675" y="275" text-anchor="middle" font-size="11" fill="#444">multiplicity, connectivity, or commitment</text>

  <!-- Row 4: measurement -->
  <rect x="50" y="305" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="330" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">measurement</text>
  <text x="225" y="350" text-anchor="middle" font-size="11" fill="#444">collapse postulate (standard)</text>

  <line x1="400" y1="335" x2="500" y2="335" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="305" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="330" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">P11 commitment-irreversibility</text>
  <text x="675" y="350" text-anchor="middle" font-size="11" fill="#444">recording is asymmetric — no collapse</text>

  <!-- Row 5: quantum channel -->
  <rect x="50" y="380" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="405" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">quantum channel</text>
  <text x="225" y="425" text-anchor="middle" font-size="11" fill="#444">CPTP map ε: ρ → ε(ρ)</text>

  <line x1="400" y1="410" x2="500" y2="410" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="380" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="405" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">substrate participation channel</text>
  <text x="675" y="425" text-anchor="middle" font-size="11" fill="#444">+ Γ_cross structural geometry</text>

  <!-- Row 6: information capacity -->
  <rect x="50" y="455" width="350" height="60" fill="#fff4e0" stroke="#a05a00" stroke-width="1.5" rx="4"/>
  <text x="225" y="480" text-anchor="middle" font-weight="bold" fill="#a05a00" font-size="13">information capacity</text>
  <text x="225" y="500" text-anchor="middle" font-size="11" fill="#444">Holevo, Shannon, mutual info</text>

  <line x1="400" y1="485" x2="500" y2="485" stroke="#1a4f8b" stroke-width="1.5" marker-end="url(#arr)"/>

  <rect x="500" y="455" width="350" height="60" fill="#e8f0ff" stroke="#1a4f8b" stroke-width="1.5" rx="4"/>
  <text x="675" y="480" text-anchor="middle" font-weight="bold" fill="#1a4f8b" font-size="13">multiplicity 𝓜 + Γ_cross</text>
  <text x="675" y="500" text-anchor="middle" font-size="11" fill="#444">substrate-counting bounds</text>

  <!-- Footer -->
  <rect x="50" y="535" width="800" height="50" fill="#f9f9f9" stroke="#bbb" stroke-width="1" rx="4"/>
  <text x="450" y="555" text-anchor="middle" font-size="11" fill="#444" font-style="italic">QI vocabulary maps cleanly to substrate primitives — no separate operational interpretation needed.</text>
  <text x="450" y="572" text-anchor="middle" font-size="11" fill="#444" font-style="italic">All five landmark QI results (Figure 6.3) are recoverable from this substrate-level vocabulary alone.</text>
</svg>
