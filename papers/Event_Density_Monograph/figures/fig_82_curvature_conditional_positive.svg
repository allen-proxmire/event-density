  <!-- Verdict -->
  <rect x="180" y="455" width="540" height="100" fill="#1a4f8b" stroke="#1a4f8b" stroke-width="2" rx="8"/>
  <text x="450" y="482" text-anchor="middle" fill="#fff" font-weight="bold" font-size="14">Conditional-positive verdict</text>
