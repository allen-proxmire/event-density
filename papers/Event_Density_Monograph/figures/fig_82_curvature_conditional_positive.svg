  <text x="450" y="513" text-anchor="middle" fill="#fff" font-size="12">parallel to NS Intermediate Path C (Fig. 8.4)</text>
  <text x="450" y="531" text-anchor="middle" fill="#fff" font-size="12">and Yang–Mills Clay-relevance (Fig. 9.7)</text>
  <text x="450" y="549" text-anchor="middle" fill="#fff" font-size="11" font-style="italic">substrate-faithful continuum extension closure</text>

  <!-- Footer -->
  <text x="450" y="582" text-anchor="middle" font-size="11" fill="#444" font-style="italic">Curvature emergence is structurally complete at form-FORCED level; full Einstein-equation recovery (GR-4A) remains long-horizon.</text>
