name: Certify

on:
  push:
    branches: [main, master]
    paths:
      - "edsim/**"
      - "pyproject.toml"
  schedule:
    # Run nightly at 03:17 UTC (off-peak, odd minute to spread load)
    - cron: "17 3 * * *"
  workflow_dispatch:

jobs:
  certify:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-3.12-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-3.12-

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[test]"

      - name: Print environment info
        run: python -m edsim info

      - name: Run reproducibility pipeline
        run: python -m edsim certify

      - name: Generate certificate JSON
        run: |
          python -c "
          import json
          from edsim.reproducibility.pipeline import run_pipeline
          cert = run_pipeline()
          with open('certificate.json', 'w') as f:
              json.dump(cert.to_dict(), f, indent=2, default=str)
          print('Certificate saved to certificate.json')
          summary = cert.summary()
          print(f'Phases: {summary[\"n_passed\"]}/{summary[\"n_phases\"]} passed')
          if not cert.all_passed:
              print(f'FAILED: {summary[\"failed_names\"]}')
              exit(1)
          "

      - name: Upload certificate artifact
        uses: actions/upload-artifact@v4
        with:
          name: reproducibility-certificate
          path: certificate.json
          retention-days: 90
